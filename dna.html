<style>

<div class="container">

      Analisa com <b>3 camadas</b>: 🔄 Geral (10 últimos), 🏠 Casa (6 como mandante), ✈️ Fora (6 como visitante).<br>

    </p>

<script>
const TOKEN='45003_ec8357116e';
const TG_BOT_TOKEN='8645338323:AAG5jlzVICHNz-tYHBQtfZZ-8_gr_V_FOiw', TG_CHAT_ID='294730685';
let ultimoTg = null;

// ===== API =====
async function fetchAPI(id, extra) {
  let u = `https://cornerprobet.com/api/v3/getAnalysis.php?gameId=${id}&token=${TOKEN}`;
  if (extra) u += `&${extra}`;
  let r = await fetch(u);
  return await r.json();
}

// ===== UTILS =====
function pct(g, a) { return a > 0 ? Math.round((g / a) * 100) : -1; }
function avg(arr) { return arr.length > 0 ? parseFloat((arr.reduce((s, v) => s + v, 0) / arr.length).toFixed(1)) : 0; }
function corPct(p) { return p >= 70 ? '#00B37E' : p >= 50 ? '#FBA94C' : '#f75a68'; }
function confLabel(a) { if (a >= 8) return { t: '🟢 Alta', c: 'tag-green' }; if (a >= 4) return { t: '���� Média', c: 'tag-yellow' }; return { t: '🔴 Baixa', c: 'tag-red' }; }

// ===== EXTRAIR DNA DE UM JOGO (do lastGames direto) =====
function extrairDNAJogo(jogo, teamId) {
  if (!jogo || !jogo.stats) return null;

  let isHome = (jogo.homeId === teamId);
  let idx = isHome ? 0 : 1;
  let idxAdv = isHome ? 1 : 0;

  // Stats
  let stats = {};
  let campos = ['blocked','outsidebox','total_crosses','dangerous_attacks','shots','tackles',
    'possessiontime','insidebox','fouls','key_passes','accurate_crosses','attacks','saves','corners'];
  for (let c of campos) {
    if (jogo.stats[c]) {
      stats[c] = { time: parseFloat(jogo.stats[c][idx]) || 0, adv: parseFloat(jogo.stats[c][idxAdv]) || 0 };
    }
  }

  // Cantos do totalCorner
  let tc = jogo.totalCorner || {};
  let cantos1T = { favor: 0, contra: 0 }, cantos2T = { favor: 0, contra: 0 }, cantosTotal = { favor: 0, contra: 0 };

  if (tc.first) {
    cantos1T.favor = isHome ? (tc.first.h || 0) : (tc.first.a || 0);
    cantos1T.contra = isHome ? (tc.first.a || 0) : (tc.first.h || 0);
  }
  if (tc.second) {
    cantos2T.favor = isHome ? (tc.second.h || 0) : (tc.second.a || 0);
    cantos2T.contra = isHome ? (tc.second.a || 0) : (tc.second.h || 0);
  }
  if (tc.total) {
    cantosTotal.favor = isHome ? (tc.total.h || 0) : (tc.total.a || 0);
    cantosTotal.contra = isHome ? (tc.total.a || 0) : (tc.total.h || 0);
  }

  let cantosJogoTotal = (tc.total ? tc.total.t : 0) || (cantosTotal.favor + cantosTotal.contra);
  let cantos1Ttotal = (tc.first ? tc.first.t : 0) || (cantos1T.favor + cantos1T.contra);
  let cantos2Ttotal = (tc.second ? tc.second.t : 0) || (cantos2T.favor + cantos2T.contra);

  // Corner intervals para cantos 37-HT, 70+, 80+
  let ci = jogo.cornerIntervals || {};
  let cantos37HT = 0, cantos70mais = 0, cantos80mais = 0;

  // Intervalos 1T: 36-45 (inclui 37-HT)
  if (ci['36-45']) {
    cantos37HT = (ci['36-45'].h || 0) + (ci['36-45'].a || 0);
  }

  // Intervalos 2T: 66-75, 76-85, 86-FT
  if (ci['66-75']) cantos70mais += (ci['66-75'].h || 0) + (ci['66-75'].a || 0);
  if (ci['76-85']) { cantos70mais += (ci['76-85'].h || 0) + (ci['76-85'].a || 0); cantos80mais += (ci['76-85'].h || 0) + (ci['76-85'].a || 0); }
  if (ci['86-FT']) { cantos70mais += (ci['86-FT'].h || 0) + (ci['86-FT'].a || 0); cantos80mais += (ci['86-FT'].h || 0) + (ci['86-FT'].a || 0); }

  // Goals para score HT e 35'
  let gi = jogo.goalIntervals || {};
  let golsH_HT = 0, golsA_HT = 0, golsH_35 = 0, golsA_35 = 0;

  // Gols 1T
  let intervals1T = ['0-15','16-25','26-35','36-45'];
  let intervals35 = ['0-15','16-25','26-35'];

  for (let iv of intervals1T) {
    if (gi[iv]) { golsH_HT += (gi[iv].h || 0); golsA_HT += (gi[iv].a || 0); }
  }
  for (let iv of intervals35) {
    if (gi[iv]) { golsH_35 += (gi[iv].h || 0); golsA_35 += (gi[iv].a || 0); }
  }

  let scoreHT_time = isHome ? golsH_HT : golsA_HT;
  let scoreHT_adv = isHome ? golsA_HT : golsH_HT;
  let score35_time = isHome ? golsH_35 : golsA_35;
  let score35_adv = isHome ? golsA_35 : golsH_35;

  return {
    stats, cantos1T, cantos2T, cantosTotal,
    cantosJogoTotal, cantos2Ttotal, cantos1Ttotal,
    cantos37HT, cantos70mais, cantos80mais,
    scoreHT_time, scoreHT_adv, score35_time, score35_adv,
    homeName: jogo.homeName, awayName: jogo.awayName,
    score: jogo.score, date: jogo.date || '',
    isHome, mando: isHome ? 'casa' : 'fora'
  };
}

// ===== PREPARAR JOGOS POR CAMADA =====
function prepararCamadas(lastGames, homeId, awayId) {
  let hAsHome = lastGames.home.asHome || [];
  let hAsAway = lastGames.home.asAway || [];
  let aAsHome = lastGames.away.asHome || [];
  let aAsAway = lastGames.away.asAway || [];

  // CAMADA 1: Geral — últimos 10 de cada (casa+fora misturado)
  let allHome = [...hAsHome, ...hAsAway].sort((a, b) => (b.date || '').localeCompare(a.date || '')).slice(0, 10);
  let allAway = [...aAsHome, ...aAsAway].sort((a, b) => (b.date || '').localeCompare(a.date || '')).slice(0, 10);

  let geralHome = allHome.map(j => extrairDNAJogo(j, homeId)).filter(x => x);
  let geralAway = allAway.map(j => extrairDNAJogo(j, awayId)).filter(x => x);

  // CAMADA 2: Mando — últimos 6 (casa em casa, fora fora)
  let mandoHome = hAsHome.slice(0, 6).map(j => extrairDNAJogo(j, homeId)).filter(x => x);
  let mandoAway = aAsAway.slice(0, 6).map(j => extrairDNAJogo(j, awayId)).filter(x => x);

  // CAMADA 3: Completo — todos os 20 do mando
  let completoHome = hAsHome.map(j => extrairDNAJogo(j, homeId)).filter(x => x);
  let completoAway = aAsAway.map(j => extrairDNAJogo(j, awayId)).filter(x => x);

  return {
    geral: { home: geralHome, away: geralAway },
    mando: { home: mandoHome, away: mandoAway },
    completo: { home: completoHome, away: completoAway }
  };
}

// ===== CALCULAR MÉDIAS =====
function calcMedias(jogos) {
  if (!jogos.length) return null;
  let n = jogos.length;
  let campos = ['blocked','outsidebox','total_crosses','dangerous_attacks','shots','tackles',
    'possessiontime','insidebox','fouls','key_passes','accurate_crosses','attacks','saves','corners'];

  let medias = {};
  for (let c of campos) {
    let vals = jogos.filter(j => j.stats[c]).map(j => j.stats[c].time);
    let valsAdv = jogos.filter(j => j.stats[c]).map(j => j.stats[c].adv);
    medias[c] = { time: avg(vals), adv: avg(valsAdv) };
  }

  return {
    medias,
    cantosTotal: avg(jogos.map(j => j.cantosJogoTotal)),
    cantosAFavor: avg(jogos.map(j => j.cantosTotal.favor)),
    cantosContra: avg(jogos.map(j => j.cantosTotal.contra)),
    cantos1T: avg(jogos.map(j => j.cantos1Ttotal)),
    cantos2T: avg(jogos.map(j => j.cantos2Ttotal)),
    count: n
  };
}

// ===== CLASSIFICAR PERFIL =====
function classificarPerfil(medias) {
  if (!medias) return [];
  let tags = [], m = medias.medias;
  if (m.blocked && m.blocked.time >= 4.5) tags.push({ n: '🛡️ Bloqueador', c: 'tag-yellow', k: 'bloqueador' });
  if (m.possessiontime && m.possessiontime.time <= 42) tags.push({ n: '🧱 Retrancado', c: 'tag-red', k: 'retrancado' });
  if (m.possessiontime && m.possessiontime.time >= 55) tags.push({ n: '🎯 Dominante', c: 'tag-blue', k: 'dominante' });
  if (m.dangerous_attacks && m.dangerous_attacks.time >= 40) tags.push({ n: '💥 Ofensivo', c: 'tag-green', k: 'ofensivo' });
  if (m.dangerous_attacks && m.dangerous_attacks.time <= 25) tags.push({ n: '😴 Passivo', c: 'tag-red', k: 'passivo' });
  if (m.total_crosses && m.total_crosses.time >= 15) tags.push({ n: '⚔️ Cruzador', c: 'tag-blue', k: 'cruzador' });
  if (m.outsidebox && m.outsidebox.time >= 5) tags.push({ n: '🎯 Chuta de Fora', c: 'tag-blue', k: 'chutaFora' });
  if (m.tackles && m.tackles.time >= 14) tags.push({ n: '⚡ Agressivo', c: 'tag-yellow', k: 'agressivo' });
  if (medias.cantosAFavor >= 5.5) tags.push({ n: '🔥 Produtor Cantos', c: 'tag-green', k: 'produtorCantos' });
  if (medias.cantosContra >= 5.5) tags.push({ n: '🥅 Cede Cantos', c: 'tag-red', k: 'cedeCantos' });
  return tags;
}

// ===== CENÁRIOS DNA =====
const CENARIOS_DNA = [
  // 1ºT
  { id:'dna_0x0_35_canto_ht', nome:'0x0 aos 35\' → 1+ Canto (37-HT)', desc:'Empate 0x0 até 35\' + DNA adversário → sai canto até o intervalo', grupo:'1t',
    filtro: j => j.score35_time === 0 && j.score35_adv === 0, green: j => j.cantos37HT >= 1 },
  { id:'dna_0x0_35_2cantos_ht', nome:'0x0 aos 35\' → 2+ Cantos (37-HT)', desc:'Empate 0x0 até 35\' → 2+ cantos no final do 1ºT', grupo:'1t',
    filtro: j => j.score35_time === 0 && j.score35_adv === 0, green: j => j.cantos37HT >= 2 },
  { id:'dna_perdendo_35_canto_ht', nome:'Perdendo 35\' → 1+ Canto (37-HT)', desc:'Time perdendo até 35\' + DNA → pressiona e sai canto', grupo:'1t',
    filtro: j => j.score35_adv > j.score35_time, green: j => j.cantos37HT >= 1 },
  // 2ºT
  { id:'dna_0x0_ht_5cantos_2t', nome:'0x0 no HT → 5+ Cantos 2ºT', desc:'Empate 0x0 no intervalo + DNA → explosão de cantos no 2ºT', grupo:'2t',
    filtro: j => j.scoreHT_time === 0 && j.scoreHT_adv === 0, green: j => j.cantos2Ttotal >= 5 },
  { id:'dna_empate_ht_5cantos_2t', nome:'Empate HT → 5+ Cantos 2ºT', desc:'Qualquer empate no intervalo + DNA → 5+ cantos 2ºT', grupo:'2t',
    filtro: j => j.scoreHT_time === j.scoreHT_adv, green: j => j.cantos2Ttotal >= 5 },
  { id:'dna_perdendo_ht_5cantos_2t', nome:'Perdendo HT → 5+ Cantos 2ºT', desc:'Perdendo no intervalo → reação com 5+ cantos no 2ºT', grupo:'2t',
    filtro: j => j.scoreHT_adv > j.scoreHT_time, green: j => j.cantos2Ttotal >= 5 },
  { id:'dna_ganhando_ht_5cantos_2t', nome:'Ganhando HT → 5+ Cantos 2ºT', desc:'Ganhando no intervalo → adversário abre e sai cantos', grupo:'2t',
    filtro: j => j.scoreHT_time > j.scoreHT_adv, green: j => j.cantos2Ttotal >= 5 },
  { id:'dna_0x0_70_3cantos', nome:'0x0/Empate 69\' → 3+ Cantos 70+', desc:'Empatado aos 69\' → 3+ cantos nos últimos 20min', grupo:'2t',
    filtro: j => j.scoreHT_time === j.scoreHT_adv, green: j => j.cantos70mais >= 3 },
  { id:'dna_qualquer_80_2cantos', nome:'Qualquer cenário → 2+ Cantos 80+', desc:'Independente do placar → 2+ cantos nos últimos 10min', grupo:'2t',

// ===== CALCULAR IMPACTOS =====
function calcularImpactos(jogos) {
  let campos = [
    { k:'total_crosses', n:'⚔️ Cruzamentos' },
    { k:'outsidebox', n:'💥 Chutes Fora Área' },
    { k:'blocked', n:'🛡️ Bloqueados (adv)', useAdv:true },
    { k:'dangerous_attacks', n:'🔴 Ataques Perigosos' },
    { k:'tackles', n:'💪 Tackles (adv)', useAdv:true },
    { k:'possessiontime', n:'⚽ Posse' },
    { k:'insidebox', n:'📦 Chutes Dentro' },
    { k:'key_passes', n:'🔑 Passes Decisivos' }
  ];

  let impactos = [];
  for (let c of campos) {
    let comStat = jogos.filter(j => j.stats[c.k]);
    if (comStat.length < 4) continue;
    let getVal = j => c.useAdv ? j.stats[c.k].adv : j.stats[c.k].time;
    let media = avg(comStat.map(j => getVal(j)));
    let acima = comStat.filter(j => getVal(j) >= media);
    let abaixo = comStat.filter(j => getVal(j) < media);
    let cantosAcima = avg(acima.map(j => j.cantosJogoTotal));
    let cantosAbaixo = avg(abaixo.map(j => j.cantosJogoTotal));
    let diff = parseFloat((cantosAcima - cantosAbaixo).toFixed(1));
    impactos.push({ ...c, media, acima:{ cantos:cantosAcima, jogos:acima.length }, abaixo:{ cantos:cantosAbaixo, jogos:abaixo.length }, diff, impacto: diff >= 2.5 ? 'alto' : diff >= 1.0 ? 'medio' : 'baixo' });
  }
  impactos.sort((a, b) => b.diff - a.diff);
  return impactos;
}

// ===== CRUZAR DADOS =====
function cruzarDados(mediasCasa, mediasFora, impactosCasa) {
  if (!mediasCasa || !mediasFora) return [];
  let cruzamentos = [];
  for (let imp of impactosCasa) {
    if (imp.impacto === 'baixo') continue;
    let valAdv;
    if (imp.useAdv) valAdv = mediasFora.medias[imp.k] ? mediasFora.medias[imp.k].time : null;
    else valAdv = mediasFora.medias[imp.k] ? mediasFora.medias[imp.k].adv : null;
    if (valAdv === null) continue;
    let match = valAdv >= imp.media ? 'sim' : valAdv >= imp.media * 0.85 ? 'parcial' : 'nao';
    cruzamentos.push({ stat:imp.n, key:imp.k, mediaCasa:imp.media, valAdv, diff:imp.diff, impacto:imp.impacto, cantosQuandoAlto:imp.acima.cantos, cantosQuandoBaixo:imp.abaixo.cantos, match });
  }
  return cruzamentos;
}

// ===== RODAR CENÁRIOS =====
function rodarCenarios(jogosHome, tagsFora) {
  let resultados = [];
  for (let cen of CENARIOS_DNA) {
    let aptos = 0, greens = 0;
    for (let j of jogosHome) {
      if (cen.filtro(j)) { aptos++; if (cen.green(j)) greens++; }
    }
    let pctVal = pct(greens, aptos);
    let dnaTags = [];
    if (tagsFora.find(t => t.k === 'bloqueador')) dnaTags.push('vs Bloqueador');
    if (tagsFora.find(t => t.k === 'retrancado')) dnaTags.push('vs Retrancado');
    if (tagsFora.find(t => t.k === 'cedeCantos')) dnaTags.push('Cede Cantos');
    if (tagsFora.find(t => t.k === 'passivo')) dnaTags.push('vs Passivo');
    if (tagsFora.find(t => t.k === 'ofensivo')) dnaTags.push('vs Ofensivo');
    resultados.push({ ...cen, aptos, greens, pctVal: pctVal >= 0 ? pctVal : 0, dnaTags });
  }
  return resultados;
}

// ===== DNA SCORE =====
function calcDNAScore(mediasCasa, mediasFora, cruzamentos, cenarios) {
  let score = 0, maxScore = 0;
  maxScore += 20;
  if (mediasCasa) { if (mediasCasa.cantosAFavor >= 6) score += 20; else if (mediasCasa.cantosAFavor >= 5) score += 15; else if (mediasCasa.cantosAFavor >= 4) score += 10; else score += 5; }
  maxScore += 20;
  if (mediasFora) { if (mediasFora.cantosContra >= 6) score += 20; else if (mediasFora.cantosContra >= 5) score += 15; else if (mediasFora.cantosContra >= 4) score += 10; else score += 5; }
  maxScore += 15;
  if (mediasFora) { if (mediasFora.cantosTotal >= 10) score += 15; else if (mediasFora.cantosTotal >= 8) score += 10; else if (mediasFora.cantosTotal >= 6) score += 7; else score += 3; }
  maxScore += 20;
  let tm = cruzamentos.length, ms = cruzamentos.filter(c => c.match === 'sim').length, mp = cruzamentos.filter(c => c.match === 'parcial').length;
  if (tm > 0) score += Math.round(((ms + mp * 0.5) / tm) * 20);
  maxScore += 25;
  let ac = cenarios.filter(c => c.aptos > 0);
  if (ac.length > 0) { let m = avg(ac.map(c => c.pctVal)); if (m >= 70) score += 25; else if (m >= 55) score += 18; else if (m >= 40) score += 12; else score += 5; }
  let f = maxScore > 0 ? parseFloat(((score / maxScore) * 10).toFixed(1)) : 0;
  return { score: f, raw: score, max: maxScore };
}

// ===== RENDER CAMADA COMPLETA =====
function renderCamada(jogosHome, jogosAway, homeName, awayName, labelHome, labelAway, camadaNome) {
  let mediasH = calcMedias(jogosHome);
  let mediasA = calcMedias(jogosAway);
  let tagsH = classificarPerfil(mediasH);
  let tagsA = classificarPerfil(mediasA);
  let impactos = calcularImpactos(jogosHome);
  let cruzamentos = cruzarDados(mediasH, mediasA, impactos);
  let cenarios = rodarCenarios(jogosHome, tagsA);
  let c1T = cenarios.filter(c => c.grupo === '1t');
  let c2T = cenarios.filter(c => c.grupo === '2t');
  let cJ = cenarios.filter(c => c.grupo === 'jogo');
  let dnaScore = calcDNAScore(mediasH, mediasA, cruzamentos, cenarios);

  let h = '';
  h += renderDNAScore(dnaScore);
  h += renderPerfil(mediasH, tagsH, homeName, 'casa', labelHome);
  h += renderPerfil(mediasA, tagsA, awayName, 'fora', labelAway);
  h += renderImpactos(impactos);
  h += renderCruzamentos(cruzamentos);
  h += renderCenarios(c1T, '⏱️ 1º TEMPO — Cenários DNA', 'cenario-grupo-1t');
  h += renderCenarios(c2T, '⏱️ 2�� TEMPO — Cenários DNA', 'cenario-grupo-2t');
  h += renderCenarios(cJ, '⚽ JOGO TODO — Cenários DNA', 'cenario-grupo-jogo');

  return { html: h, mediasH, mediasA, tagsH, tagsA, impactos, cruzamentos, cenarios, dnaScore };
}

function renderComparativo(geral, mando, completo, homeName, awayName) {

  ];

  for (let cam of camadas) {
    h += `<div class="comparativo-col"><div class="comparativo-col-title">${cam.nome}</div>`;
    h += `<div class="comparativo-stat"><span class="label">DNA Score</span><span class="valor" style="color:${cam.data.dnaScore.score >= 7 ? '#00B37E' : cam.data.dnaScore.score >= 5 ? '#FBA94C' : '#f75a68'}">${cam.data.dnaScore.score}/10</span></div>`;

    if (cam.data.mediasH) {
      h += `<div class="comparativo-stat"><span class="label">${homeName} cantos</span><span class="valor">${cam.data.mediasH.cantosTotal}/j</span></div>`;
      h += `<div class="comparativo-stat"><span class="label">${homeName} favor</span><span class="valor" style="color:#00B37E">${cam.data.mediasH.cantosAFavor}</span></div>`;
    }
    if (cam.data.mediasA) {
      h += `<div class="comparativo-stat"><span class="label">${awayName} cantos</span><span class="valor">${cam.data.mediasA.cantosTotal}/j</span></div>`;
      h += `<div class="comparativo-stat"><span class="label">${awayName} cede</span><span class="valor" style="color:#f75a68">${cam.data.mediasA.cantosContra}</span></div>`;
    }

    // Top cenário
    let melhores = cam.data.cenarios.filter(c => c.aptos > 0).sort((a, b) => b.pctVal - a.pctVal);
    if (melhores.length) {
      let top = melhores[0];
      h += `<div class="comparativo-stat"><span class="label">Top cenário</span><span class="valor" style="color:${corPct(top.pctVal)};font-size:11px">${top.pctVal}%</span></div>`;
      h += `<div style="font-size:10px;color:#7c7c8a;margin-top:4px">${top.nome}</div>`;
    }

    // Matches
    let matchSim = cam.data.cruzamentos.filter(c => c.match === 'sim').length;
    let matchTotal = cam.data.cruzamentos.length;
    if (matchTotal > 0) {
      h += `<div class="comparativo-stat"><span class="label">Matches</span><span class="valor" style="color:${matchSim >= matchTotal * 0.6 ? '#00B37E' : '#FBA94C'}">${matchSim}/${matchTotal}</span></div>`;
    }

    h += '</div>';
  }
  h += '</div></div>';
  return h;
}

      <div class="dna-sub" style="color:#00B37E;font-weight:600;margin-top:6px">⚡ 1 chamada à API — zero requisições extras!</div></div>`;

    // Comparativo
    html += renderComparativo(resGeral, resMando, resCompleto, homeName, awayName);

    // Tabs das camadas
    html += `<div class="tabs-camada">
      <div class="tab-camada active" onclick="switchCamada('camGeral')">🔄 Geral (10)</div>
      <div class="tab-camada" onclick="switchCamada('camMando')">🏠✈️ Mando (6)</div>
      <div class="tab-camada" onclick="switchCamada('camCompleto')">📋 Completo (20)</div></div>`;

    html += `<div id="camGeral" class="camada-section active">${resGeral.html}</div>`;
    html += `<div id="camMando" class="camada-section">${resMando.html}</div>`;
    html += `<div id="camCompleto" class="camada-section">${resCompleto.html}</div>`;

    document.getElementById('resultado').innerHTML = html;
    document.getElementById('resultado').style.display = 'block';

    // Telegram
    ultimoTg = montarTelegram(homeName, awayName, resGeral, resMando, resCompleto);
    document.getElementById('btnTg').style.display = 'inline-block';
    document.getElementById('btnTg').disabled = false;

    document.getElementById('progBar').style.width = '100%';
    document.getElementById('status').innerText = `✅ DNA completo! 3 camadas processadas com 1 chamada à API`;

  } catch (e) {
    document.getElementById('status').innerText = '❌ Erro: ' + e.message;
    console.error(e);
  }
  document.getElementById('btnAnalise').disabled = false;
}
</script>
</body>
</html>
