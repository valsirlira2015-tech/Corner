<script>
const TOKEN='45003_ec8357116e';
const TG_BOT_TOKEN='8645338323:AAG5jlzVICHNz-tYHBQtfZZ-8_gr_V_FOiw', TG_CHAT_ID='294730685';
let ultimoTg = null;

async function fetchAPI(id, extra) {
  let u = `https://cornerprobet.com/api/v3/getAnalysis.php?gameId=${id}&token=${TOKEN}`;
  if (extra) u += `&${extra}`;
  let r = await fetch(u);
  return await r.json();
}

function pct(g, a) { return a > 0 ? Math.round((g / a) * 100) : -1; }
function avg(arr) { return arr.length > 0 ? parseFloat((arr.reduce((s, v) => s + v, 0) / arr.length).toFixed(1)) : 0; }
function corPct(p) { return p >= 70 ? '#00B37E' : p >= 50 ? '#FBA94C' : '#f75a68'; }
function confLabel(a) { if (a >= 8) return { t: '🟢 Alta', c: 'tag-green' }; if (a >= 4) return { t: '🟡 Média', c: 'tag-yellow' }; return { t: '🔴 Baixa', c: 'tag-red' }; }

// ===== EXTRAIR DNA DE UM JOGO =====
function extrairDNAJogo(jogo, teamId) {
  if (!jogo || !jogo.stats) return null;
  let isHome = (jogo.homeId === teamId);
  let idx = isHome ? 0 : 1;
  let idxAdv = isHome ? 1 : 0;

  let stats = {};
  let campos = ['blocked','outsidebox','total_crosses','dangerous_attacks','shots','tackles',
    'possessiontime','insidebox','fouls','key_passes','accurate_crosses','attacks','saves','corners'];
  for (let c of campos) {
    if (jogo.stats[c]) {
      stats[c] = { time: parseFloat(jogo.stats[c][idx]) || 0, adv: parseFloat(jogo.stats[c][idxAdv]) || 0 };
    }
  }

  let tc = jogo.totalCorner || {};
  let cantos1T = { favor: 0, contra: 0 }, cantos2T = { favor: 0, contra: 0 }, cantosTotal = { favor: 0, contra: 0 };
  if (tc.first) { cantos1T.favor = isHome ? (tc.first.h||0) : (tc.first.a||0); cantos1T.contra = isHome ? (tc.first.a||0) : (tc.first.h||0); }
  if (tc.second) { cantos2T.favor = isHome ? (tc.second.h||0) : (tc.second.a||0); cantos2T.contra = isHome ? (tc.second.a||0) : (tc.second.h||0); }
  if (tc.total) { cantosTotal.favor = isHome ? (tc.total.h||0) : (tc.total.a||0); cantosTotal.contra = isHome ? (tc.total.a||0) : (tc.total.h||0); }

  let cantosJogoTotal = (tc.total ? tc.total.t : 0) || (cantosTotal.favor + cantosTotal.contra);
  let cantos1Ttotal = (tc.first ? tc.first.t : 0) || (cantos1T.favor + cantos1T.contra);
  let cantos2Ttotal = (tc.second ? tc.second.t : 0) || (cantos2T.favor + cantos2T.contra);

  let ci = jogo.cornerIntervals || {};
  let cantos37HT = 0, cantos70mais = 0, cantos80mais = 0;
  if (ci['36-45']) cantos37HT = (ci['36-45'].h||0) + (ci['36-45'].a||0);
  if (ci['66-75']) cantos70mais += (ci['66-75'].h||0) + (ci['66-75'].a||0);
  if (ci['76-85']) { cantos70mais += (ci['76-85'].h||0) + (ci['76-85'].a||0); cantos80mais += (ci['76-85'].h||0) + (ci['76-85'].a||0); }
  if (ci['86-FT']) { cantos70mais += (ci['86-FT'].h||0) + (ci['86-FT'].a||0); cantos80mais += (ci['86-FT'].h||0) + (ci['86-FT'].a||0); }

  let gi = jogo.goalIntervals || {};
  let golsH_HT=0, golsA_HT=0, golsH_35=0, golsA_35=0;
  for (let iv of ['0-15','16-25','26-35','36-45']) { if (gi[iv]) { golsH_HT += (gi[iv].h||0); golsA_HT += (gi[iv].a||0); } }
  for (let iv of ['0-15','16-25','26-35']) { if (gi[iv]) { golsH_35 += (gi[iv].h||0); golsA_35 += (gi[iv].a||0); } }

  return {
    stats, cantos1T, cantos2T, cantosTotal,
    cantosJogoTotal, cantos2Ttotal, cantos1Ttotal,
    cantos37HT, cantos70mais, cantos80mais,
    scoreHT_time: isHome ? golsH_HT : golsA_HT,
    scoreHT_adv: isHome ? golsA_HT : golsH_HT,
    score35_time: isHome ? golsH_35 : golsA_35,
    score35_adv: isHome ? golsA_35 : golsH_35,
    homeName: jogo.homeName, awayName: jogo.awayName,
    score: jogo.score, date: jogo.date || '',
    isHome, mando: isHome ? 'casa' : 'fora'
  };
}

function prepararCamadas(lastGames, homeId, awayId) {
  let hH = lastGames.home.asHome || [];
  let hA = lastGames.home.asAway || [];
  let aH = lastGames.away.asHome || [];
  let aA = lastGames.away.asAway || [];

  let allHome = [...hH, ...hA].sort((a, b) => (b.date||'').localeCompare(a.date||'')).slice(0, 10);
  let allAway = [...aH, ...aA].sort((a, b) => (b.date||'').localeCompare(a.date||'')).slice(0, 10);

  return {
    geral: { home: allHome.map(j => extrairDNAJogo(j, homeId)).filter(x=>x), away: allAway.map(j => extrairDNAJogo(j, awayId)).filter(x=>x) },
    mando: { home: hH.slice(0,6).map(j => extrairDNAJogo(j, homeId)).filter(x=>x), away: aA.slice(0,6).map(j => extrairDNAJogo(j, awayId)).filter(x=>x) },
    completo: { home: hH.map(j => extrairDNAJogo(j, homeId)).filter(x=>x), away: aA.map(j => extrairDNAJogo(j, awayId)).filter(x=>x) }
  };
}

function calcMedias(jogos) {
  if (!jogos.length) return null;
  let campos = ['blocked','outsidebox','total_crosses','dangerous_attacks','shots','tackles',
    'possessiontime','insidebox','fouls','key_passes','accurate_crosses','attacks','saves','corners'];
  let medias = {};
  for (let c of campos) {
    medias[c] = { time: avg(jogos.filter(j=>j.stats[c]).map(j=>j.stats[c].time)), adv: avg(jogos.filter(j=>j.stats[c]).map(j=>j.stats[c].adv)) };
  }
  return {
    medias, count: jogos.length,
    cantosTotal: avg(jogos.map(j=>j.cantosJogoTotal)),
    cantosAFavor: avg(jogos.map(j=>j.cantosTotal.favor)),
    cantosContra: avg(jogos.map(j=>j.cantosTotal.contra)),
    cantos1T: avg(jogos.map(j=>j.cantos1Ttotal)),
    cantos2T: avg(jogos.map(j=>j.cantos2Ttotal))
  };
}

function classificarPerfil(medias) {
  if (!medias) return [];
  let tags=[], m=medias.medias;
  if (m.blocked && m.blocked.time >= 4.5) tags.push({n:'🛡️ Bloqueador',c:'tag-yellow',k:'bloqueador'});
  if (m.possessiontime && m.possessiontime.time <= 42) tags.push({n:'🧱 Retrancado',c:'tag-red',k:'retrancado'});
  if (m.possessiontime && m.possessiontime.time >= 55) tags.push({n:'🎯 Dominante',c:'tag-blue',k:'dominante'});
  if (m.dangerous_attacks && m.dangerous_attacks.time >= 40) tags.push({n:'💥 Ofensivo',c:'tag-green',k:'ofensivo'});
  if (m.dangerous_attacks && m.dangerous_attacks.time <= 25) tags.push({n:'😴 Passivo',c:'tag-red',k:'passivo'});
  if (m.total_crosses && m.total_crosses.time >= 15) tags.push({n:'⚔️ Cruzador',c:'tag-blue',k:'cruzador'});
  if (m.outsidebox && m.outsidebox.time >= 5) tags.push({n:'🎯 Chuta de Fora',c:'tag-blue',k:'chutaFora'});
  if (m.tackles && m.tackles.time >= 14) tags.push({n:'⚡ Agressivo',c:'tag-yellow',k:'agressivo'});
  if (medias.cantosAFavor >= 5.5) tags.push({n:'🔥 Produtor Cantos',c:'tag-green',k:'produtorCantos'});
  if (medias.cantosContra >= 5.5) tags.push({n:'🥅 Cede Cantos',c:'tag-red',k:'cedeCantos'});
  return tags;
}

const CENARIOS_DNA = [
  {id:'dna_0x0_35_canto_ht',nome:'0x0 aos 35\' → 1+ Canto (37-HT)',desc:'Empate 0x0 até 35\' + DNA → sai canto até o intervalo',grupo:'1t',

function calcularImpactos(jogos) {
  let campos=[
    {k:'total_crosses',n:'⚔️ Cruzamentos'},
    {k:'outsidebox',n:'💥 Chutes Fora Área'},
    {k:'blocked',n:'🛡️ Bloqueados (adv)',useAdv:true},
    {k:'dangerous_attacks',n:'🔴 Ataques Perigosos'},
    {k:'tackles',n:'💪 Tackles (adv)',useAdv:true},
    {k:'possessiontime',n:'⚽ Posse'},
    {k:'insidebox',n:'📦 Chutes Dentro'},
    {k:'key_passes',n:'🔑 Passes Decisivos'}
  ];
  let impactos=[];
  for (let c of campos) {
    let cs=jogos.filter(j=>j.stats[c.k]);
    if (cs.length<4) continue;
    let gv=j=>c.useAdv?j.stats[c.k].adv:j.stats[c.k].time;
    let media=avg(cs.map(j=>gv(j)));
    let ac=cs.filter(j=>gv(j)>=media), ab=cs.filter(j=>gv(j)<media);
    let cA=avg(ac.map(j=>j.cantosJogoTotal)), cB=avg(ab.map(j=>j.cantosJogoTotal));
    let diff=parseFloat((cA-cB).toFixed(1));
    impactos.push({...c,media,acima:{cantos:cA,jogos:ac.length},abaixo:{cantos:cB,jogos:ab.length},diff,impacto:diff>=2.5?'alto':diff>=1.0?'medio':'baixo'});
  }
  impactos.sort((a,b)=>b.diff-a.diff);
  return impactos;
}

function cruzarDados(mH,mA,imp) {
  if (!mH||!mA) return [];
  let cr=[];
  for (let i of imp) {
    if (i.impacto==='baixo') continue;
    let v; if (i.useAdv) v=mA.medias[i.k]?mA.medias[i.k].time:null; else v=mA.medias[i.k]?mA.medias[i.k].adv:null;
    if (v===null) continue;
    let match=v>=i.media?'sim':v>=i.media*0.85?'parcial':'nao';
    cr.push({stat:i.n,key:i.k,mediaCasa:i.media,valAdv:v,diff:i.diff,impacto:i.impacto,cantosQuandoAlto:i.acima.cantos,cantosQuandoBaixo:i.abaixo.cantos,match});
  }
  return cr;
}

function rodarCenarios(jogos,tagsA) {
  let res=[];
  for (let cen of CENARIOS_DNA) {
    let aptos=0,greens=0;
    for (let j of jogos) { if (cen.filtro(j)) { aptos++; if (cen.green(j)) greens++; } }
    let p=pct(greens,aptos);
    let dt=[];
    if (tagsA.find(t=>t.k==='bloqueador')) dt.push('vs Bloqueador');
    if (tagsA.find(t=>t.k==='retrancado')) dt.push('vs Retrancado');
    if (tagsA.find(t=>t.k==='cedeCantos')) dt.push('Cede Cantos');
    if (tagsA.find(t=>t.k==='passivo')) dt.push('vs Passivo');
    if (tagsA.find(t=>t.k==='ofensivo')) dt.push('vs Ofensivo');
    res.push({...cen,aptos,greens,pctVal:p>=0?p:0,dnaTags:dt});
  }
  return res;
}

function calcDNAScore(mH,mA,cr,cen) {
  let s=0,mx=0;
  mx+=20; if(mH){if(mH.cantosAFavor>=6)s+=20;else if(mH.cantosAFavor>=5)s+=15;else if(mH.cantosAFavor>=4)s+=10;else s+=5;}
  mx+=20; if(mA){if(mA.cantosContra>=6)s+=20;else if(mA.cantosContra>=5)s+=15;else if(mA.cantosContra>=4)s+=10;else s+=5;}
  mx+=15; if(mA){if(mA.cantosTotal>=10)s+=15;else if(mA.cantosTotal>=8)s+=10;else if(mA.cantosTotal>=6)s+=7;else s+=3;}
  mx+=20; let tm=cr.length,ms=cr.filter(c=>c.match==='sim').length,mp=cr.filter(c=>c.match==='parcial').length;
  if(tm>0)s+=Math.round(((ms+mp*0.5)/tm)*20);
  mx+=25; let ac=cen?cen.filter(c=>c.aptos>0):[];
  if(ac.length>0){let m=avg(ac.map(c=>c.pctVal));if(m>=70)s+=25;else if(m>=55)s+=18;else if(m>=40)s+=12;else s+=5;}
  return {score:mx>0?parseFloat(((s/mx)*10).toFixed(1)):0,raw:s,max:mx};
}

// Score sem cenários (para camada mando)
function calcDNAScoreSemCenarios(mH,mA,cr) {
  let s=0,mx=0;
  mx+=25; if(mH){if(mH.cantosAFavor>=6)s+=25;else if(mH.cantosAFavor>=5)s+=19;else if(mH.cantosAFavor>=4)s+=12;else s+=5;}
  mx+=25; if(mA){if(mA.cantosContra>=6)s+=25;else if(mA.cantosContra>=5)s+=19;else if(mA.cantosContra>=4)s+=12;else s+=5;}
  mx+=20; if(mA){if(mA.cantosTotal>=10)s+=20;else if(mA.cantosTotal>=8)s+=14;else if(mA.cantosTotal>=6)s+=8;else s+=3;}
  mx+=30; let tm=cr.length,ms=cr.filter(c=>c.match==='sim').length,mp=cr.filter(c=>c.match==='parcial').length;
  if(tm>0)s+=Math.round(((ms+mp*0.5)/tm)*30);
  return {score:mx>0?parseFloat(((s/mx)*10).toFixed(1)):0,raw:s,max:mx};
}

// ===== RENDER =====
function renderStat(label,valor,cor,sub) {
  return `<div class="dna-stat-item"><div class="dna-stat-label">${label}</div>
    <div class="dna-stat-valor" style="color:${cor||'#e1e1e6'}">${valor}</div>
    ${sub?`<div class="dna-stat-sub">${sub}</div>`:''}</div>`;
}

function renderPerfil(medias,tags,nome,tipo,label) {
  if (!medias) return `<div class="dna-perfil"><p style="color:#7c7c8a">Sem dados para ${nome}</p></div>`;
  let cor=tipo==='casa'?'#38bdf8':'#a78bfa', ic=tipo==='casa'?'🏠':'✈️';
  let h=`<div class="dna-perfil"><div class="dna-perfil-header">
    <span class="dna-team" style="color:${cor}">${ic} ${nome} — ${label} (${medias.count}j)</span>
    <div class="dna-tags">${tags.map(t=>`<span class="tag ${t.c}">${t.n}</span>`).join('')}</div></div>`;
  h+='<div class="dna-stats-grid">';
  h+=renderStat('Cantos Total',medias.cantosTotal,medias.cantosTotal>=9?'#00B37E':medias.cantosTotal>=7?'#FBA94C':'#f75a68');
  h+=renderStat('A Favor',medias.cantosAFavor,medias.cantosAFavor>=5.5?'#00B37E':'#FBA94C');
  h+=renderStat('Cedidos',medias.cantosContra,medias.cantosContra>=5.5?'#f75a68':'#FBA94C');
  h+=renderStat('1ºT',medias.cantos1T,'#e1e1e6');
  h+=renderStat('2ºT',medias.cantos2T,'#e1e1e6');
  let sc=[{k:'dangerous_attacks',n:'Ataq.Perig.'},{k:'total_crosses',n:'Cruzam.'},{k:'outsidebox',n:'Chut.Fora'},{k:'blocked',n:'Bloqueios'},{k:'tackles',n:'Tackles'},{k:'possessiontime',n:'Posse%'}];
  for (let s of sc) { if (medias.medias[s.k]) h+=renderStat(s.n,medias.medias[s.k].time,'#e1e1e6',`Adv: ${medias.medias[s.k].adv}`); }
  h+='</div></div>';
  return h;
}

function renderImpactos(impactos) {
  if (!impactos.length) return '';
  let h='<div class="dna-impacto"><div class="dna-impacto-title">📊 Impacto das Stats nos Cantos</div>';
  for (let i of impactos) {
    let cor=i.impacto==='alto'?'#00B37E':i.impacto==='medio'?'#FBA94C':'#f75a68';
    let em=i.impacto==='alto'?'🔥':i.impacto==='medio'?'⚠️':'❄️';
    let pb=Math.min(100,Math.round((i.diff/5)*100));
    h+=`<div class="dna-impacto-row"><span>${i.n} (${i.media.toFixed(1)})</span>
      <span>↑ <b style="color:#00B37E">${i.acima.cantos}</b> (${i.acima.jogos}j) | ↓ <b style="color:#f75a68">${i.abaixo.cantos}</b> (${i.abaixo.jogos}j)</span>
      <span style="color:${cor};font-weight:700">${em} ${i.impacto.toUpperCase()} (+${i.diff}) <div class="bar-bg"><div class="bar-fill" style="width:${pb}%;background:${cor}"></div></div></span></div>`;
  }
  return h+'</div>';
}

function renderCruzamentos(cr) {
  if (!cr.length) return '';
  let h='<div class="cruzamento-box"><div class="dna-impacto-title">🔥 Cruzamento: Adversário favorece cantos?</div>';
  for (let c of cr) {
    let mc=c.match==='sim'?'match-sim':c.match==='parcial'?'match-parcial':'match-nao';
    let mt=c.match==='sim'?'✅ MATCH':c.match==='parcial'?'⚠️ PARCIAL':'❌ NÃO';
    h+=`<div class="cruzamento-row"><span class="cruzamento-label">${c.stat}</span>
      <span>Adv: <b>${c.valAdv.toFixed(1)}</b> vs <b>${c.mediaCasa.toFixed(1)}</b> → Alto: <b style="color:#00B37E">${c.cantosQuandoAlto}</b></span>
      <span class="cruzamento-match ${mc}">${mt}</span></div>`;
  }
  return h+'</div>';
}

function renderCenarios(cenarios,titulo,classe) {
  let h=`<div class="cenario-grupo"><div class="cenario-grupo-header ${classe}">${titulo}</div><div class="cenario-list">`;
  let sorted=cenarios.sort((a,b)=>b.pctVal-a.pctVal);
  for (let c of sorted) {
    if (c.aptos===0) {
      h+=`<div class="cenario-row cenario-sem-dados"><div class="cenario-icon">📭</div>
        <div class="cenario-info"><div class="cenario-nome">${c.nome}</div><div class="cenario-desc">${c.desc}</div></div>
        <div class="cenario-resultado"><div class="cenario-pct" style="color:#7c7c8a">N/A</div><div class="cenario-fraction">0 jogos</div></div></div>`;
      continue;
    }
    let cor=corPct(c.pctVal),conf=confLabel(c.aptos);
    let em=c.pctVal>=70?'🟢':c.pctVal>=50?'🟡':'🔴';
    h+=`<div class="cenario-row"><div class="cenario-icon">${em}</div>
      <div class="cenario-info"><div class="cenario-nome">${c.nome}</div><div class="cenario-desc">${c.desc}</div>
        <div class="cenario-dna-tags">${c.dnaTags.map(t=>`<span class="cenario-dna-tag">${t}</span>`).join('')}</div></div>
      <div class="cenario-resultado"><div class="cenario-pct" style="color:${cor}">${c.pctVal}%</div>
        <div class="cenario-fraction">${c.greens}/${c.aptos}</div>
        <div class="cenario-confianca"><span class="tag ${conf.c}">${conf.t}</span></div></div></div>`;
  }
  return h+'</div></div>';
}

function renderDNAScore(s) {
  let cor=s.score>=7?'#00B37E':s.score>=5?'#FBA94C':'#f75a68';
  let lb=s.score>=8?'🔥 MUITO FAVORÁVEL':s.score>=6.5?'✅ FAVORÁVEL':s.score>=5?'⚠️ MODERADO':'❌ DESFAVORÁVEL';
  let pb=Math.round((s.score/10)*100);
  return `<div class="dna-score-box"><div style="font-size:12px;color:#a8a8b3;text-transform:uppercase;letter-spacing:1px">🧬 DNA Score</div>
    <div class="dna-score-valor" style="color:${cor}">${s.score}/10</div>
    <div class="dna-score-barra"><div class="dna-score-fill" style="width:${pb}%;background:${cor}"></div></div>
    <div class="dna-score-label" style="color:${cor}">${lb}</div>
    <div class="dna-score-detalhe">Pontuação: ${s.raw}/${s.max}</div></div>`;
}

// ===== CAMADA COMPLETA (com cenários) =====
function processarCamadaCompleta(jogosH,jogosA,homeN,awayN,labelH,labelA) {
  let mH=calcMedias(jogosH), mA=calcMedias(jogosA);
  let tH=classificarPerfil(mH), tA=classificarPerfil(mA);
  let imp=calcularImpactos(jogosH);
  let cr=cruzarDados(mH,mA,imp);
  let cen=rodarCenarios(jogosH,tA);
  let c1=cen.filter(c=>c.grupo==='1t'), c2=cen.filter(c=>c.grupo==='2t'), cJ=cen.filter(c=>c.grupo==='jogo');
  let ds=calcDNAScore(mH,mA,cr,cen);

  let h='';
  h+=renderDNAScore(ds);
  h+=renderPerfil(mH,tH,homeN,'casa',labelH);
  h+=renderPerfil(mA,tA,awayN,'fora',labelA);
  h+=renderImpactos(imp);
  h+=renderCruzamentos(cr);
  h+=renderCenarios(c1,'⏱️ 1º TEMPO — Cenários DNA','cenario-grupo-1t');
  h+=renderCenarios(c2,'⏱️ 2º TEMPO — Cenários DNA','cenario-grupo-2t');
  h+=renderCenarios(cJ,'⚽ JOGO TODO — Cenários DNA','cenario-grupo-jogo');

  return {html:h,mediasH:mH,mediasA:mA,tagsH:tH,tagsA:tA,impactos:imp,cruzamentos:cr,cenarios:cen,dnaScore:ds};
}

// ===== CAMADA MANDO (sem cenários) =====
function processarCamadaMando(jogosH,jogosA,homeN,awayN,labelH,labelA) {
  let mH=calcMedias(jogosH), mA=calcMedias(jogosA);
  let tH=classificarPerfil(mH), tA=classificarPerfil(mA);
  let imp=calcularImpactos(jogosH);
  let cr=cruzarDados(mH,mA,imp);
  let ds=calcDNAScoreSemCenarios(mH,mA,cr);

  let h='';
  h+=renderDNAScore(ds);
  h+=renderPerfil(mH,tH,homeN,'casa',labelH);
  h+=renderPerfil(mA,tA,awayN,'fora',labelA);
  h+=renderImpactos(imp);
  h+=renderCruzamentos(cr);
  h+=`<div class="mando-aviso">ℹ️ Cenários contextuais não disponíveis nesta camada (6 jogos = amostra insuficiente para filtros como 0x0, perdendo, etc.)<br>Use as camadas <b>🔄 Geral</b> ou <b>📋 Completo</b> para cenários.</div>`;

  return {html:h,mediasH:mH,mediasA:mA,tagsH:tH,tagsA:tA,impactos:imp,cruzamentos:cr,cenarios:null,dnaScore:ds};
}

// ===== COMPARATIVO =====
function renderComparativo(geral,mando,completo,homeN,awayN) {
  let h='<div class="comparativo-box"><div class="comparativo-title">📊 Comparativo das 3 Camadas</div><div class="comparativo-grid">';
  let cams=[{nome:'🔄 Geral (10)',d:geral},{nome:'🏠✈️ Mando (6)',d:mando},{nome:'📋 Completo (20)',d:completo}];

  for (let cam of cams) {
    h+=`<div class="comparativo-col"><div class="comparativo-col-title">${cam.nome}</div>`;
    let sc=cam.d.dnaScore;
    h+=`<div class="comparativo-stat"><span class="label">DNA Score</span><span class="valor" style="color:${sc.score>=7?'#00B37E':sc.score>=5?'#FBA94C':'#f75a68'}">${sc.score}/10</span></div>`;
    if(cam.d.mediasH){
      h+=`<div class="comparativo-stat"><span class="label">${homeN} total</span><span class="valor">${cam.d.mediasH.cantosTotal}/j</span></div>`;
      h+=`<div class="comparativo-stat"><span class="label">${homeN} favor</span><span class="valor" style="color:#00B37E">${cam.d.mediasH.cantosAFavor}</span></div>`;
    }
    if(cam.d.mediasA){
      h+=`<div class="comparativo-stat"><span class="label">${awayN} total</span><span class="valor">${cam.d.mediasA.cantosTotal}/j</span></div>`;
      h+=`<div class="comparativo-stat"><span class="label">${awayN} cede</span><span class="valor" style="color:#f75a68">${cam.d.mediasA.cantosContra}</span></div>`;
    }
    let ms=cam.d.cruzamentos.filter(c=>c.match==='sim').length, mt=cam.d.cruzamentos.length;
    if(mt>0) h+=`<div class="comparativo-stat"><span class="label">Matches</span><span class="valor" style="color:${ms>=mt*0.6?'#00B37E':'#FBA94C'}">${ms}/${mt}</span></div>`;

    if(cam.d.cenarios){
      let top=cam.d.cenarios.filter(c=>c.aptos>0).sort((a,b)=>b.pctVal-a.pctVal);
      if(top.length){h+=`<div class="comparativo-stat"><span class="label">Top cenário</span><span class="valor" style="color:${corPct(top[0].pctVal)};font-size:11px">${top[0].pctVal}%</span></div>`;
        h+=`<div style="font-size:10px;color:#7c7c8a;margin-top:4px">${top[0].nome}</div>`;}
    } else {
      h+=`<div style="font-size:10px;color:#7c7c8a;margin-top:8px;font-style:italic">Sem cenários (amostra pequena)</div>`;
    }
    h+='</div>';
  }
  h+='</div></div>';
  return h;
}

// ===== TELEGRAM =====
function montarTelegram(homeN,awayN,geral,mando,completo) {
  let m='━━━━━━━━━━━━━━━━\n🧬 <b>DNA v2 — 3 Camadas</b>\n━━━━━━━━━━━━━━━━\n\n';
  m+=`⚽ <b>${homeN} vs ${awayN}</b>\n\n`;

  let renderCam=(nome,data,comCenarios)=>{
    let lb=data.dnaScore.score>=8?'🔥':data.dnaScore.score>=6.5?'✅':data.dnaScore.score>=5?'⚠️':'❌';
    let t=`<b>${nome}</b> — DNA: ${lb} ${data.dnaScore.score}/10\n`;
    if(data.mediasH) t+=`  🏠 Cantos: ${data.mediasH.cantosTotal}/j | Favor: ${data.mediasH.cantosAFavor} | Cede: ${data.mediasH.cantosContra}\n`;
    if(data.mediasA) t+=`  ✈️ Cantos: ${data.mediasA.cantosTotal}/j | Favor: ${data.mediasA.cantosAFavor} | Cede: ${data.mediasA.cantosContra}\n`;
    if(data.tagsH.length) t+=`  🏠 ${data.tagsH.map(x=>x.n).join(' ')}\n`;
    if(data.tagsA.length) t+=`  ✈️ ${data.tagsA.map(x=>x.n).join(' ')}\n`;
    if(data.cruzamentos.length){let ms=data.cruzamentos.filter(c=>c.match==='sim').length;t+=`  🔥 Matches: ${ms}/${data.cruzamentos.length}\n`;}
    if(comCenarios&&data.cenarios){
      let bons=data.cenarios.filter(c=>c.aptos>0&&c.pctVal>=60).sort((a,b)=>b.pctVal-a.pctVal);
      if(bons.length){t+='  📋 Cenários:\n';for(let c of bons.slice(0,5)){let e=c.pctVal>=70?'🟢':'🟡';t+=`    ${e} ${c.nome} — <b>${c.pctVal}%</b> (${c.greens}/${c.aptos})\n`;}}
    }
    return t+'\n';
  };

  m+=renderCam('🔄 GERAL (10)',geral,true);
  m+=renderCam('🏠✈️ MANDO (6)',mando,false);
  m+=renderCam('📋 COMPLETO (20)',completo,true);
  m+='⏰ '+new Date().toLocaleString('pt-BR');
  return m;
}

async function enviarTelegram() {
  if (!ultimoTg) return;
  let b=document.getElementById('btnTg'),s=document.getElementById('tgStatus');
  b.disabled=true;s.style.display='block';s.innerText='Enviando...';
  try{
    let r=await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:TG_CHAT_ID,text:ultimoTg,parse_mode:'HTML',disable_web_page_preview:true})

async function executar() {

    document.getElementById('progBar').style.width='85%';

    let html='';

    html+=`<div class="dna-header"><h2>🧬 DNA v2 — Análise em 3 Camadas</h2>
      <div class="dna-match">${homeN} vs ${awayN}</div>
      <div class="dna-sub">🔄 Geral: ${camadas.geral.home.length}+${camadas.geral.away.length} | 🏠 Mando: ${camadas.mando.home.length}+${camadas.mando.away.length} | 📋 Completo: ${camadas.completo.home.length}+${camadas.completo.away.length}</div>

    html+=renderComparativo(resGeral,resMando,resCompleto,homeN,awayN);

    html+=`<div class="tabs-camada">

      <div class="tab-camada" onclick="switchCamada('camMando')">🏠✈️ Mando (6)</div>
      <div class="tab-camada" onclick="switchCamada('camCompleto')">📋 Completo (20)</div></div>`;

    html+=`<div id="camGeral" class="camada-section active">${resGeral.html}</div>`;
    html+=`<div id="camMando" class="camada-section">${resMando.html}</div>`;
    html+=`<div id="camCompleto" class="camada-section">${resCompleto.html}</div>`;

    document.getElementById('resultado').innerHTML=html;
    document.getElementById('resultado').style.display='block';

    ultimoTg=montarTelegram(homeN,awayN,resGeral,resMando,resCompleto);
    document.getElementById('btnTg').style.display='inline-block';
    document.getElementById('btnTg').disabled=false;

    document.getElementById('progBar').style.width='100%';
    document.getElementById('status').innerText=`✅ DNA completo! 3 camadas com 1 chamada à API`;

  }catch(e){
    document.getElementById('status').innerText='❌ Erro: '+e.message;
    console.error(e);
  }
  document.getElementById('btnAnalise').disabled=false;
}
</script>
