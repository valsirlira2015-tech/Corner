<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico Interativo - MacBook M1 (CD3217 + ISL9240)</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #181a20;
      --accent: #00e5ff;
      --accent-dark: #00b8cc;
      --success: #00e676;
      --fail: #ff5252;
      --text: #e0e0e0;
      --text-muted: #9e9e9e;
      --border: #2a2d35;
      --radius: 12px;
      --shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    #app { width: 100%; max-width: 900px; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; position: relative; }
    header { background: linear-gradient(135deg, #111, #1a1d25); padding: 24px; text-align: center; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.6rem; margin-bottom: 6px; }
    header p { color: var(--text-muted); font-size: 0.9rem; }
    main { padding: 24px; min-height: 400px; display: flex; flex-direction: column; gap: 16px; }
    
    /* Progress */
    .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }
    
    /* Cards */
    .card { background: #1f222a; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; opacity: 0; transform: translateY(10px); animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    .card h3 { color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .card p, .card li { font-size: 0.95rem; line-height: 1.5; color: var(--text); }
    .card ul { padding-left: 18px; margin: 10px 0; }
    .card li { margin-bottom: 6px; }
    .tag { background: #252933; padding: 2px 8px; border-radius: 6px; font-size: 0.8rem; font-family: monospace; color: var(--accent); }
    
    /* Buttons */
    .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-top: 12px; }
    .btn { padding: 14px; border: 1px solid var(--border); background: #252933; color: var(--text); border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: 500; text-align: center; }
    .btn:hover { background: #2c303a; transform: translateY(-2px); border-color: var(--accent); }
    .btn.primary { background: var(--accent-dark); color: #000; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent); }
    .btn.success { background: rgba(0,230,118,0.2); border-color: var(--success); color: var(--success); }
    .btn.fail { background: rgba(255,82,82,0.2); border-color: var(--fail); color: var(--fail); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; justify-content: flex-end; }
    
    /* Conclusion */
    .conclusion { text-align: center; padding: 20px; }
    .conclusion h2 { color: var(--accent); margin-bottom: 12px; }
    .conclusion p { margin-bottom: 16px; }
    
    /* Responsive */
    @media (max-width: 600px) {
      .btn-grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>🔍 Diagnóstico Interativo – MacBook M1</h1>
      <p>Sequência de Power-On baseada em CD3217 + ISL9240 + PMICs</p>
    </header>
    <main id="content">
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <div id="screen"></div>
    </main>
  </div>

<script>
  // Estado da aplicação
  const state = {
    symptom: null,
    stepIndex: 0,
    history: [],
    failedAt: null
  };

  // Dados das etapas (mapeados do PDF)
  const flows = {
    "nao_liga": {
      title: "Não liga / LED não acende / Sem resposta ao carregador",
      steps: [
        {
          id: "s1",
          title: "1️⃣ Entrada USB-C & CD3217",
          desc: "Verifique se a energia está chegando ao controlador de entrada.",
          measurements: [
            { rail: "PPVBUS_USBC0", expected: "~5V", tip: "Pino VBUS do conector USB-C" },
            { rail: "PPHV_INT0_AONSW", expected: "~5V", tip: "Saída interna do CD3217 (após enable)" },
            { rail: "PP3V3_UPC0_LDO", expected: "3.3V", tip: "LDO interno. Alimenta ROM e pull-up I²C_UPC" },
            { rail: "PP1V5_UPC0_LDO_CORE", expected: "1.5V", tip: "LDO de núcleo do CD3217" }
          ],
          question: "As tensões de entrada e LDOs do CD3217 estão presentes?",
          next: "s2",
          fail: "cd3217_fault"
        },
        {
          id: "s2",
          title: "2️⃣ Fusível & Charger IC (ISL9240)",
          desc: "A energia segue para o IC de carga e prepara o boost.",
          measurements: [
            { rail: "PPDCIN_USBC_AON", expected: "~5V", tip: "Após o fusível de entrada" },
            { rail: "AUX_DET", expected: "Tensão proporcional", tip: "Divisor de detecção de entrada" },
            { rail: "PPVBAT_AON_CHGR_REG", expected: "12.3V", tip: "Boost interno do ISL9240. Pré-requisito crítico!" }
          ],
          question: "O ISL9240 está gerando 12.3V no boost de saída?",
          next: "s3",
          fail: "charger_fault"
        },
        {
          id: "s3",
          title: "3️⃣ Enable AON & PP3V8",
          desc: "O sinal de enable habilita a fonte síncrona de 3.8V.",
          measurements: [
            { rail: "CHGR_EN_MVR", expected: "0 → 3.8V", tip: "Sinal lógico de habilitação" },
            { rail: "P3V8AON_PWR_EN", expected: "3.8V", tip: "Mesmo sinal após porta lógica" },
            { rail: "PP3V8_AON", expected: "3.8V", tip: "Saída do controlador AON" }
          ],
          question: "PP3V8_AON está presente e estável?",
          next: "s4",
          fail: "aon_pmic_fault"
        },
        {
          id: "s4",
          title: "4️⃣ PMICs Mestre/Escravo & Rails Críticos",
          desc: "U8100 (Master) e U7700 (Slave) iniciam comunicação e geram tensões.",
          measurements: [
            { rail: "PP3V8_AON_VDDMAIN", expected: "3.8V", tip: "Enable dos PMICs" },
            { rail: "PP1V8_S2 / PP1V8_AWAKE", expected: "1.8V", tip: "ROM, EEPROM, I/O do M1" },
            { rail: "PPVDD_SOC_S1 / PPVDD_PCPU_AWAKE", expected: "0.8~1.0V", tip: "SoC e Performance Cores" },
            { rail: "PP1V25_AWAKE_NAND", expected: "1.25V", tip: "Core da NAND" }
          ],
          question: "Os rails de 1.8V, 0.8~1.0V e NAND estão presentes?",
          next: "conclusion_ok",
          fail: "pmic_soc_fault"
        }
      ]
    },
    "carrega_nao_sobe": {
      title: "Liga, mas não sobe para 20V / Não reconhece PD",
      steps: [
        {
          id: "c1", title: "1️⃣ Comunicação I²C & Leitura de Corrente",
          desc: "O M1 precisa ler AMON e DCIN_VSENSE para negociar PD.",
          measurements: [
            { rail: "I2C_SMC_UPC (SCL/SDA)", expected: "Atividade 3.3V", tip: "Verifique pull-ups e tráfego com osciloscópio" },
            { rail: "AMON / CSIN/CSIP", expected: "Leitura válida", tip: "ISL9240 reportando corrente/tensão" }
          ],
          question: "Há comunicação I²C ativa e leitura de sensores?",
          next: "c2", fail: "i2c_sensor_fault"
        },
        {
          id: "c2", title: "2️⃣ Negociação PD & ROM TBT",
          desc: "M1 solicita via I²C_SMC_PWR a troca para 20V.",
          measurements: [
            { rail: "I2C_SMC_PWR", expected: "Atividade", tip: "Linha de controle de PD" },
            { rail: "PPVBUS_USBC0", expected: "Subindo para 20V", tip: "Monitore com multímetro ou USB-C tester" }
          ],
          question: "O carregador respondeu e subiu para 20V?",
          next: "c3", fail: "pd_negotiation_fault"
        },
        {
          id: "c3", title: "3️⃣ Ajuste Buck para 12.6V",
          desc: "M1 ordena ajuste do buck do charger.",
          measurements: [
            { rail: "PPBUS_AON / PPVBAT_AON_CHGR_REG", expected: "12.6V", tip: "Ajuste via I2C_PWR_SMC" }
          ],
          question: "PPBUS estabilizou em 12.6V?",
          next: "conclusion_ok", fail: "buck_control_fault"
        }
      ]
    },
    "sem_video_nao_boot": {
      title: "Carrega normalmente, mas não dá vídeo / Não boot",
      steps: [
        {
          id: "b1", title: "1️⃣ Clock & Reset do M1",
          desc: "M1 precisa de 24MHz e sinal de reset para iniciar.",
          measurements: [
            { rail: "PMU_CLK32K_SOC", expected: "32kHz", tip: "Gerado pelo PMIC Master U8100" },
            { rail: "PMU_RESET_L", expected: "0V → 1.8V", tip: "Sinal de reset ativo-alto para M1" },
            { rail: "Clock Interno M1", expected: "24MHz", tip: "Verifique próximo ao SoC ou buffer" }
          ],
          question: "Clock e Reset do M1 estão ativos?",
          next: "b2", fail: "clock_reset_fault"
        },
        {
          id: "b2", title: "2️⃣ Comunicação com NAND & Boot PCIe",
          desc: "M1 envia reset e clock para NAND e inicia leitura via PCIe.",
          measurements: [
            { rail: "NAND_RESET_L", expected: "Sinal ativo", tip: "Envia após M1 acordar" },
            { rail: "NAND_CLK24M", expected: "24MHz", tip: "Clock para controlador NAND" },
            { rail: "PP2V5_AWAKE_NAND", expected: "2.5V", tip: "Alimentação principal NAND" }
          ],
          question: "NAND recebeu reset, clock e alimentação?",
          next: "conclusion_ok", fail: "nand_pcie_fault"
        }
      ]
    }
  };

  // Conclusões
  const conclusions = {
    cd3217_fault: { title: "⚠️ Falha no CD3217 ou Entrada", msg: "Sem 3.3V ou 5V estável. Verifique: conector USB-C, fusível de entrada, curto em capacitores cerâmicos, ou CD3217 com defeito. Injete tensão com limite de 0.3A para localizar curto." },
    charger_fault: { title: "⚠️ ISL9240 (Charger) ou Sensor de Célula", msg: "Sem 12.3V no boost. Verifique: sinal CHGR_EN_MVR, cell voltage sensing (trilhas para bateria/conector), ou curto na saída do boost. O ISL9240 pode estar em proteção ou danificado." },
    aon_pmic_fault: { title: "⚠️ Fonte AON 3.8V ou Enable", msg: "PP3V8_AON ausente. Verifique: P3V8AON_PWR_EN chegando, componentes passivos na saída do buck, ou PMIC AON com defeito/curto interno." },
    pmic_soc_fault: { title: "⚠️ PMICs U8100/U7700 ou Curto no SoC", msg: "Rails críticos (1.8V, 0.8V, NAND) ausentes. Verifique curto nos capacitores de saída dos PMICs, falha de comunicação master/slave, ou dano no M1. Use termocâmera na injeção de 3.8V (com limite de corrente)." },
    i2c_sensor_fault: { title: "⚠️ Falha de Comunicação I²C ou Sensores", msg: "M1 não consegue ler AMON/DCIN. Verifique pull-ups em I2C_SMC_UPC, trilha aberta, ou ISL9240 travado. Limpeza de trilha e verificação de continuidade são essenciais." },
    pd_negotiation_fault: { title: "⚠️ Falha na Negociação PD ou ROM TBT", msg: "Carregador não sobe para 20V. Verifique I2C_SMC_PWR, CD3217, TBT ROM, ou firmware. Teste com outro carregador PD compatível." },
    buck_control_fault: { title: "⚠️ Controle do Buck do Charger", msg: "M1 não consegue ajustar para 12.6V. Verifique comunicação I2C_PWR_SMC, componentes de feedback do buck, ou ISL9240 com falha interna." },
    clock_reset_fault: { title: "⚠️ Clock ou Reset do M1 Ausente", msg: "M1 não inicia sem 24MHz e PMU_RESET_L. Verifique cristal, buffer, trilha de reset ou PMIC Master U8100 com falha de timing." },
    nand_pcie_fault: { title: "⚠️ Falha na NAND ou Comunicação PCIe", msg: "Sistema não boot. Verifique NAND_RESET_L, NAND_CLK24M, trilhas PCIe, ou NAND corrompida/danificada. Pode exigir restore via DFU ou substituição da placa." },
    conclusion_ok: { title: "✅ Sequência OK até este ponto", msg: "As medições estão dentro do esperado. O problema pode estar em estágios posteriores (GPU/display, firmware, ou software). Recomende: atualizar via Apple Configurator, verificar periféricos, ou avançar para diagnóstico de vídeo/software." }
  };

  // Elementos DOM
  const screen = document.getElementById('screen');
  const progress = document.getElementById('progress');

  // Funções de renderização
  function renderSymptomSelection() {
    state.symptom = null;
    state.stepIndex = 0;
    progress.style.width = '0%';
    screen.innerHTML = `
      <div class="card">
        <h3>📋 Selecione o Sintoma da Placa</h3>
        <p>Escolha o comportamento observado para iniciar o fluxo de diagnóstico interativo.</p>
        <div class="btn-grid">
          <button class="btn primary" onclick="startFlow('nao_liga')">🔌 Não liga / Sem resposta ao carregador</button>
          <button class="btn primary" onclick="startFlow('carrega_nao_sobe')">🔋 Liga, mas não sobe para 20V / PD falha</button>
          <button class="btn primary" onclick="startFlow('sem_video_nao_boot')">🖥️ Carrega, mas sem vídeo / Não dá boot</button>
        </div>
      </div>
    `;
  }

  function startFlow(symptomKey) {
    state.symptom = symptomKey;
    state.stepIndex = 0;
    state.history = [];
    state.failedAt = null;
    renderStep();
  }

  function renderStep() {
    const flow = flows[state.symptom];
    const totalSteps = flow.steps.length;
    progress.style.width = `${(state.stepIndex / totalSteps) * 100}%`;
    
    const step = flow.steps[state.stepIndex];
    let measurementsHtml = step.measurements.map(m => `
      <li><span class="tag">${m.rail}</span> → Esperado: <b>${m.expected}</b> <br><small style="color:var(--text-muted)">${m.tip}</small></li>
    `).join('');

    screen.innerHTML = `
      <div class="card">
        <h3>${step.title}</h3>
        <p>${step.desc}</p>
        <ul>${measurementsHtml}</ul>
        <p style="margin-top:12px; font-weight:500;">${step.question}</p>
        <div class="actions">
          <button class="btn fail" onclick="answer(false)">❌ Falha / Ausente</button>
          <button class="btn success" onclick="answer(true)">✅ OK / Presente</button>
        </div>
      </div>
    `;
  }

  function answer(isOk) {
    const flow = flows[state.symptom];
    const currentStep = flow.steps[state.stepIndex];
    
    if (isOk) {
      state.history.push({ step: currentStep.id, result: 'ok' });
      state.stepIndex++;
      if (state.stepIndex < flow.steps.length) {
        renderStep();
      } else {
        renderConclusion('conclusion_ok');
      }
    } else {
      state.history.push({ step: currentStep.id, result: 'fail' });
      state.failedAt = currentStep.fail;
      renderConclusion(currentStep.fail);
    }
  }

  function renderConclusion(conclusionKey) {
    const conc = conclusions[conclusionKey];
    progress.style.width = '100%';
    screen.innerHTML = `
      <div class="card conclusion">
        <h2>${conc.title}</h2>
        <p>${conc.msg}</p>
        <div class="btn-grid">
          <button class="btn primary" onclick="renderSymptomSelection()">🔄 Novo Diagnóstico</button>
          <button class="btn" onclick="downloadReport()">📄 Baixar Relatório</button>
        </div>
      </div>
    `;
  }

  function downloadReport() {
    const flow = flows[state.symptom];
    let report = `RELATÓRIO DE DIAGNÓSTICO - MACBOOK M1\n`;
    report += `Sintoma: ${flow.title}\n`;
    report += `Histórico de Medições:\n`;
    state.history.forEach((h, i) => {
      const step = flow.steps.find(s => s.id === h.step);
      report += `${i+1}. ${step.title} → Resultado: ${h.result === 'ok' ? 'OK' : 'FALHA'}\n`;
    });
    if (state.failedAt) {
      report += `\nDiagnóstico Final: ${conclusions[state.failedAt].title}\n${conclusions[state.failedAt].msg}\n`;
    }
    report += `\nGerado em: ${new Date().toLocaleString('pt-BR')}`;
    
    const blob = new Blob([report], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'diagnostico-m1.txt';
    a.click();
    URL.revokeObjectURL(url);
  }

  // Inicialização
  renderSymptomSelection();
</script>
</body>
</html>
