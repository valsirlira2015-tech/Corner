<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico Avançado – MacBook USB-C (M1/M2/T2/CD3217)</title>
  <style>
    :root {
      --bg: #0b0d12; --card: #15181e; --accent: #00e5ff; --accent-dim: #00a3b8;
      --success: #00e676; --fail: #ff5252; --text: #e0e0e0; --text-muted: #8a8f99;
      --border: #252933; --radius: 10px; --shadow: 0 6px 20px rgba(0,0,0,0.6);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; display: flex; justify-content: center; }
    #app { width: 100%; max-width: 950px; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    
    header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; }
    header h1 { font-size: 1.25rem; color: var(--accent); }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab { padding: 8px 14px; background: #1a1d25; border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
    .tab:hover { border-color: var(--accent-dim); }
    .tab.active { background: var(--accent-dim); color: #000; border-color: var(--accent); font-weight: 600; }

    main { padding: 20px; min-height: 420px; }
    .progress-bar { width: 100%; height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }

    .card { background: #1c1f28; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; opacity: 0; transform: translateY(8px); animation: fadeUp 0.35s ease forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .card h3 { color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; font-size: 1.05rem; }
    .card p, .card li { font-size: 0.9rem; line-height: 1.55; }
    .card ul { padding-left: 18px; margin: 10px 0; }
    .tag { background: #252a35; padding: 3px 8px; border-radius: 5px; font-size: 0.75rem; font-family: monospace; color: var(--accent); }
    .tag.warn { color: #ffb74d; background: #332815; }
    .tag.err { color: var(--fail); background: #2a1515; }

    .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 12px; }
    .btn { padding: 12px; border: 1px solid var(--border); background: #222630; color: var(--text); border-radius: 7px; cursor: pointer; transition: 0.2s; font-weight: 500; }
    .btn:hover { transform: translateY(-2px); border-color: var(--accent); background: #2a2f3c; }
    .btn.primary { background: var(--accent-dim); color: #000; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent); }
    .btn.success { background: rgba(0,230,118,0.15); border-color: var(--success); color: var(--success); }
    .btn.fail { background: rgba(255,82,82,0.15); border-color: var(--fail); color: var(--fail); }
    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; justify-content: flex-end; }

    table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.85rem; }
    th, td { padding: 8px 10px; border: 1px solid var(--border); text-align: left; }
    th { background: #1e222b; color: var(--accent); font-weight: 600; }
    .ref-card { margin-bottom: 16px; }
    .ref-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 12px 0; border-bottom: 1px dashed var(--border); }
    .ref-content { display: none; padding-top: 12px; }
    .ref-card.open .ref-content { display: block; }
    .scope-wave { background: #111; border: 1px solid #333; padding: 8px; font-family: monospace; font-size: 0.8rem; margin: 6px 0; border-radius: 4px; }

    .conclusion { text-align: center; padding: 20px 0; }
    .conclusion h2 { color: var(--accent); margin-bottom: 12px; }
    @media (max-width: 650px) { .btn-grid { grid-template-columns: 1fr; } header { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>🔍 Diagnóstico Avançado – MacBook USB-C</h1>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('diag')">🧪 Diagnóstico</div>
        <div class="tab" onclick="switchTab('ref')">📖 Referências Rápidas</div>
        <div class="tab" onclick="switchTab('mod')">🔧 Modificações/Straps</div>
        <div class="tab" onclick="switchTab('scope')">📈 Osciloscópio</div>
      </div>
    </header>
    <main id="content">
      <div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>
      <div id="screen"></div>
    </main>
  </div>

<script>
  // Estado
  const state = { symptom: null, stepIdx: 0, history: [], failedAt: null, tab: 'diag' };
  const progFill = document.getElementById('progFill');
  const screen = document.getElementById('screen');

  // Fluxos Interativos
  const flows = {
    "nao_liga": {
      title: "Não liga / Sem resposta ao carregador",
      steps: [
        { id:"s1", title:"1️⃣ Entrada USB-C & CD3217", desc:"Energia chega ao controlador e gera LDOs base.", measurements:[{rail:"PPVBUS_USBC0", exp:"~5V", tip:"Pino VBUS do conector"},{rail:"PP3V3_UPC0_LDO", exp:"3.3V", tip:"LDO interno. Alimenta ROM e pull-up I²C"}], question:"As tensões de entrada e LDOs do CD3217 estão presentes?", next:"s2", fail:"cd3217_fault" },
        { id:"s2", title:"2️⃣ Charger IC (ISL9240) & Boost", desc:"ISL9240 prepara o barramento principal.", measurements:[{rail:"PPDCIN_USBC_AON", exp:"~5V", tip:"Após fusível de entrada"},{rail:"PPVBAT_AON_CHGR_REG", exp:"12.3V", tip:"Boost interno. Pré-requisito para PMICs"}], question:"ISL9240 gerou 12.3V no boost?", next:"s3", fail:"charger_fault" },
        { id:"s3", title:"3️⃣ Enable AON & PMIC 3.8V", desc:"Sinal de habilitação liga a fonte síncrona.", measurements:[{rail:"CHGR_EN_MVR", exp:"0→3.8V", tip:"Enable lógico"},{rail:"PP3V8_AON", exp:"3.8V", tip:"Saída buck síncrono AON"}], question:"PP3V8_AON presente e estável?", next:"s4", fail:"aon_pmic_fault" },
        { id:"s4", title:"4️⃣ PMICs M1 (MPMU/SPMU) & Rails", desc:"U8100/U7700 iniciam comunicação SPMI e geram tensões críticas.", measurements:[{rail:"PP1V8_S2", exp:"1.8V", tip:"ROM, EEPROM, I/O M1"},{rail:"PPVDD_SOC_S1", exp:"0.8~1.0V", tip:"SoC e Performance Cores"}], question:"Rails de 1.8V e 0.8~1.0V presentes?", next:"conclusion_ok", fail:"pmic_soc_fault" }
      ]
    },
    "falha_pd_5v": {
      title: "Preso em 5V / Sem PD / CD3217 reinicializando",
      steps: [
        { id:"u1", title:"1️⃣ Resistor de Oscilador (15k 0.1%)", desc:"Pino 112(M21) no CD3217. Sem ele, o CI fica inoperante ou reinicia a porta.", question:"Resistor presente, intacto e com valor correto?", next:"u2", fail:"osc_r_fault" },
        { id:"u2", title:"2️⃣ Endereçamento I²C & Straps", desc:"Pinos CNFG (8, 19, 111) definem endereço via pull-up/down. OTP usa pull-down fixo.", question:"Configuração de straps corresponde ao endereço esperado para a posição na placa?", next:"u3", fail:"i2c_addr_fault" },
        { id:"u3", title:"3️⃣ Leitura da EEPROM (SPI)", desc:"Pino 1 (CS_L). Pulso ativo = OK. Linha reta/ruído = falha ou EEPROM corrompida.", question:"Sinal de leitura da EEPROM está ativo e estável?", next:"u4", fail:"eeprom_fault" },
        { id:"u4", title:"4️⃣ Comunicação UART Master/Slave", desc:"Em placas com 2+ CDs, um carrega firmware do outro via UART. Falha causa loop de reinício.", question:"UART ativo e handshake concluído?", next:"u5", fail:"uart_fw_fault" },
        { id:"u5", title:"5️⃣ Pull-ups I²C CNFG", desc:"I2CM_SDA_CNFG e I2CM_SCL_CNFG devem estar em ~3.3V (pull-up). Pull-down indica conflito/curto.", question:"Pull-ups presentes e estáveis?", next:"conclusion_usbc_ok", fail:"cnfg_pullup_fault" }
      ]
    },
    "carrega_nao_sobe": {
      title: "Liga, mas não sobe para 20V / PD falha",
      steps: [
        { id:"c1", title:"1️⃣ Comunicação I²C & Sensores", desc:"M1 lê AMON e DCIN_VSENSE para negociar PD.", measurements:[{rail:"I2C_SMC_UPC", exp:"Atividade 3.3V", tip:"Verifique tráfego e pull-ups"},{rail:"AMON/CSIN", exp:"Leitura válida", tip:"ISL9240 reportando corrente"}], question:"Há comunicação I²C e leitura de sensores?", next:"c2", fail:"i2c_sensor_fault" },
        { id:"c2", title:"2️⃣ Negociação PD & ROM TBT", desc:"M1 solicita via I2C_SMC_PWR a troca para 20V.", question:"Carregador respondeu e VBUS subiu para 20V?", next:"c3", fail:"pd_neg_fault" },
        { id:"c3", title:"3️⃣ Ajuste Buck para 12.6V", desc:"M1 ordena ajuste do buck via I2C_PWR_SMC.", question:"PPBUS estabilizou em 12.6V?", next:"conclusion_ok", fail:"buck_ctrl_fault" }
      ]
    },
    "sem_video_boot": {
      title: "Carrega, mas sem vídeo / Não dá boot",
      steps: [
        { id:"b1", title:"1️⃣ Clock & Reset M1", desc:"M1 precisa de 24MHz e PMU_RESET_L para iniciar.", measurements:[{rail:"PMU_CLK32K_SOC", exp:"32kHz", tip:"Gerado por U8100"},{rail:"PMU_RESET_L", exp:"0→1.8V", tip:"Reset ativo-alto"}], question:"Clock e Reset do M1 ativos?", next:"b2", fail:"clk_rst_fault" },
        { id:"b2", title:"2️⃣ Comunicação NAND & Boot PCIe", desc:"M1 envia reset/clock para NAND e inicia leitura.", measurements:[{rail:"NAND_CLK24M", exp:"24MHz", tip:"Clock controlador NAND"},{rail:"PP2V5_AWAKE_NAND", exp:"2.5V", tip:"Alimentação NAND"}], question:"NAND recebeu clock, reset e alimentação?", next:"conclusion_ok", fail:"nand_boot_fault" }
      ]
    }
  };

  const conclusions = {
    cd3217_fault: { t: "⚠️ Falha no CD3217 ou Entrada", m: "Verifique conector, fusível, curto em MLCCs ou CD3217. Injete 5V limitado a 0.3A." },
    charger_fault: { t: "⚠️ ISL9240 ou Sensor de Célula", m: "Sem 12.3V. Verifique CHGR_EN_MVR, cell sense, ou curto no boost." },
    aon_pmic_fault: { t: "⚠️ Fonte AON 3.8V ou Enable", m: "PP3V8_AON ausente. Verifique P3V8AON_PWR_EN e componentes de saída." },
    pmic_soc_fault: { t: "⚠️ PMICs U8100/U7700 ou Curto SoC", m: "Rails críticos ausentes. Verifique curto nos capacitores ou falha SPMI." },
    osc_r_fault: { t: "⚠️ Resistor de Oscilador (15k 0.1%)", m: "Pino 112(M21) ausente/oxidado. CD3217 não oscila e reinicia." },
    i2c_addr_fault: { t: "⚠️ Endereçamento I²C Incorreto", m: "Straps CNFG mal configurados. Veja aba 'Modificações/Straps'." },
    eeprom_fault: { t: "⚠️ EEPROM Corrompida/Ausente", m: "CS_L sem pulso. Substitua EEPROM ou regrave via SPI." },
    uart_fw_fault: { t: "⚠️ Falha UART Master/Slave", m: "Firmware não carregado entre CDs. Verifique linhas TX/RX e soldas." },
    cnfg_pullup_fault: { t: "⚠️ Pull-ups I²C CNFG Ausentes", m: "I2CM_SDA_CNFG em pull-down. Verifique resistores e trilhas." },
    i2c_sensor_fault: { t: "⚠️ Falha I²C ou Sensores", m: "M1 não lê AMON/DCIN. Verifique pull-ups e trilha aberta." },
    pd_neg_fault: { t: "⚠️ Negociação PD Falha", m: "Carregador não sobe para 20V. Teste outro cargador PD ou verifique ROM TBT." },
    buck_ctrl_fault: { t: "⚠️ Controle Buck do Charger", m: "M1 não ajusta para 12.6V. Verifique I2C_PWR_SMC e feedback." },
    clk_rst_fault: { t: "⚠️ Clock ou Reset Ausente", m: "M1 não inicia sem 24MHz e PMU_RESET_L. Verifique cristal/PMIC." },
    nand_boot_fault: { t: "⚠️ Falha NAND ou PCIe", m: "Sem boot. Verifique NAND_CLK24M, trilhas PCIe ou NAND danificada. DFU pode resolver." },
    conclusion_ok: { t: "✅ Sequência OK até este ponto", m: "Medições normais. Problema pode ser GPU/display, firmware ou software. Recomende restore via Apple Configurator." },
    conclusion_usbc_ok: { t: "✅ Controladores USB-C OK", m: "Endereço, EEPROM, UART e I²C válidos. Se ainda preso em 5V, verifique TBT ROM, cargador compatível ou M1/PMIC." }
  };

  // Renderização
  function switchTab(tab) {
    state.tab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
    progFill.style.width = tab === 'diag' ? `${(state.stepIdx / (flows[state.symptom]?.steps.length || 1)) * 100}%` : '100%';
    render();
  }

  function renderSymptom() {
    screen.innerHTML = `
      <div class="card">
        <h3>📋 Selecione o Sintoma</h3>
        <p>Escolha o comportamento observado para iniciar o fluxo interativo.</p>
        <div class="btn-grid">
          <button class="btn primary" onclick="startFlow('nao_liga')">🔌 Não liga / Sem resposta</button>
          <button class="btn primary" onclick="startFlow('falha_pd_5v')">🔄 Preso em 5V / CD3217 reiniciando</button>
          <button class="btn primary" onclick="startFlow('carrega_nao_sobe')">🔋 Liga, mas não sobe para 20V</button>
          <button class="btn primary" onclick="startFlow('sem_video_boot')">🖥️ Carrega, mas sem vídeo/boot</button>
        </div>
      </div>`;
  }

  function startFlow(key) {
    state.symptom = key; state.stepIdx = 0; state.history = []; state.failedAt = null;
    progFill.style.width = '0%'; renderStep();
  }

  function renderStep() {
    const flow = flows[state.symptom];
    const total = flow.steps.length;
    progFill.style.width = `${(state.stepIdx / total) * 100}%`;
    const s = flow.steps[state.stepIdx];
    let meas = s.measurements ? s.measurements.map(m => `<li><span class="tag">${m.rail}</span> → Esperado: <b>${m.exp}</b><br><small style="color:var(--text-muted)">${m.tip}</small></li>`).join('') : '';
    screen.innerHTML = `
      <div class="card">
        <h3>${s.title}</h3>
        <p>${s.desc}</p>
        ${meas ? `<ul>${meas}</ul>` : ''}
        <p style="margin-top:12px;font-weight:500;">${s.question}</p>
        <div class="actions">
          <button class="btn fail" onclick="answer(false)">❌ Falha / Ausente</button>
          <button class="btn success" onclick="answer(true)">✅ OK / Presente</button>
        </div>
      </div>`;
  }

  function answer(ok) {
    const flow = flows[state.symptom];
    const s = flow.steps[state.stepIdx];
    state.history.push({ id: s.id, res: ok ? 'ok' : 'fail' });
    if (ok) {
      state.stepIdx++;
      state.stepIdx < flow.steps.length ? renderStep() : renderConclusion(s.next);
    } else {
      state.failedAt = s.fail;
      renderConclusion(s.fail);
    }
  }

  function renderConclusion(key) {
    progFill.style.width = '100%';
    const c = conclusions[key];
    screen.innerHTML = `
      <div class="card conclusion">
        <h2>${c.t}</h2>
        <p>${c.m}</p>
        <div class="btn-grid">
          <button class="btn primary" onclick="renderSymptom()">🔄 Novo Diagnóstico</button>
          <button class="btn" onclick="exportReport()">📄 Baixar Relatório</button>
        </div>
      </div>`;
  }

  function exportReport() {
    const flow = flows[state.symptom] || {};
    let txt = `RELATÓRIO DIAGNÓSTICO MACBOOK\nSintoma: ${flow.title || state.symptom}\nHistórico:\n`;
    state.history.forEach((h, i) => {
      const s = flow.steps?.find(x => x.id === h.id);
      txt += `${i+1}. ${s?.title || h.id} → ${h.res === 'ok' ? 'OK' : 'FALHA'}\n`;
    });
    if (state.failedAt) txt += `\nDiagnóstico: ${conclusions[state.failedAt]?.t}\n${conclusions[state.failedAt]?.m}\n`;
    txt += `\nGerado em: ${new Date().toLocaleString('pt-BR')}`;
    const b = new Blob([txt], { type: 'text/plain' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'diagnostico_macbook.txt'; a.click(); URL.revokeObjectURL(a.href);
  }

  // Referências
  const refs = [
    { h: "🔌 Endereçamento I²C – CD3217", c: `
      <table><tr><th>Pino 111(M19)</th><th>Resistores (8,19)</th><th>Endereço</th><th>Tipo</th></tr>
      <tr><td>GND</td><td>Pull-Up</td><td><span class="tag">0x38</span></td><td>Normal</td></tr>
      <tr><td>NC</td><td>Pull-Up</td><td><span class="tag">0x3F</span></td><td>Normal</td></tr>
      <tr><td>GND</td><td>Pull-Down</td><td><span class="tag">0x3B</span></td><td>OTP</td></tr>
      <tr><td>NC</td><td>Pull-Down</td><td><span class="tag">0x3C</span></td><td>OTP</td></tr></table>
      <p><b>CD3215:</b> Pin 44(F1) + Pinos 29(E4)/37(D5). Endereços: 0x38, 0x3F, 0x20, 0x27.</p>
    `},
    { h: "📜 Compatibilidade & Revisões", c: `
      <p>• <b>CD3217 B12</b> → T2 / M1 | <b>CD3217 B13</b> → M2/M3 (Air). <b>Não intercambiáveis</b>.</p>
      <p>• Macs com 2 portas (M1/Air): Endereços por resistores. Troca livre sem reposicionar.</p>
      <p>• Macs com 4 portas (A2141/A2251): 2 CDs OTP + 2 normais. Exigem modificação de straps para swap.</p>
      <p>• <b>Magsafe Air M2 (820-02536):</b> U5500(0x3A), UF400/UF500 normais (substituição direta).</p>
    `},
    { h: "⚡ Oscilador Interno", c: `
      <p>• <b>CD3217:</b> Pino <b>112(M21)</b> → Resistor <b>15k ±0.1%</b>.</p>
      <p>• <b>CD3215:</b> Pino <b>54(G2)</b> → Resistor <b>15k ±0.1%</b>.</p>
      <p>• Sem ele ou oxidado: CI inoperante ou reinicializa porta USB-C.</p>
    `}
  ];

  const mods = `
    <div class="card ref-card">
      <h3>🔧 Guia de Modificação de Straps (CD3217)</h3>
      <p>Para realocar ou trocar CDs em placas com 4 portas ou Magsafe, ajuste CNFG de Pull-Down para Pull-Up e adicione resistores no pino <b>I2C_ADDR</b>:</p>
      <table><tr><th>Placa/Slot</th><th>Endereço Alvo</th><th>Resistor I2C_ADDR</th><th>Ação</th></tr>
      <tr><td>UB300 (A2141/A2251)</td><td><span class="tag">0x3B</span></td><td>140kΩ</td><td>Mover RB308/RB309 para PP3V3_UPC_TA_LDO</td></tr>
      <tr><td>UB400 (A2141/A2251)</td><td><span class="tag">0x3C</span></td><td>205kΩ</td><td>Mover RB408/RB409 para PP3V3_UPC_TA_LDO</td></tr>
      <tr><td>UG400 (A2442/A2485)</td><td><span class="tag">0x3B</span></td><td>140kΩ</td><td>Mover RG409→RG411. Remover RG201, adicionar 140k</td></tr>
      <tr><td>U5500 (M2 Air)</td><td><span class="tag">0x3A</span></td><td>84.5kΩ</td><td>Mover R5508→R5610. Adicionar 84.5k em R5650</td></tr></table>
      <p class="tag warn">⚠️ Em Silicon, os slots de modificação já vêm de fábrica. Em T2, é necessário realocar resistores e trilhas.</p>
    </div>`;

  const scope = `
    <div class="card">
      <h3>📈 Capturas de Osciloscópio (Interpretação)</h3>
      <div style="margin-top:10px;">
        <p><b>1. EEPROM SPI (Pino 1 CS_L)</b></p>
        <div class="scope-wave">✅ CORRETA: Pulsos periódicos ativos durante inicialização<br>❌ FALHA: Linha reta em ~3.3V ou ruído aleatório. EEPROM corrompida, ausente ou CI de leitura travado.</div>
        <p><b>2. UART TX/RX (Master ↔ Slave)</b></p>
        <div class="scope-wave">✅ CORRETO: Pacotes de dados assimétricos, seguidos de handshake<br>❌ FALHA: Sem atividade ou reinício a cada 2s. Comunicação UART interrompida ou firmware não carregado.</div>
        <p><b>3. I2C CNFG (SDA/SCL)</b></p>
        <div class="scope-wave">✅ CORRETO: Pull-up estável ~3.3V, com ondulação de clock/data<br>❌ FALHA: Pull-down ou nível flutuante. Resistores de pull-up abertos ou curto para GND.</div>
        <p><b>4. VBUS (CC1/CC2 → PD Boost)</b></p>
        <div class="scope-wave">✅ CORRETO: 5V estável → pulso de handshake → subida suave para 20V<br>❌ FALHA: Queda para 0V, ripple excessivo ou preso em 5V sem negociação.</div>
      </div>
    </div>`;

  function render() {
    if (state.tab === 'diag') {
      if (!state.symptom) renderSymptom();
      else if (!state.failedAt && state.stepIdx < (flows[state.symptom]?.steps.length || 0)) renderStep();
      else renderConclusion(state.failedAt || 'conclusion_ok');
    } else if (state.tab === 'ref') {
      let html = '';
      refs.forEach((r, i) => {
        html += `<div class="card ref-card" id="ref${i}">
          <div class="ref-header" onclick="toggleRef(${i})"><h3>${r.h}</h3><span>▼</span></div>
          <div class="ref-content">${r.c}</div>
        </div>`;
      });
      screen.innerHTML = html;
      setTimeout(() => document.getElementById('ref0')?.classList.add('open'), 50);
    } else if (state.tab === 'mod') {
      screen.innerHTML = mods;
    } else {
      screen.innerHTML = scope;
    }
  }

  window.toggleRef = (i) => {
    const el = document.getElementById(`ref${i}`);
    el.classList.toggle('open');
    el.querySelector('.ref-header span').textContent = el.classList.contains('open') ? '▲' : '▼';
  };

  // Init
  render();
</script>
</body>
</html>
