<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corner Analysis Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1b1b1b;--bg2:#2b2b2b;--bg3:#333;--bg4:#3d3d3d;--accent:#ffdf1b;--green:#4cd964;--red:#ff3b30;--blue:#58a6ff;--orange:#ff9500;--purple:#d2a8ff;--text:#fff;--dim:#999;--border:#3d3d3d;--green-bg:rgba(76,217,100,.12);--red-bg:rgba(255,59,48,.12);--orange-bg:rgba(255,149,0,.12);--accent-bg:rgba(255,223,27,.08)}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);padding:8px;font-size:13px;-webkit-font-smoothing:antialiased}
h1{text-align:center;color:var(--accent);font-size:18px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
h2{color:var(--accent);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}

.tab:hover{color:var(--text)}.tab.active{color:var(--bg);background:var(--accent)}
.tab-content{display:none}.tab-content.active{display:block}
.input-area{background:var(--bg2);border-radius:6px;padding:12px;margin-bottom:10px}

.input-area input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:8px 10px;font-size:13px;font-family:monospace;margin-bottom:8px}
.input-area input:focus{outline:none;border-color:var(--accent)}
.token-wrap{position:relative}.token-wrap input{padding-right:40px}
.token-toggle{position:absolute;right:8px;top:50%;transform:translateY(-70%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:4px}
.token-toggle:hover{color:var(--accent)}
.row{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
.sbtn{padding:7px 12px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--dim);font-size:12px;font-weight:700;cursor:pointer;min-width:40px;text-align:center;transition:all .15s}
.sbtn:hover{border-color:var(--accent);color:var(--accent)}.sbtn.on{border-color:var(--accent);background:var(--accent);color:var(--bg)}
.btn{display:inline-block;padding:10px 20px;border-radius:4px;border:none;font-size:13px;font-weight:700;cursor:pointer;margin:4px 4px 4px 0;transition:all .15s;text-transform:uppercase;letter-spacing:.3px}
.btn-go{background:var(--accent);color:var(--bg)}.btn-go:hover{opacity:.9}
.btn-clr{background:var(--bg4);color:var(--dim)}.btn-clr:hover{background:#555}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.status{padding:8px 12px;border-radius:4px;margin:6px 0;font-size:12px}
.s-ok{background:var(--green-bg);color:var(--green)}.s-err{background:var(--red-bg);color:var(--red)}.s-load{background:var(--accent-bg);color:var(--accent)}

.card{background:var(--bg2);border-radius:6px;padding:12px;margin:6px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.match-hdr{background:var(--bg2);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:14px 16px;margin:8px 0}
.match-hdr .teams{font-size:18px;font-weight:800}.match-hdr .meta{color:var(--dim);font-size:11px;margin-top:2px}
.match-hdr .vs{color:var(--accent);margin:0 6px}
.prof{background:var(--bg2);border-radius:6px;padding:12px;border-left:3px solid var(--border)}.prof.home{border-left-color:var(--blue)}.prof.away{border-left-color:var(--red)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.stat-box{background:var(--bg);border-radius:4px;padding:6px;text-align:center}.stat-box .v{font-size:18px;font-weight:800}.stat-box .l{font-size:9px;color:var(--dim);text-transform:uppercase}
.cv-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;text-transform:uppercase;margin-top:2px}.cv-stable{background:var(--green-bg);color:var(--green)}.cv-moderate{background:var(--orange-bg);color:var(--orange)}.cv-unstable{background:var(--red-bg);color:var(--red)}
.tbl{width:100%;border-collapse:collapse;font-size:11px;margin:6px 0}.tbl th{background:var(--bg);color:var(--accent);padding:6px 8px;text-align:center;font-size:10px;text-transform:uppercase;font-weight:700}.tbl td{padding:5px 8px;border-bottom:1px solid var(--bg4);text-align:center}.tbl tr:hover{background:rgba(255,255,255,.03)}
.c-g{color:var(--green)}.c-o{color:var(--orange)}.c-r{color:var(--red)}
.hit{font-size:10px;color:var(--dim);margin-left:2px}
.bar{background:var(--bg4);border-radius:3px;height:18px;overflow:hidden;margin:2px 0}.bar-f{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--bg);min-width:18px}

.alert{border-radius:6px;padding:12px;margin:6px 0;font-size:12px;border-left:3px solid}.al-dn{background:var(--red-bg);border-color:var(--red);color:var(--red)}.al-wn{background:var(--orange-bg);border-color:var(--orange);color:var(--orange)}
.al-t{font-size:13px;font-weight:700;margin-bottom:4px}.al-d{font-size:11px;opacity:.9;line-height:1.5}
.rc-card{border-left:3px solid var(--blue);border-radius:0 6px 6px 0;padding:14px;margin:8px 0;background:var(--bg2)}.rc-card.lost{border-left-color:var(--red)}
.rc-title{font-size:13px;font-weight:700;margin-bottom:8px;text-transform:uppercase}
.iv-card{background:var(--bg2);border-radius:6px;padding:12px;border-left:3px solid var(--border)}.iv-card.home{border-left-color:var(--blue)}.iv-card.away{border-left-color:var(--red)}
.iv-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.iv-name{font-size:13px;font-weight:700;text-transform:uppercase}
.iv-general{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border-radius:4px;padding:3px 8px;font-size:10px;color:var(--dim)}.iv-general .ig-pct{font-weight:700;font-size:11px}
.iv-ctx{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.iv-ctx-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;text-align:center;flex:1;min-width:80px}.iv-ctx-card.highlight{border-width:2px}.iv-ctx-card .ctx-label{font-size:10px;color:var(--dim);text-transform:uppercase;font-weight:600}.iv-ctx-card .ctx-pct{font-size:24px;font-weight:800;margin:2px 0}.iv-ctx-card .ctx-base{font-size:10px;color:var(--dim)}.iv-ctx-card .ctx-avg{font-size:11px;font-weight:700;color:var(--orange);margin-top:2px}
.iv-empty{color:var(--dim);font-size:11px;text-align:center;padding:10px;font-style:italic}
.iv-lines{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}.iv-line{background:var(--bg);border-radius:4px;padding:6px 8px;display:flex;justify-content:space-between;align-items:center}.iv-line .il-label{font-size:10px;color:var(--dim);font-weight:600}.iv-line .il-val{font-size:13px;font-weight:800}
.iv-line-section{margin-top:6px}.iv-line-title{font-size:9px;color:var(--dim);text-transform:uppercase;font-weight:600;margin-bottom:3px}
.over-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}.over-c{background:var(--bg);border-radius:4px;padding:10px;text-align:center}.over-c.hot{background:var(--green-bg)}.over-ln{font-size:11px;color:var(--dim);font-weight:600}.over-p{font-size:22px;font-weight:800;margin:2px 0}
.mom-card{background:var(--bg2);border-radius:6px;padding:14px;border-left:3px solid var(--border);margin:6px 0}.mom-card.up{border-left-color:var(--green)}.mom-card.down{border-left-color:var(--red)}.mom-card.stable{border-left-color:var(--orange)}
.mom-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}.mom-name{font-size:13px;font-weight:700;text-transform:uppercase}
.mom-badge{padding:3px 10px;border-radius:3px;font-size:10px;font-weight:800;text-transform:uppercase}.mom-badge.up{background:var(--green-bg);color:var(--green)}.mom-badge.down{background:var(--red-bg);color:var(--red)}.mom-badge.stable{background:var(--orange-bg);color:var(--orange)}
.mom-sub{font-size:9px;color:var(--dim);margin-bottom:8px;text-transform:uppercase}.mom-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.mom-item{background:var(--bg);border-radius:4px;padding:8px;text-align:center}.mom-item .mi-label{font-size:9px;color:var(--dim);text-transform:uppercase;font-weight:600}.mom-item .mi-recent{font-size:20px;font-weight:800}.mom-item .mi-general{font-size:11px;color:var(--dim);margin-top:2px}.mom-item .mi-diff{font-size:11px;font-weight:700;margin-top:2px}.mom-item .mi-diff.pos{color:var(--green)}.mom-item .mi-diff.neg{color:var(--red)}.mom-item .mi-diff.neu{color:var(--orange)}
.conf-bar{display:inline-flex;gap:2px;margin-left:4px;vertical-align:middle}.conf-sq{width:8px;height:8px;border-radius:1px;background:var(--bg4)}.conf-sq.on-h{background:var(--green)}.conf-sq.on-m{background:var(--orange)}.conf-sq.on-l{background:var(--red)}
.conf-label{font-size:9px;font-weight:700;margin-left:3px;vertical-align:middle}.conf-label.h{color:var(--green)}.conf-label.m{color:var(--orange)}.conf-label.l{color:var(--red)}
.cv2-card{background:var(--bg2);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:16px;margin:8px 0}.cv2-title{font-size:14px;font-weight:800;color:var(--accent);text-transform:uppercase;text-align:center;margin-bottom:10px}
.cv2-directions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0}.cv2-dir{background:var(--bg);border-radius:6px;padding:12px;border-top:2px solid var(--border)}.cv2-dir.d1{border-top-color:var(--blue)}.cv2-dir.d2{border-top-color:var(--red)}.cv2-dir-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:6px;text-align:center}.cv2-dir-items{display:flex;flex-direction:column;gap:4px}.cv2-dir-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:3px 0;border-bottom:1px solid var(--bg4)}.cv2-dir-row .dr-label{color:var(--dim)}.cv2-dir-row .dr-val{font-weight:700}
.cv2-convergence{background:var(--bg);border:2px solid var(--accent);border-radius:8px;padding:14px;margin-top:10px;text-align:center}.cv2-conv-title{font-size:10px;color:var(--dim);text-transform:uppercase;font-weight:700;margin-bottom:6px}.cv2-conv-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}.cv2-conv-item{background:var(--bg2);border-radius:6px;padding:10px 14px;text-align:center;min-width:100px}.cv2-conv-item.strong{border:1px solid var(--green);background:var(--green-bg)}.cv2-conv-item.moderate{border:1px solid var(--orange);background:var(--orange-bg)}.cv2-conv-item .ci-label{font-size:9px;color:var(--dim);text-transform:uppercase}.cv2-conv-item .ci-score{font-size:22px;font-weight:800;margin:2px 0}.cv2-conv-item .ci-detail{font-size:9px;color:var(--dim)}.ci-tag{font-size:9px;font-weight:700;margin-top:3px;padding:2px 6px;border-radius:3px;display:inline-block}.ci-tag.strong{background:var(--green-bg);color:var(--green)}.ci-tag.moderate{background:var(--orange-bg);color:var(--orange)}
.streak-row{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;padding:6px 0}.sk-dot{width:16px;height:16px;border-radius:50%;display:inline-block}.sk-dot.w{background:var(--green)}.sk-dot.l{background:var(--red)}.sk-dot.s{background:var(--bg4)}
.streak-summary{display:flex;gap:10px;justify-content:center;font-size:10px;color:var(--dim);margin-top:4px}
.gr{display:flex;align-items:center;gap:5px;padding:4px 6px;border-bottom:1px solid var(--bg4);font-size:11px}.gr:hover{background:rgba(255,255,255,.03)}.gr a{color:var(--text);text-decoration:none}.gr a:hover{color:var(--accent)}.gi{color:var(--dim);width:18px;text-align:right;font-weight:700;font-size:10px}.gn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.gs{font-weight:700;padding:2px 5px;border-radius:3px;font-size:10px;color:var(--text)}.gs-w{background:var(--green)}.gs-d{background:var(--orange)}.gs-l{background:var(--red)}
.api-bar{background:var(--bg2);border-radius:4px;padding:6px 12px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--dim);flex-wrap:wrap;gap:4px}.api-bar .ac{font-weight:700;font-size:12px}
.log-area{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px;font-family:monospace;font-size:10px;max-height:180px;overflow-y:auto;white-space:pre-wrap;margin-top:4px}.log-ok{color:var(--green)}.log-err{color:var(--red)}.log-info{color:var(--blue)}.log-warn{color:var(--orange)}
.none-msg{color:var(--dim);font-size:11px;text-align:center;padding:12px;font-style:italic}
.scan-card{background:var(--bg2);border-radius:6px;padding:12px;margin:6px 0;border-left:3px solid var(--border)}.scan-card.hot{border-left-color:var(--green)}.scan-card.warm{border-left-color:var(--orange)}.scan-card.cold{border-left-color:var(--red)}
.scan-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}.scan-label{font-size:12px;font-weight:700}.scan-pct{font-size:28px;font-weight:800}.scan-detail{font-size:10px;color:var(--dim)}
.scan-bar{background:var(--bg4);border-radius:3px;height:14px;overflow:hidden;margin:4px 0}.scan-fill{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--bg)}
.scan-section{margin:12px 0}.scan-section-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.game-link{color:var(--blue);text-decoration:none;font-size:9px;margin-left:4px;opacity:.7}.game-link:hover{opacity:1}
.src-tag{font-size:8px;padding:1px 4px;border-radius:2px;margin-left:3px;font-weight:600}.src-live{background:rgba(76,217,100,.15);color:var(--green)}
.dedup-info{font-size:9px;color:var(--dim);background:var(--bg);border-radius:3px;padding:2px 6px;margin-left:6px}
/* Smart */
.smart-target{background:var(--bg);border:3px solid var(--accent);border-radius:10px;padding:16px;margin:10px 0;text-align:center}
.smart-target-min{font-size:13px;color:var(--dim);text-transform:uppercase}
.smart-target-name{font-size:28px;font-weight:900;color:var(--accent);margin:4px 0}
.smart-target-desc{font-size:11px;color:var(--dim)}
.smart-detected{background:var(--bg);border:2px solid var(--blue);border-radius:8px;padding:12px;margin:8px 0}
.smart-det-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;text-align:center;margin-bottom:8px}
.smart-side{background:var(--bg2);border-radius:6px;padding:10px;margin:4px 0}
.smart-side-title{font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.smart-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}.smart-stat{background:var(--bg);border-radius:4px;padding:4px 6px;text-align:center}.smart-stat .ss-v{font-size:14px;font-weight:800}.smart-stat .ss-l{font-size:7px;color:var(--dim);text-transform:uppercase}
.smart-result{background:var(--bg2);border-radius:8px;padding:16px;margin:8px 0;border-left:4px solid var(--border)}.smart-result.strong{border-left-color:var(--green)}.smart-result.medium{border-left-color:var(--orange)}.smart-result.weak{border-left-color:var(--red)}
.smart-result-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.smart-result-label{font-size:14px;font-weight:800;text-transform:uppercase}.smart-result-pct{font-size:36px;font-weight:800}.smart-result-detail{font-size:10px;color:var(--dim)}
.smart-result-bar{background:var(--bg4);border-radius:4px;height:20px;overflow:hidden;margin:6px 0}.smart-result-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--bg)}
/* Dashboard */
.dash-score{background:var(--bg2);border:3px solid var(--accent);border-radius:12px;padding:20px;text-align:center;margin:10px 0}.dash-score-num{font-size:56px;font-weight:900;line-height:1}.dash-score-label{font-size:11px;color:var(--dim);text-transform:uppercase;margin-top:4px}.dash-score-desc{font-size:13px;font-weight:700;margin-top:6px;padding:4px 12px;border-radius:4px;display:inline-block}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0}.dash-item{background:var(--bg2);border-radius:6px;padding:10px;text-align:center;border-top:2px solid var(--border)}.dash-item.hot{border-top-color:var(--green)}.dash-item.warm{border-top-color:var(--orange)}.dash-item.cold{border-top-color:var(--red)}.dash-item-label{font-size:9px;color:var(--dim);text-transform:uppercase;font-weight:600}.dash-item-val{font-size:22px;font-weight:800;margin:2px 0}.dash-item-sub{font-size:9px;color:var(--dim)}

</head>
<body>
<h1>CORNER ANALYSIS</h1>
<p style="text-align:center;color:var(--dim);font-size:10px;margin-bottom:4px">v21 — SMART SCAN</p>
<div class="api-bar">
    <span>API: <span class="ac" style="color:var(--orange)" id="apiReal">0</span> | Cache: <span class="ac" style="color:var(--green)" id="apiCached">0</span></span>
    <span>Delay: <span class="ac" style="color:var(--blue)" id="apiDelay">350</span>ms</span>
    <span>Salvos: <span class="ac" style="color:var(--purple)" id="apiCacheSize">0</span></span>
</div>
<div class="tabs">
    <div class="tab active" onclick="switchTab('smart',this)">SMART SCAN</div>
    <div class="tab" onclick="switchTab('dash',this)">DASHBOARD</div>
    <div class="tab" onclick="switchTab('ctx',this)">CONTEXTOS</div>
    <div class="tab" onclick="switchTab('scan',this)">SCAN</div>
</div>

<!-- SMART SCAN -->
<div id="tab-smart" class="tab-content active">
<div class="input-area">
    <label>Token</label><div class="token-wrap"><input id="smartToken" type="password" value="45003_ec8357116e"><button class="token-toggle" onclick="toggleToken('smartToken',this)" type="button">SHOW</button></div>
    <label>Game ID</label><input id="smartGameId" value="rlj62">
    <label>Lado</label><div class="row">
        <div class="sbtn on" onclick="setSmartSide('home',this)">CASA</div>
        <div class="sbtn" onclick="setSmartSide('away',this)">FORA</div>
        <div class="sbtn" onclick="setSmartSide('both',this)">AMBOS</div>
    </div>
    <label>Jogos histórico</label><div class="row" id="smartGRow"></div>
    <label>Min %</label><div class="row" id="smartMinRow"></div>
    <label>Base min</label><div class="row" id="smartBaseRow"></div>
    <button class="btn btn-go" id="btnSmart" onclick="runSmart()">⚡ SMART SCAN</button>
    <button class="btn btn-clr" onclick="clearSmart()">LIMPAR</button>
</div>
<div id="smartStatus"></div>
<div id="smartProg" style="display:none"><div class="pbar"><div class="pfill" id="smartFill"></div></div><span id="smartPTxt" style="color:var(--dim);font-size:10px"></span></div>
<div id="smartRes"></div>
</div>

<!-- DASHBOARD -->
<div id="tab-dash" class="tab-content">
<div class="input-area">
    <label>Token</label><div class="token-wrap"><input id="dashToken" type="password" value="45003_ec8357116e"><button class="token-toggle" onclick="toggleToken('dashToken',this)" type="button">SHOW</button></div>
    <label>Game ID</label><input id="dashGameId" value="rlj62">

function scCl(s){if(!s)return'gs-d';var sp=s.split('-').map(Number);return sp[0]>sp[1]?'gs-w':sp[0]<sp[1]?'gs-l':'gs-d'}

function cvHTML(cv){var cl=cv<=15?'cv-stable':cv<=30?'cv-moderate':'cv-unstable',lb=cv<=15?'ESTAVEL':cv<=30?'MODERADO':'INSTAVEL';return'<span class="cv-badge '+cl+'">CV:'+cv+'% '+lb+'</span>'}

var targetOpts=[{v:'37',l:'37-HT'},{v:'87',l:'87-FT'},{v:'3c70',l:'3C 70-FT'},{v:'both',l:'HT+FT'}];
(function(){var el=document.getElementById('scanTargetRow');targetOpts.forEach(function(o){var b=document.createElement('div');b.className='sbtn'+(o.v==='37'?' on':'');b.textContent=o.l;b.onclick=function(){scanTarget=o.v;el.querySelectorAll('.sbtn').forEach(function(x){x.classList.remove('on')});b.classList.add('on')};el.appendChild(b)})})();

async function cachedFetch(gid,tok){if(CACHE[gid]){apiStats.cached++;updateBar();return CACHE[gid]}apiStats.real++;updateBar();var url=API+'?gameId='+encodeURIComponent(gid)+'&token='+tok;try{var r=await fetch(url);if(r.status===429){apiStats.errors++;apiStats.delay=Math.min(apiStats.delay+250,3000);updateBar();log('429! Delay->'+apiStats.delay+'ms','warn');await dl(apiStats.delay);return cachedFetch(gid,tok)}if(!r.ok)throw new Error('HTTP '+r.status);var d=await r.json();CACHE[gid]=d;if(apiStats.delay>350&&apiStats.errors===0){apiStats.delay=Math.max(apiStats.delay-50,350);updateBar()}apiStats.errors=0;return d}catch(e){apiStats.errors++;if(apiStats.errors>=3){apiStats.delay=Math.min(apiStats.delay+500,5000);updateBar()}throw e}}
function pE(ev,isH){var li=Array.isArray(ev)?ev:Object.values(ev),cs=[],gs=[],os=isH?'h':'a';for(var i=0;i<li.length;i++){var e=li[i];if(!e)continue;if(e.tp==='c')cs.push({min:parseInt(e.t)||0,ours:e.h===os,side:e.h});if(e.tp==='g'||e.tp==='p')gs.push({min:parseInt(e.t)||0,ours:e.h===os,side:e.h})}cs.sort(function(a,b){return a.min-b.min});gs.sort(function(a,b){return a.min-b.min});return{corners:cs,goals:gs}}
function gSt(gs,min,isH){var h=0,a=0;for(var i=0;i<gs.length;i++){if(gs[i].min>min)break;if(gs[i].side==='h')h++;else a++}var o=isH?h:a,t=isH?a:h;return o>t?'winning':o<t?'losing':'drawing'}
function cRF(cs){var oc=0,tc=0,res={};for(var r=0;r<RACES.length;r++)res[RACES[r]]={winner:null,min:null};for(var i=0;i<cs.length;i++){if(cs[i].ours)oc++;else tc++;for(var r=0;r<RACES.length;r++){var t=RACES[r];if(res[t].winner)continue;if(oc>=t)res[t]={winner:'ours',min:cs[i].min};else if(tc>=t)res[t]={winner:'theirs',min:cs[i].min}}}for(var r=0;r<RACES.length;r++)if(!res[RACES[r]].winner)res[RACES[r]]={winner:'none',min:null};return res}
async function collectIds(sid,tok,tgt,role){var gm={},ord=[],cur=sid,rd=0,md=null;while(ord.length<tgt&&rd<15){rd++;try{var d=await cachedFetch(cur,tok);if(rd===1)md=d;var lg=dF(d,'lastGames'),li=null;if(role==='home'&&lg&&lg.home&&lg.home.asHome)li=lg.home.asHome;else if(role==='away'&&lg&&lg.away&&lg.away.asAway)li=lg.away.asAway;if(!li||!li.length)break;var nc=0;for(var i=0;i<li.length;i++){if(ord.length>=tgt)break;if(!gm[li[i].id]){gm[li[i].id]=li[i];ord.push(li[i].id);nc++}}log(role+' R'+rd+': +'+nc+' total='+ord.length,'ok');if(!nc||ord.length>=tgt)break;cur=li[li.length-1].id;await dl(apiStats.delay)}catch(e){log('ERR '+e.message,'err');break}}return{games:gm,order:ord,mainData:md}}
function getLive(ls,stat,min){if(!ls||!ls[stat])return null;var d=ls[stat];for(var m=min;m>=0;m--){var v=d[String(m)];if(v!==undefined&&v!==null&&Array.isArray(v))return v}return null}
function detectLastMin(gameData){var go=dF(gameData,'game')||{},ls=go.liveStats||{};var lastMin=0;for(var stat in ls){if(typeof ls[stat]==='object'&&!Array.isArray(ls[stat])){for(var m in ls[stat]){var mi=parseInt(m);if(!isNaN(mi)&&mi>lastMin&&ls[stat][m]!==null)lastMin=mi}}}return lastMin}
function extractStatsAtMin(game,isH,min){var ls=game.liveStats||{};var hIdx=isH?0:1,aIdx=isH?1:0;var hasLive=false;function lv(stat,idx){var r=getLive(ls,stat,min);if(!r)return null;hasLive=true;return r[idx]}var res={};var sfx='_'+min;
res['time_chutes'+sfx]=lv('shots',hIdx);res['time_chutes_gol'+sfx]=lv('on_target',hIdx);res['time_corners'+sfx]=lv('corners',hIdx);res['time_atq_perigosos'+sfx]=lv('dangerous_attacks',hIdx);res['time_ataques'+sfx]=lv('attacks',hIdx);res['time_posse'+sfx]=lv('possessiontime',hIdx);
res['adv_chutes'+sfx]=lv('shots',aIdx);res['adv_chutes_gol'+sfx]=lv('on_target',aIdx);res['adv_corners'+sfx]=lv('corners',aIdx);res['adv_atq_perigosos'+sfx]=lv('dangerous_attacks',aIdx);res['adv_ataques'+sfx]=lv('attacks',aIdx);
var js=getLive(ls,'shots',min),jc=getLive(ls,'corners',min),jd=getLive(ls,'dangerous_attacks',min);
res['jogo_chutes'+sfx]=js?js[0]+js[1]:null;res['jogo_corners'+sfx]=jc?jc[0]+jc[1]:null;res['jogo_atq_perigosos'+sfx]=jd?jd[0]+jd[1]:null;
res._hasLive=hasLive;return res}
function countCornersInRange(ev,minFrom,minTo){if(!ev)return 0;var li=Array.isArray(ev)?ev:Object.values(ev),cnt=0;for(var i=0;i<li.length;i++){var e=li[i];if(!e||e.tp!=='c')continue;var m=parseInt(e.t)||0;if(m>=minFrom&&m<=minTo)cnt++}return cnt}

// === SMART SCAN ===
function getSmartTarget(min){
    if(min<=36)return{type:'37ht',label:'37-HT',desc:'Corner no intervalo 37-HT',minCorners:0};
    if(min<=45)return{type:'corners',label:'≥5 CORNERS RESTANTES',desc:'Mínimo 5 corners do min '+min+' até FT',minCorners:5};
    if(min<=60)return{type:'corners',label:'≥4 CORNERS RESTANTES',desc:'Mínimo 4 corners do min '+min+' até FT',minCorners:4};
    if(min<=70)return{type:'corners',label:'≥3 CORNERS RESTANTES',desc:'Mínimo 3 corners do min '+min+' até FT',minCorners:3};
    return{type:'corners',label:'≥2 CORNERS RESTANTES',desc:'Mínimo 2 corners do min '+min+' até FT',minCorners:2};
}
function getSmartCriteria(min){
    var sfx='_'+min,c=[];
    c.push({label:'TIME: chutes até '+min+'\'',field:'time_chutes'+sfx,thresholds:[1,2,3,4,5,6,7,8,10,12],group:'tc'});
    c.push({label:'TIME: chutes gol até '+min+'\'',field:'time_chutes_gol'+sfx,thresholds:[1,2,3,4,5,6],group:'tcg'});
    c.push({label:'TIME: corners até '+min+'\'',field:'time_corners'+sfx,thresholds:[1,2,3,4,5,6,7],group:'tco'});
    c.push({label:'TIME: atq perigosos até '+min+'\'',field:'time_atq_perigosos'+sfx,thresholds:[3,5,8,10,12,15,18,20,25,30],group:'ta'});
    c.push({label:'TIME: posse até '+min+'\'',field:'time_posse'+sfx,thresholds:[25,30,35,40,45,50,55,60,65],group:'tp'});
    c.push({label:'ADV: chutes até '+min+'\'',field:'adv_chutes'+sfx,thresholds:[1,2,3,4,5,6,7,8,10],group:'ac'});
    c.push({label:'ADV: chutes gol até '+min+'\'',field:'adv_chutes_gol'+sfx,thresholds:[1,2,3,4,5],group:'acg'});
    c.push({label:'ADV: corners até '+min+'\'',field:'adv_corners'+sfx,thresholds:[1,2,3,4,5,6],group:'aco'});
    c.push({label:'ADV: atq perigosos até '+min+'\'',field:'adv_atq_perigosos'+sfx,thresholds:[3,5,8,10,12,15,18,20],group:'aa'});
    c.push({label:'JOGO: chutes até '+min+'\'',field:'jogo_chutes'+sfx,thresholds:[3,5,7,8,10,12,15,18],group:'jc'});
    c.push({label:'JOGO: corners até '+min+'\'',field:'jogo_corners'+sfx,thresholds:[1,2,3,4,5,6,7,8,10],group:'jco'});
    c.push({label:'JOGO: atq perigosos até '+min+'\'',field:'jogo_atq_perigosos'+sfx,thresholds:[8,10,15,20,25,30,35,40,50],group:'ja'});
    return c;
}
function dedupScore(r){return r.pct*Math.sqrt(r.base)}
function dedupSingles(results){var groups={};for(var i=0;i<results.length;i++){var r=results[i],key=r.label.replace(/ ≥\d+$/,'');if(!groups[key]||dedupScore(r)>dedupScore(groups[key]))groups[key]=r}var out=[];for(var k in groups)out.push(groups[k]);return out}
function dedupCombos(results){var groups={};for(var i=0;i<results.length;i++){var r=results[i],parts=r.label.split(' + '),k1=parts[0].replace(/ ≥\d+$/,''),k2=parts[1]?parts[1].replace(/ ≥\d+$/,''):'',pair=[k1,k2].sort(),key=pair[0]+'|'+pair[1];if(!groups[key]||dedupScore(r)>dedupScore(groups[key]))groups[key]=r}var out=[];for(var k in groups)out.push(groups[k]);return out}

async function runSmart(){
    if(isRunning)return;var tok=document.getElementById('smartToken').value.trim(),gid=document.getElementById('smartGameId').value.trim();if(!tok||!gid)return;
    isRunning=true;document.getElementById('btnSmart').disabled=true;document.getElementById('btnSmart').textContent='AGUARDE...';
    document.getElementById('smartStatus').innerHTML='<div class="status s-load">Detectando minuto...</div>';document.getElementById('smartProg').style.display='block';document.getElementById('smartRes').innerHTML='';
    try{
        // 1. Detectar minuto atual
        var mainData=await cachedFetch(gid,tok);
        var detMin=detectLastMin(mainData);
        var gameName=dF(mainData,'game')||{};
        var hn=gameName.homeName||'Home',an=gameName.awayName||'Away';
        if(detMin<1){document.getElementById('smartStatus').innerHTML='<div class="status s-err">Jogo sem liveStats (não começou ou sem dados)</div>';isRunning=false;document.getElementById('btnSmart').disabled=false;document.getElementById('btnSmart').textContent='⚡ SMART SCAN';return}
        var target=getSmartTarget(detMin);
        log('Detectado min '+detMin+' → alvo: '+target.label,'ok');
        document.getElementById('smartStatus').innerHTML='<div class="status s-load">Min '+detMin+'\' detectado → '+target.label+'</div>';

        // Detectar dados atuais do jogo
        var go=dF(mainData,'game')||{},ls=go.liveStats||{};
        function lvCur(stat,idx){var d2=ls[stat];if(!d2)return null;for(var m=detMin;m>=0;m--){var v=d2[String(m)];if(v!==undefined&&v!==null&&Array.isArray(v))return v[idx]}return null}
        var curHome={ch:lvCur('shots',0),cg:lvCur('on_target',0),co:lvCur('corners',0),atq:lvCur('dangerous_attacks',0),po:lvCur('possessiontime',0)};
        var curAway={ch:lvCur('shots',1),cg:lvCur('on_target',1),co:lvCur('corners',1),atq:lvCur('dangerous_attacks',1),po:lvCur('possessiontime',1)};
        var ev0=dF(mainData,'eventsClean');var p0=ev0?pE(ev0,true):{goals:[]};var stateHome=gSt(p0.goals,detMin,true);var stateAway=stateHome==='winning'?'losing':stateHome==='losing'?'winning':'drawing';

        // 2. Rodar para cada lado
        var sides=[];
        if(smartSide==='home'||smartSide==='both')sides.push({role:'home',name:hn,isH:true,cur:curHome,state:stateHome});
        if(smartSide==='away'||smartSide==='both')sides.push({role:'away',name:an,isH:false,cur:curAway,state:stateAway});

        var allSideResults=[];
        for(var si=0;si<sides.length;si++){
            var sd=sides[si];
            document.getElementById('smartStatus').innerHTML='<div class="status s-load">Coletando '+sd.name+'...</div>';
            var cR=await collectIds(gid,tok,smartGames,sd.role);
            var ids=cR.order,gm=cR.games;
            var games=[],liveCount=0;
            for(var i=0;i<ids.length;i++){
                document.getElementById('smartFill').style.width=Math.round((i+1)/ids.length*100)+'%';
                document.getElementById('smartPTxt').textContent=sd.name+' ('+(i+1)+'/'+ids.length+')';
                try{
                    var d=await cachedFetch(ids[i],tok);var go2=dF(d,'game')||{},ev2=dF(d,'eventsClean');
                    var ciG=go2.cornerIntervals||null,p2=ev2?pE(ev2,sd.isH):{corners:[],goals:[]};
                    var ht37=ciG?ciG['37-HT']:null,ft87=ciG?ciG['87-FT']:null;
                    var stats=extractStatsAtMin(go2,sd.isH,detMin);if(stats._hasLive)liveCount++;
                    var cornersAfter=countCornersInRange(ev2,detMin,999);
                    var hitTarget;
                    if(target.type==='37ht'){hitTarget=ht37&&ht37.t>0}
                    else{hitTarget=cornersAfter>=target.minCorners}
                    games.push({id:ids[i],info:gm[ids[i]]||{},stats:stats,hitTarget:hitTarget,cornersAfter:cornersAfter,has37:ht37&&ht37.t>0,totalCorners:p2.corners.length});
                }catch(e){log('ERR: '+e.message,'err')}
                if(i<ids.length-1&&!CACHE[ids[i+1]])await dl(apiStats.delay);
            }
            // SCAN
            var criteria=getSmartCriteria(detMin);
            var rawS=[],rawC=[];
            for(var c2=0;c2<criteria.length;c2++){var cr=criteria[c2];for(var th=0;th<cr.thresholds.length;th++){var threshold=cr.thresholds[th],base=0,hit=0,sk=[],mG=[];
                for(var g=0;g<games.length;g++){var val=games[g].stats[cr.field];if(val===undefined||val===null)continue;if(val>=threshold){base++;var h2=games[g].hitTarget;sk.push(h2);if(h2)hit++;mG.push({id:games[g].id,info:games[g].info,hit:h2,ca:games[g].cornersAfter})}}

var hR5p=hN?Math.round(hR5/hN*100):0,aR5p=aN?Math.round(aR5/aN*100):0,hR7p=hN?Math.round(hR7/hN*100):0,aR7p=aN?Math.round(aR7/aN*100):0;
var h37p=hN?Math.round(h37/hN*100):0,a37p=aN?Math.round(a37/aN*100):0,h87p=hN?Math.round(h87/hN*100):0,a87p=aN?Math.round(a87/aN*100):0;
var hCVv=calcCV(hCV),aCVv=calcCV(aCV2);
var score=50;score+=Math.min((parseFloat(hAvgF)-4)*3,12);score+=Math.min((parseFloat(aAvgCed)-3)*3,12);score+=(hR5p-50)*0.15;score+=(aR5p-50)*0.15;score+=(h37p-50)*0.1;score+=(a37p-50)*0.1;if(hCVv<=20)score+=5;else if(hCVv>=40)score-=5;score=Math.max(0,Math.min(100,Math.round(score)));
var scoreCl=score>=70?'var(--green)':score>=50?'var(--orange)':'var(--red)',scoreDesc=score>=80?'EXCELENTE':score>=70?'BOM':score>=55?'MODERADO':score>=40?'FRACO':'EVITAR',scoreBg=score>=70?'var(--green-bg)':score>=50?'var(--orange-bg)':'var(--red-bg)';
var h2='<div class="match-hdr"><div class="meta">'+(gm2.leagueName||'')+'</div><div class="teams">'+hn+'<span class="vs">vs</span>'+an+'</div><div class="meta">CASA: '+hN+' | FORA: '+aN+'</div></div>';
h2+='<div class="dash-score" style="border-color:'+scoreCl+'"><div class="dash-score-num" style="color:'+scoreCl+'">'+score+'</div><div class="dash-score-label">SCORE CORNER</div><div class="dash-score-desc" style="background:'+scoreBg+';color:'+scoreCl+'">'+scoreDesc+'</div></div>';
h2+='<div class="dash-grid"><div class="dash-item" style="border-top-color:var(--blue)"><div class="dash-item-label">'+hn+'</div><div class="dash-item-val" style="color:var(--blue)">'+hAvgF+'</div><div class="dash-item-sub">corners/jogo</div>'+cvHTML(hCVv)+'</div><div class="dash-item" style="border-top-color:var(--red)"><div class="dash-item-label">'+an+'</div><div class="dash-item-val" style="color:var(--red)">'+aAvgCed+'</div><div class="dash-item-sub">cedidos/jogo</div>'+cvHTML(aCVv)+'</div></div>';
h2+='<h2>MÉTRICAS</h2><div class="dash-grid">';
function dm(l,hv,av){var avg=Math.round((hv+av)/2);return'<div class="dash-item '+(avg>=70?'hot':avg>=50?'warm':'cold')+'"><div class="dash-item-label">'+l+'</div><div class="dash-item-val '+cLvl(avg)+'">'+avg+'%</div><div class="dash-item-sub"><span style="color:var(--blue)">C:'+hv+'%</span> <span style="color:var(--red)">F:'+av+'%</span></div></div>'}
h2+=dm('Race 5',hR5p,aR5p)+dm('Race 7',hR7p,aR7p)+dm('37-HT',h37p,a37p)+dm('87-FT',h87p,a87p)+'</div>';
h2+='<h2>RECOMENDAÇÕES</h2>';var recs=[{n:'Race 5 Casa',p:hR5p,d:hn},{n:'Race 5 Cedido',p:aR5p,d:an},{n:'Race 7 Casa',p:hR7p,d:hn},{n:'Race 7 Cedido',p:aR7p,d:an},{n:'37-HT Casa',p:h37p,d:hn},{n:'37-HT Fora',p:a37p,d:an},{n:'87-FT Casa',p:h87p,d:hn},{n:'87-FT Fora',p:a87p,d:an}];recs.sort(function(a,b){return b.p-a.p});
for(var i=0;i<recs.length;i++){var r=recs[i],cl=r.p>=70?'go':r.p>=50?'maybe':'skip',icon=r.p>=70?'🟢':r.p>=50?'🟡':'🔴';h2+='<div class="dash-rec '+cl+'"><div class="dash-rec-icon">'+icon+'</div><div class="dash-rec-text"><div class="dash-rec-name">'+r.n+'</div><div class="dash-rec-detail">'+r.d+'</div></div><div class="dash-rec-pct '+cLvl(r.p)+'">'+r.p+'%</div></div>'}
document.getElementById('dashRes').innerHTML=h2;
}catch(e){document.getElementById('dashStatus').innerHTML='<div class="status s-err">ERRO: '+e.message+'</div>'}isRunning=false;document.getElementById('btnDash').disabled=false;document.getElementById('btnDash').textContent='DASHBOARD'}
function clearDash(){document.getElementById('dashRes').innerHTML='';document.getElementById('dashProg').style.display='none';document.getElementById('dashStatus').innerHTML=''}

// === CONTEXTOS (simplificado) ===
async function fetchGames(ids,gm,tok,lbl,isH,pf,pt){var res=[];for(var i=0;i<ids.length;i++){var id=ids[i];if(pf){pf.style.width=Math.round((i+1)/ids.length*100)+'%';pt.textContent=lbl+' ('+(i+1)+'/'+ids.length+')'}try{var d=await cachedFetch(id,tok);var go=dF(d,'game')||{},ev=dF(d,'eventsClean');var ci=go.cornerIntervals||null,p=ev?pE(ev,isH):{corners:[],goals:[]},rc=cRF(p.corners);var ht37=ci?ci['37-HT']:null,ft87=ci?ci['87-FT']:null;var tC=p.corners.length,oC=0;for(var c=0;c<p.corners.length;c++)if(p.corners[c].ours)oC++;res.push({id:id,info:gm[id]||{},corners:p.corners,goals:p.goals,races:rc,ht37:ht37,ft87:ft87,has37:ht37&&ht37.t>0,has87:ft87&&ft87.t>0,ht37_h:ht37?ht37.h:0,ht37_a:ht37?ht37.a:0,ht37_t:ht37?ht37.t:0,ft87_h:ft87?ft87.h:0,ft87_a:ft87?ft87.a:0,ft87_t:ft87?ft87.t:0,state37:gSt(p.goals,36,isH),state87:gSt(p.goals,86,isH),totalCorners:tC,ourCorners:oC,theirCorners:tC-oC})}catch(e){}if(i<ids.length-1&&!CACHE[ids[i+1]])await dl(apiStats.delay)}return res}
function bHP(gm){var n=gm.length;if(!n)return{};var tC=0,oC=0,rS={},rSk={},oV=[],fV=[],cV2=[];for(var r=0;r<RACES.length;r++){rS[RACES[r]]={won:0,lost:0,none:0};rSk[RACES[r]]=[]}for(var i=0;i<n;i++){tC+=gm[i].totalCorners;oC+=gm[i].ourCorners;oV.push(gm[i].ourCorners);fV.push(gm[i].theirCorners);cV2.push(gm[i].totalCorners);for(var r=0;r<RACES.length;r++){var t=RACES[r],w=gm[i].races[t].winner;w==='ours'?rS[t].won++:w==='theirs'?rS[t].lost++:rS[t].none++;rSk[t].push(w==='ours')}}for(var r=0;r<RACES.length;r++){var t=RACES[r];rS[t].wonPct=Math.round(rS[t].won/n*100);rS[t].lostPct=Math.round(rS[t].lost/n*100);rS[t].nonePct=Math.round(rS[t].none/n*100);rS[t].streak=rSk[t]}return{avgC:(tC/n).toFixed(1),avgO:(oC/n).toFixed(1),avgT:((tC-oC)/n).toFixed(1),races:rS,total:n,cvT:calcCV(cV2),cvF:calcCV(oV),cvC:calcCV(fV)}}
function buildMomentum(games,isHome){var n=games.length,rec=Math.min(5,n);if(n<5)return null;var rG=games.slice(0,rec);var metrics=[];RACES.forEach(function(r){var rW=0,aW=0,tgt2=isHome?'ours':'theirs';for(var i=0;i<rec;i++)if(rG[i].races[r].winner===tgt2)rW++;for(var i=0;i<n;i++)if(games[i].races[r].winner===tgt2)aW++;metrics.push({label:isHome?'R'+r+' ganhou':'R'+r+' sofreu',recent:Math.round(rW/rec*100),general:Math.round(aW/n*100),diff:Math.round(rW/rec*100)-Math.round(aW/n*100)})});var r37=0,a37=0;for(var i=0;i<rec;i++)if(rG[i].has37)r37++;for(var i=0;i<n;i++)if(games[i].has37)a37++;metrics.push({label:'37-HT',recent:Math.round(r37/rec*100),general:Math.round(a37/n*100),diff:Math.round(r37/rec*100)-Math.round(a37/n*100)});var up=0,dn=0;for(var i=0;i<metrics.length;i++){var d2=parseFloat(metrics[i].diff);if(d2>=15)up++;else if(d2<=-15)dn++}return{metrics:metrics,overall:up>dn?'up':dn>up?'down':'stable',recCount:rec,totalCount:n}}
function renderMomentum(name,mom,col){if(!mom)return'<div class="none-msg">Poucos jogos</div>';var h='<div class="mom-card '+mom.overall+'"><div class="mom-hdr"><div class="mom-name" style="color:'+col+'">'+name+'</div><div class="mom-badge '+mom.overall+'">'+(mom.overall==='up'?'SUBINDO':mom.overall==='down'?'CAINDO':'ESTAVEL')+'</div></div><div class="mom-sub">ULT.'+mom.recCount+' vs GERAL ('+mom.totalCount+')</div><div class="mom-grid">';for(var i=0;i<mom.metrics.length;i++){var m=mom.metrics[i],d2=parseFloat(m.diff),dCl=d2>=15?'pos':d2<=-15?'neg':'neu';h+='<div class="mom-item"><div class="mi-label">'+m.label+'</div><div class="mi-recent '+cLvl(m.recent)+'">'+m.recent+'%</div><div class="mi-general">Geral: '+m.general+'%</div><div class="mi-diff '+dCl+'">'+(d2>0?'+':'')+m.diff+'%</div></div>'}h+='</div></div>';return h}
async function runCtx(){if(isRunning)return;var tok=document.getElementById('apiToken').value.trim(),gid=document.getElementById('mainGameId').value.trim();if(!tok||!gid)return;isRunning=true;document.getElementById('btnCtx').disabled=true;document.getElementById('btnCtx').textContent='AGUARDE...';document.getElementById('ctxStatus').innerHTML='<div class="status s-load">Coletando...</div>';document.getElementById('ctxProg').style.display='block';
try{var hR=await collectIds(gid,tok,sG,'home'),aR=await collectIds(gid,tok,sG,'away');var md=hR.mainData,gm2=dF(md,'game')||{},hn=gm2.homeName||'Home',an=gm2.awayName||'Away';var hG=await fetchGames(hR.order,hR.games,tok,'CASA',true,document.getElementById('ctxFill'),document.getElementById('ctxPTxt'));var aG=await fetchGames(aR.order,aR.games,tok,'FORA',false,document.getElementById('ctxFill'),document.getElementById('ctxPTxt'));document.getElementById('ctxProg').style.display='none';document.getElementById('ctxStatus').innerHTML='<div class="status s-ok">Pronto!</div>';
var hp=bHP(hG);var aRc={};for(var r=0;r<RACES.length;r++){var t=RACES[r],wo=0,lo=0,no=0,sk=[];for(var i=0;i<aG.length;i++){var w=aG[i].races[t].winner;w==='ours'?wo++:w==='theirs'?lo++:no++;sk.push(w==='theirs')}aRc[t]={wonPct:Math.round(wo/aG.length*100),lostPct:Math.round(lo/aG.length*100),nonePct:Math.round(no/aG.length*100),won:wo,lost:lo,none:no,streak:sk}}
var awayP={};var aTV=[],aV2=[],aCV3=[];for(var i=0;i<aG.length;i++){aTV.push(aG[i].totalCorners);aV2.push(aG[i].ourCorners);aCV3.push(aG[i].theirCorners)}awayP={avgC:(aTV.reduce(function(a,b){return a+b},0)/aG.length).toFixed(1),avgO:(aV2.reduce(function(a,b){return a+b},0)/aG.length).toFixed(1),avgT:(aCV3.reduce(function(a,b){return a+b},0)/aG.length).toFixed(1),cvT:calcCV(aTV),cvF:calcCV(aV2),cvC:calcCV(aCV3)};
var hMom=buildMomentum(hG,true),aMom=buildMomentum(aG,false);
var el=document.getElementById('ctxRes');el.style.display='block';
var h='<div class="match-hdr"><div class="meta">'+(gm2.leagueName||'')+'</div><div class="teams">'+hn+'<span class="vs">vs</span>'+an+'</div><div class="meta">CASA: '+hG.length+' | FORA: '+aG.length+'</div></div>';
h+='<h2>PERFIL</h2><div class="grid2">'+mkProf(hn,'home','CASA','var(--blue)',hp,hG.length,'Favor','Contra')+mkProf(an,'away','FORA','var(--red)',{avgC:awayP.avgC,avgO:awayP.avgO,avgT:awayP.avgT,races:aRc,total:aG.length,cvT:awayP.cvT,cvF:awayP.cvF,cvC:awayP.cvC},aG.length,'Feitos','Cedidos')+'</div>';
h+='<h2>MOMENTUM</h2><div class="grid2">'+renderMomentum(hn,hMom,'var(--blue)')+renderMomentum(an,aMom,'var(--red)')+'</div>';
el.innerHTML=h;
}catch(e){document.getElementById('ctxStatus').innerHTML='<div class="status s-err">ERRO: '+e.message+'</div>'}isRunning=false;document.getElementById('btnCtx').disabled=false;document.getElementById('btnCtx').textContent='ANALISAR'}
function mkProf(nm,tp,label,col,data,n,lO,lT){return'<div class="prof '+tp+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:700;color:'+col+'">'+nm+'</div><div style="background:'+col+';color:var(--bg);padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700">'+label+'</div></div><div class="stat-grid"><div class="stat-box"><div class="v" style="color:var(--orange)">'+data.avgC+'</div><div class="l">Total</div>'+cvHTML(data.cvT)+'</div><div class="stat-box"><div class="v" style="color:var(--blue)">'+data.avgO+'</div><div class="l">'+lO+'</div>'+cvHTML(data.cvF)+'</div><div class="stat-box"><div class="v" style="color:var(--red)">'+data.avgT+'</div><div class="l">'+lT+'</div>'+cvHTML(data.cvC)+'</div><div class="stat-box"><div class="v" style="color:var(--green)">'+n+'</div><div class="l">Jogos</div></div></div><table class="tbl"><tr><th>Race</th><th>Ganhou</th><th>Perdeu</th><th>—</th></tr>'+RACES.map(function(t){var rs=data.races[t];return'<tr><td style="font-weight:700;color:var(--accent)">'+t+'</td><td class="'+cLvl(rs.wonPct)+'" style="font-weight:700">'+rs.wonPct+'%'+HT(rs.won,n)+'</td><td style="color:var(--red)">'+rs.lostPct+'%'+HT(rs.lost,n)+'</td><td style="color:var(--dim)">'+rs.nonePct+'%</td></tr>'}).join('')+'</table></div>'}
function clearCtx(){document.getElementById('ctxRes').style.display='none';document.getElementById('ctxRes').innerHTML='';document.getElementById('ctxProg').style.display='none';document.getElementById('ctxStatus').innerHTML=''}
