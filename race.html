<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corner Analysis Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1b1b1b;--bg2:#2b2b2b;--bg3:#333;--bg4:#3d3d3d;--accent:#ffdf1b;--green:#4cd964;--red:#ff3b30;--blue:#58a6ff;--orange:#ff9500;--purple:#d2a8ff;--text:#fff;--dim:#999;--border:#3d3d3d;--green-bg:rgba(76,217,100,.12);--red-bg:rgba(255,59,48,.12);--orange-bg:rgba(255,149,0,.12);--accent-bg:rgba(255,223,27,.08)}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);padding:8px;font-size:13px;-webkit-font-smoothing:antialiased}
h1{text-align:center;color:var(--accent);font-size:18px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
h2{color:var(--accent);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.tabs{display:flex;gap:0;margin-bottom:10px;background:var(--bg2);border-radius:6px;overflow:hidden}
.tab{flex:1;text-align:center;padding:10px 6px;font-weight:700;font-size:11px;cursor:pointer;color:var(--dim);transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
.tab:hover{color:var(--text)}.tab.active{color:var(--bg);background:var(--accent)}
.tab-content{display:none}.tab-content.active{display:block}
.input-area{background:var(--bg2);border-radius:6px;padding:12px;margin-bottom:10px}
.input-area label{color:var(--dim);font-size:11px;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;font-weight:600}
.input-area input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:8px 10px;font-size:13px;font-family:monospace;margin-bottom:8px}
.input-area input:focus{outline:none;border-color:var(--accent)}
.token-wrap{position:relative}.token-wrap input{padding-right:40px}
.token-toggle{position:absolute;right:8px;top:50%;transform:translateY(-70%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:4px}
.token-toggle:hover{color:var(--accent)}
.row{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
.sbtn{padding:7px 12px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--dim);font-size:12px;font-weight:700;cursor:pointer;min-width:40px;text-align:center;transition:all .15s}
.sbtn:hover{border-color:var(--accent);color:var(--accent)}.sbtn.on{border-color:var(--accent);background:var(--accent);color:var(--bg)}
.btn{display:inline-block;padding:10px 20px;border-radius:4px;border:none;font-size:13px;font-weight:700;cursor:pointer;margin:4px 4px 4px 0;transition:all .15s;text-transform:uppercase;letter-spacing:.3px}
.btn-go{background:var(--accent);color:var(--bg)}.btn-go:hover{opacity:.9}
.btn-clr{background:var(--bg4);color:var(--dim)}.btn-clr:hover{background:#555}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.status{padding:8px 12px;border-radius:4px;margin:6px 0;font-size:12px}
.s-ok{background:var(--green-bg);color:var(--green)}.s-err{background:var(--red-bg);color:var(--red)}.s-load{background:var(--accent-bg);color:var(--accent)}
.pbar{background:var(--bg4);border-radius:3px;height:6px;margin:4px 0;overflow:hidden}
.pfill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.card{background:var(--bg2);border-radius:6px;padding:12px;margin:6px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.match-hdr{background:var(--bg2);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:14px 16px;margin:8px 0}
.match-hdr .teams{font-size:18px;font-weight:800}.match-hdr .meta{color:var(--dim);font-size:11px;margin-top:2px}
.match-hdr .vs{color:var(--accent);margin:0 6px}
.prof{background:var(--bg2);border-radius:6px;padding:12px;border-left:3px solid var(--border)}
.prof.home{border-left-color:var(--blue)}.prof.away{border-left-color:var(--red)}
.prof-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prof-name{font-size:13px;font-weight:700}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.stat-box{background:var(--bg);border-radius:4px;padding:6px;text-align:center}
.stat-box .v{font-size:18px;font-weight:800}.stat-box .l{font-size:9px;color:var(--dim);text-transform:uppercase}
.cv-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;text-transform:uppercase;margin-top:2px}
.cv-stable{background:var(--green-bg);color:var(--green)}.cv-moderate{background:var(--orange-bg);color:var(--orange)}.cv-unstable{background:var(--red-bg);color:var(--red)}
.tbl{width:100%;border-collapse:collapse;font-size:11px;margin:6px 0}
.tbl th{background:var(--bg);color:var(--accent);padding:6px 8px;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.3px;font-weight:700}
.tbl td{padding:5px 8px;border-bottom:1px solid var(--bg4);text-align:center}
.tbl tr:hover{background:rgba(255,255,255,.03)}
.c-g{color:var(--green)}.c-o{color:var(--orange)}.c-r{color:var(--red)}
.hit{font-size:10px;color:var(--dim);margin-left:2px}
.bar{background:var(--bg4);border-radius:3px;height:18px;overflow:hidden;margin:2px 0}
.bar-f{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--bg);min-width:18px}
.tag{display:inline-block;padding:3px 8px;border-radius:3px;font-size:10px;font-weight:700}
.tag-w{background:var(--green-bg);color:var(--green)}.tag-d{background:var(--orange-bg);color:var(--orange)}.tag-l{background:var(--red-bg);color:var(--red)}
.alert{border-radius:6px;padding:12px;margin:6px 0;font-size:12px;border-left:3px solid}
.al-dn{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.al-wn{background:var(--orange-bg);border-color:var(--orange);color:var(--orange)}
.al-t{font-size:13px;font-weight:700;margin-bottom:4px}.al-d{font-size:11px;opacity:.9;line-height:1.5}
.rc-card{border-left:3px solid var(--blue);border-radius:0 6px 6px 0;padding:14px;margin:8px 0;background:var(--bg2)}
.rc-card.lost{border-left-color:var(--red)}
.rc-title{font-size:13px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.iv-card{background:var(--bg2);border-radius:6px;padding:12px;border-left:3px solid var(--border)}
.iv-card.home{border-left-color:var(--blue)}.iv-card.away{border-left-color:var(--red)}
.iv-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.iv-name{font-size:13px;font-weight:700;text-transform:uppercase}
.iv-general{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border-radius:4px;padding:3px 8px;font-size:10px;color:var(--dim)}
.iv-general .ig-pct{font-weight:700;font-size:11px}
.iv-ctx{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.iv-ctx-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;text-align:center;flex:1;min-width:80px}
.iv-ctx-card.highlight{border-width:2px}
.iv-ctx-card .ctx-label{font-size:10px;color:var(--dim);text-transform:uppercase;font-weight:600}
.iv-ctx-card .ctx-pct{font-size:24px;font-weight:800;margin:2px 0}
.iv-ctx-card .ctx-base{font-size:10px;color:var(--dim)}
.iv-ctx-card .ctx-avg{font-size:11px;font-weight:700;color:var(--orange);margin-top:2px}
.iv-empty{color:var(--dim);font-size:11px;text-align:center;padding:10px;font-style:italic}
.iv-lines{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
.iv-line{background:var(--bg);border-radius:4px;padding:6px 8px;display:flex;justify-content:space-between;align-items:center}
.iv-line .il-label{font-size:10px;color:var(--dim);font-weight:600}
.iv-line .il-val{font-size:13px;font-weight:800}
.iv-line-section{margin-top:6px}
.iv-line-title{font-size:9px;color:var(--dim);text-transform:uppercase;font-weight:600;margin-bottom:3px;letter-spacing:.3px}
.over-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.over-c{background:var(--bg);border-radius:4px;padding:10px;text-align:center}
.over-c.hot{background:var(--green-bg)}
.over-ln{font-size:11px;color:var(--dim);font-weight:600}.over-p{font-size:22px;font-weight:800;margin:2px 0}
.mom-card{background:var(--bg2);border-radius:6px;padding:14px;border-left:3px solid var(--border);margin:6px 0}
.mom-card.up{border-left-color:var(--green)}.mom-card.down{border-left-color:var(--red)}.mom-card.stable{border-left-color:var(--orange)}
.mom-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mom-name{font-size:13px;font-weight:700;text-transform:uppercase}
.mom-badge{padding:3px 10px;border-radius:3px;font-size:10px;font-weight:800;text-transform:uppercase}
.mom-badge.up{background:var(--green-bg);color:var(--green)}.mom-badge.down{background:var(--red-bg);color:var(--red)}.mom-badge.stable{background:var(--orange-bg);color:var(--orange)}
.mom-sub{font-size:9px;color:var(--dim);margin-bottom:8px;text-transform:uppercase}
.mom-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.mom-item{background:var(--bg);border-radius:4px;padding:8px;text-align:center}
.mom-item .mi-label{font-size:9px;color:var(--dim);text-transform:uppercase;font-weight:600}
.mom-item .mi-recent{font-size:20px;font-weight:800}
.mom-item .mi-general{font-size:11px;color:var(--dim);margin-top:2px}
.mom-item .mi-diff{font-size:11px;font-weight:700;margin-top:2px}
.mom-item .mi-diff.pos{color:var(--green)}.mom-item .mi-diff.neg{color:var(--red)}.mom-item .mi-diff.neu{color:var(--orange)}
.conf-bar{display:inline-flex;gap:2px;margin-left:4px;vertical-align:middle}
.conf-sq{width:8px;height:8px;border-radius:1px;background:var(--bg4)}
.conf-sq.on-h{background:var(--green)}.conf-sq.on-m{background:var(--orange)}.conf-sq.on-l{background:var(--red)}
.conf-label{font-size:9px;font-weight:700;margin-left:3px;vertical-align:middle}
.conf-label.h{color:var(--green)}.conf-label.m{color:var(--orange)}.conf-label.l{color:var(--red)}
.cv2-card{background:var(--bg2);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:16px;margin:8px 0}
.cv2-title{font-size:14px;font-weight:800;color:var(--accent);text-transform:uppercase;text-align:center;margin-bottom:10px;letter-spacing:.5px}
.cv2-directions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0}
.cv2-dir{background:var(--bg);border-radius:6px;padding:12px;border-top:2px solid var(--border)}
.cv2-dir.d1{border-top-color:var(--blue)}.cv2-dir.d2{border-top-color:var(--red)}
.cv2-dir-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:6px;text-align:center}
.cv2-dir-items{display:flex;flex-direction:column;gap:4px}
.cv2-dir-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:3px 0;border-bottom:1px solid var(--bg4)}
.cv2-dir-row .dr-label{color:var(--dim)}.cv2-dir-row .dr-val{font-weight:700}
.cv2-convergence{background:var(--bg);border:2px solid var(--accent);border-radius:8px;padding:14px;margin-top:10px;text-align:center}
.cv2-conv-title{font-size:10px;color:var(--dim);text-transform:uppercase;font-weight:700;margin-bottom:6px}
.cv2-conv-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.cv2-conv-item{background:var(--bg2);border-radius:6px;padding:10px 14px;text-align:center;min-width:100px}
.cv2-conv-item.strong{border:1px solid var(--green);background:var(--green-bg)}
.cv2-conv-item.moderate{border:1px solid var(--orange);background:var(--orange-bg)}
.cv2-conv-item .ci-label{font-size:9px;color:var(--dim);text-transform:uppercase}
.cv2-conv-item .ci-score{font-size:22px;font-weight:800;margin:2px 0}
.cv2-conv-item .ci-detail{font-size:9px;color:var(--dim)}
.ci-tag{font-size:9px;font-weight:700;margin-top:3px;padding:2px 6px;border-radius:3px;display:inline-block}
.ci-tag.strong{background:var(--green-bg);color:var(--green)}.ci-tag.moderate{background:var(--orange-bg);color:var(--orange)}.ci-tag.weak{background:var(--red-bg);color:var(--red)}
.streak-row{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;padding:6px 0}
.sk-dot{width:16px;height:16px;border-radius:50%;display:inline-block}
.sk-dot.w{background:var(--green)}.sk-dot.l{background:var(--red)}.sk-dot.s{background:var(--bg4)}
.streak-summary{display:flex;gap:10px;justify-content:center;font-size:10px;color:var(--dim);margin-top:4px}
.comb-card{background:var(--bg2);border-left:3px solid var(--purple);border-radius:0 6px 6px 0;padding:14px;margin:8px 0}
.comb-card.strong{border-left-color:var(--green)}
.comb-items{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.comb-tag{padding:3px 8px;border-radius:3px;font-size:10px;font-weight:700;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent)}
.comb-result{display:flex;align-items:center;gap:12px;margin:8px 0}
.comb-pct{font-size:32px;font-weight:800}
.comb-detail{font-size:11px;color:var(--dim)}
.comb-none{color:var(--dim);font-size:11px;text-align:center;padding:16px;font-style:italic}
.gr{display:flex;align-items:center;gap:5px;padding:4px 6px;border-bottom:1px solid var(--bg4);font-size:11px}
.gr:hover{background:rgba(255,255,255,.03)}
.gr a{color:var(--text);text-decoration:none}.gr a:hover{color:var(--accent);text-decoration:underline}
.gi{color:var(--dim);width:18px;text-align:right;font-weight:700;font-size:10px}
.gn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gs{font-weight:700;padding:2px 5px;border-radius:3px;font-size:10px;color:var(--text)}
.gs-w{background:var(--green)}.gs-d{background:var(--orange)}.gs-l{background:var(--red)}
.api-bar{background:var(--bg2);border-radius:4px;padding:6px 12px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--dim);flex-wrap:wrap;gap:4px}
.api-bar .ac{font-weight:700;font-size:12px}
.log-area{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px;font-family:monospace;font-size:10px;max-height:180px;overflow-y:auto;white-space:pre-wrap;margin-top:4px}
.log-ok{color:var(--green)}.log-err{color:var(--red)}.log-info{color:var(--blue)}.log-warn{color:var(--orange)}
.none-msg{color:var(--dim);font-size:11px;text-align:center;padding:12px;font-style:italic}
.scan-card{background:var(--bg2);border-radius:6px;padding:12px;margin:6px 0;border-left:3px solid var(--border)}
.scan-card.hot{border-left-color:var(--green)}.scan-card.warm{border-left-color:var(--orange)}.scan-card.cold{border-left-color:var(--red)}
.scan-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.scan-label{font-size:12px;font-weight:700}
.scan-pct{font-size:28px;font-weight:800}
.scan-detail{font-size:10px;color:var(--dim)}
.scan-bar{background:var(--bg4);border-radius:3px;height:14px;overflow:hidden;margin:4px 0}
.scan-fill{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--bg)}
.scan-section{margin:12px 0}
.scan-section-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.scan-legend{background:var(--bg2);border-radius:6px;padding:10px;margin:8px 0;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.scan-legend-item{display:flex;align-items:center;gap:4px;font-size:10px}
.scan-legend-dot{width:10px;height:10px;border-radius:2px}
.game-link{color:var(--blue);text-decoration:none;font-size:9px;margin-left:4px;opacity:.7}
.game-link:hover{opacity:1;text-decoration:underline}
.src-tag{font-size:8px;padding:1px 4px;border-radius:2px;margin-left:3px;font-weight:600}
.src-live{background:rgba(76,217,100,.15);color:var(--green)}.src-iv{background:rgba(255,149,0,.15);color:var(--orange)}
.dedup-info{font-size:9px;color:var(--dim);background:var(--bg);border-radius:3px;padding:2px 6px;margin-left:6px}
</style>
</head>
<body>
<h1>CORNER ANALYSIS</h1>
<p style="text-align:center;color:var(--dim);font-size:10px;margin-bottom:4px">v17 — SCAN 2T LATE CORNERS</p>
<div class="api-bar">
    <span>API: <span class="ac" style="color:var(--orange)" id="apiReal">0</span> | Cache: <span class="ac" style="color:var(--green)" id="apiCached">0</span></span>
    <span>Delay: <span class="ac" style="color:var(--blue)" id="apiDelay">350</span>ms</span>
    <span>Salvos: <span class="ac" style="color:var(--purple)" id="apiCacheSize">0</span></span>
</div>
<div class="tabs">
    <div class="tab active" onclick="switchTab('ctx',this)">CONTEXTOS</div>
    <div class="tab" onclick="switchTab('comb',this)">COMBINADOR</div>
    <div class="tab" onclick="switchTab('scan',this)">SCAN</div>
</div>

<div id="tab-ctx" class="tab-content active">
<div class="input-area">
    <label>Token</label><div class="token-wrap"><input id="apiToken" type="password" value="45003_ec8357116e"><button class="token-toggle" onclick="toggleToken('apiToken',this)" type="button">SHOW</button></div>
    <label>Game ID</label><input id="mainGameId" value="rlj62">
    <label>Jogos</label><div class="row" id="gRow"></div>
    <button class="btn btn-go" id="btnCtx" onclick="runCtx()">ANALISAR</button>
    <button class="btn btn-clr" onclick="clearCtx()">LIMPAR</button>
</div>
<div id="ctxStatus"></div>
<div id="ctxProg" style="display:none"><div class="pbar"><div class="pfill" id="ctxFill"></div></div><span id="ctxPTxt" style="color:var(--dim);font-size:10px"></span></div>
<div id="ctxRes" style="display:none"></div>
</div>

<div id="tab-comb" class="tab-content">
<div class="input-area">
    <label>Minimo %</label><div class="row" id="combMinRow"></div>
    <label>Lado</label><div class="row"><div class="sbtn on" onclick="setCombSide('home',this)">CASA</div><div class="sbtn" onclick="setCombSide('away',this)">FORA</div></div>
    <label>Base minima</label><div class="row" id="combBaseRow"></div>
    <button class="btn btn-go" onclick="runComb()">COMBINAR</button>
</div>
<div id="combRes"></div>
</div>

<div id="tab-scan" class="tab-content">
<div class="input-area">
    <label>Token</label><div class="token-wrap"><input id="scanToken" type="password" value="45003_ec8357116e"><button class="token-toggle" onclick="toggleToken('scanToken',this)" type="button">SHOW</button></div>
    <label>Game ID</label><input id="scanGameId" value="rlj62">
    <label>Lado</label><div class="row"><div class="sbtn on" onclick="setScanSide('home',this)">CASA</div><div class="sbtn" onclick="setScanSide('away',this)">FORA</div></div>
    <label>Jogos</label><div class="row" id="scanGRow"></div>
    <label>Alvo</label><div class="row" id="scanTargetRow"></div>
    <label>Fonte dados</label><div class="row"><div class="sbtn on" onclick="setScanSource('live',this)">SÓ LIVE</div><div class="sbtn" onclick="setScanSource('all',this)">LIVE + 1T/2T</div></div>
    <label>Minimo %</label><div class="row" id="scanMinRow"></div>
    <label>Base minima</label><div class="row" id="scanBaseRow"></div>
    <button class="btn btn-go" id="btnScan" onclick="runScan()">SCAN</button>
    <button class="btn btn-clr" onclick="clearScan()">LIMPAR</button>
</div>
<div id="scanStatus"></div>
<div id="scanProg" style="display:none"><div class="pbar"><div class="pfill" id="scanFill"></div></div><span id="scanPTxt" style="color:var(--dim);font-size:10px"></span></div>
<div id="scanRes"></div>
</div>

<details style="margin-top:8px"><summary style="color:var(--dim);cursor:pointer;font-size:10px">LOG</summary><div class="log-area" id="logArea"></div></details>

<script>
var API='https://cornerprobet.com/api/v3/getAnalysis.php',AURL='https://cornerprobet.com/analysis/',RACES=[5,7,9],OL=[5.5,6.5];
var sG=10,AD=null,combMin=70,combSide='home',combBase=3;

async function cachedFetch(gid,tok){
    if(CACHE[gid]){apiStats.cached++;updateBar();return CACHE[gid]}
    apiStats.real++;updateBar();
    var url=API+'?gameId='+encodeURIComponent(gid)+'&token='+tok;
    try{var r=await fetch(url);if(r.status===429){apiStats.errors++;apiStats.delay=Math.min(apiStats.delay+250,3000);updateBar();log('429! Delay->'+apiStats.delay+'ms','warn');await dl(apiStats.delay);return cachedFetch(gid,tok)}if(!r.ok)throw new Error('HTTP '+r.status);var d=await r.json();CACHE[gid]=d;if(apiStats.delay>350&&apiStats.errors===0){apiStats.delay=Math.max(apiStats.delay-50,350);updateBar()}apiStats.errors=0;return d}catch(e){apiStats.errors++;if(apiStats.errors>=3){apiStats.delay=Math.min(apiStats.delay+500,5000);updateBar()}throw e}
}

function pE(ev,isH){var li=Array.isArray(ev)?ev:Object.values(ev),cs=[],gs=[],os=isH?'h':'a';for(var i=0;i<li.length;i++){var e=li[i];if(!e)continue;if(e.tp==='c')cs.push({min:parseInt(e.t)||0,ours:e.h===os,side:e.h});if(e.tp==='g'||e.tp==='p')gs.push({min:parseInt(e.t)||0,ours:e.h===os,side:e.h})}cs.sort(function(a,b){return a.min-b.min});gs.sort(function(a,b){return a.min-b.min});return{corners:cs,goals:gs}}
function gSt(gs,min,isH){var h=0,a=0;for(var i=0;i<gs.length;i++){if(gs[i].min>min)break;if(gs[i].side==='h')h++;else a++}var o=isH?h:a,t=isH?a:h;return o>t?'winning':o<t?'losing':'drawing'}
function cRF(cs){var oc=0,tc=0,res={};for(var r=0;r<RACES.length;r++)res[RACES[r]]={winner:null,min:null};for(var i=0;i<cs.length;i++){if(cs[i].ours)oc++;else tc++;for(var r=0;r<RACES.length;r++){var t=RACES[r];if(res[t].winner)continue;if(oc>=t)res[t]={winner:'ours',min:cs[i].min};else if(tc>=t)res[t]={winner:'theirs',min:cs[i].min}}}for(var r=0;r<RACES.length;r++)if(!res[RACES[r]].winner)res[RACES[r]]={winner:'none',min:null};return res}

async function collectIds(sid,tok,tgt,role){
    var gm={},ord=[],cur=sid,rd=0,md=null;
    while(ord.length<tgt&&rd<15){rd++;try{var d=await cachedFetch(cur,tok);if(rd===1)md=d;var lg=dF(d,'lastGames'),li=null;if(role==='home'&&lg&&lg.home&&lg.home.asHome)li=lg.home.asHome;else if(role==='away'&&lg&&lg.away&&lg.away.asAway)li=lg.away.asAway;if(!li||!li.length)break;var nc=0;for(var i=0;i<li.length;i++){if(ord.length>=tgt)break;if(!gm[li[i].id]){gm[li[i].id]=li[i];ord.push(li[i].id);nc++}}log(role+' R'+rd+': +'+nc+' total='+ord.length,'ok');if(!nc||ord.length>=tgt)break;cur=li[li.length-1].id;await dl(apiStats.delay)}catch(e){log('ERR '+e.message,'err');break}}
    return{games:gm,order:ord,mainData:md}
}

function getLive(ls,stat,min){if(!ls||!ls[stat])return null;var d=ls[stat];for(var m=min;m>=0;m--){var v=d[String(m)];if(v!==undefined&&v!==null&&Array.isArray(v))return v}return null}

function extractStats(game,isH){
    var ls=game.liveStats||{},ts=game.totalStats||{},s=game.stats||{};
    var hIdx=isH?0:1,aIdx=isH?1:0,hk=isH?'h':'a',ak=isH?'a':'h';
    function tsF(key,side){return ts[key]&&ts[key].first?ts[key].first[side]||0:0}
    function tsT(key,side){return ts[key]&&ts[key].total?ts[key].total[side]||0:0}
    function sa(key){return s[key]&&Array.isArray(s[key])?s[key][hIdx]||0:0}
    var hasLive=false;
    function lv(stat,min,idx){var r=getLive(ls,stat,min);if(!r)return null;hasLive=true;return r[idx]}
    var res={};
    // HT: até 35'
    res.time_chutes_35=lv('shots',35,hIdx);res.time_chutes_gol_35=lv('on_target',35,hIdx);res.time_corners_35=lv('corners',35,hIdx);res.time_atq_perigosos_35=lv('dangerous_attacks',35,hIdx);res.time_ataques_35=lv('attacks',35,hIdx);res.time_posse_35=lv('possessiontime',35,hIdx);
    res.adv_chutes_35=lv('shots',35,aIdx);res.adv_chutes_gol_35=lv('on_target',35,aIdx);res.adv_corners_35=lv('corners',35,aIdx);res.adv_atq_perigosos_35=lv('dangerous_attacks',35,aIdx);res.adv_ataques_35=lv('attacks',35,aIdx);res.adv_posse_35=lv('possessiontime',35,aIdx);
    var js35=getLive(ls,'shots',35),jc35=getLive(ls,'corners',35),jd35=getLive(ls,'dangerous_attacks',35);
    res.jogo_chutes_35=js35?js35[0]+js35[1]:null;res.jogo_corners_35=jc35?jc35[0]+jc35[1]:null;res.jogo_atq_perigosos_35=jd35?jd35[0]+jd35[1]:null;
    // FT: até 85'
    res.time_chutes_85=lv('shots',85,hIdx);res.time_chutes_gol_85=lv('on_target',85,hIdx);res.time_corners_85=lv('corners',85,hIdx);res.time_atq_perigosos_85=lv('dangerous_attacks',85,hIdx);res.time_ataques_85=lv('attacks',85,hIdx);
    res.adv_chutes_85=lv('shots',85,aIdx);res.adv_corners_85=lv('corners',85,aIdx);res.adv_atq_perigosos_85=lv('dangerous_attacks',85,aIdx);
    var js85=getLive(ls,'shots',85),jc85=getLive(ls,'corners',85);
    res.jogo_chutes_85=js85?js85[0]+js85[1]:null;res.jogo_corners_85=jc85?jc85[0]+jc85[1]:null;
    // LATE: até 70' (para alvo 3C 70-FT)
    res.time_chutes_70=lv('shots',70,hIdx);res.time_chutes_gol_70=lv('on_target',70,hIdx);res.time_corners_70=lv('corners',70,hIdx);res.time_atq_perigosos_70=lv('dangerous_attacks',70,hIdx);res.time_ataques_70=lv('attacks',70,hIdx);res.time_posse_70=lv('possessiontime',70,hIdx);
    res.adv_chutes_70=lv('shots',70,aIdx);res.adv_chutes_gol_70=lv('on_target',70,aIdx);res.adv_corners_70=lv('corners',70,aIdx);res.adv_atq_perigosos_70=lv('dangerous_attacks',70,aIdx);res.adv_ataques_70=lv('attacks',70,aIdx);
    var js70=getLive(ls,'shots',70),jc70=getLive(ls,'corners',70),jd70=getLive(ls,'dangerous_attacks',70);
    res.jogo_chutes_70=js70?js70[0]+js70[1]:null;res.jogo_corners_70=jc70?jc70[0]+jc70[1]:null;res.jogo_atq_perigosos_70=jd70?jd70[0]+jd70[1]:null;
    // Placar no min 70
    res._state70=null; // será preenchido externamente
    res._hasLive=hasLive;
    // 1T/2T totals
    res.time_chutes_1T=tsF('shots',hk);res.time_chutes_gol_1T=tsF('on_target',hk);res.time_atq_perigosos_1T=tsF('dangerous_attacks',hk);res.time_ataques_1T=tsF('attacks',hk);res.time_corners_1T=tsF('corners',hk);res.time_posse_1T=tsF('possessiontime',hk);res.time_cruzamentos_1T=tsF('total_crosses',hk);
    res.adv_chutes_1T=tsF('shots',ak);res.adv_chutes_gol_1T=tsF('on_target',ak);res.adv_atq_perigosos_1T=tsF('dangerous_attacks',ak);res.adv_ataques_1T=tsF('attacks',ak);res.adv_corners_1T=tsF('corners',ak);res.adv_posse_1T=tsF('possessiontime',ak);
    res.jogo_chutes_1T=tsF('shots',hk)+tsF('shots',ak);res.jogo_corners_1T=tsF('corners',hk)+tsF('corners',ak);res.jogo_atq_perigosos_1T=tsF('dangerous_attacks',hk)+tsF('dangerous_attacks',ak);
    res.time_chutes_2T=tsT('shots',hk)-tsF('shots',hk);res.time_corners_2T=tsT('corners',hk)-tsF('corners',hk);res.time_atq_perigosos_2T=tsT('dangerous_attacks',hk)-tsF('dangerous_attacks',hk);
    res.adv_chutes_2T=tsT('shots',ak)-tsF('shots',ak);res.adv_corners_2T=tsT('corners',ak)-tsF('corners',ak);
    res.jogo_chutes_2T=(tsT('shots',hk)-tsF('shots',hk))+(tsT('shots',ak)-tsF('shots',ak));res.jogo_corners_2T=(tsT('corners',hk)-tsF('corners',hk))+(tsT('corners',ak)-tsF('corners',ak));
    res.time_chutes_total=sa('shots');res.time_atq_perigosos_total=sa('dangerous_attacks');
    return res;
}

// Conta corners totais entre minFrom e minTo (inclusive) a partir de eventsClean
function countCornersInRange(ev,minFrom,minTo){
    if(!ev)return 0;
    var li=Array.isArray(ev)?ev:Object.values(ev),cnt=0;
    for(var i=0;i<li.length;i++){
        var e=li[i];if(!e||e.tp!=='c')continue;
        var m=parseInt(e.t)||0;
        if(m>=minFrom&&m<=minTo)cnt++;
    }
    return cnt;
}

        // Contextuais: 1T completo + placar no 70

        }
    }
    return c;
}

function dedupScore(r){return r.pct*Math.sqrt(r.base)}
function dedupSingles(results){var groups={};for(var i=0;i<results.length;i++){var r=results[i],key=r.target+'|'+r.label.replace(/ ≥\d+$/,'');if(!groups[key]||dedupScore(r)>dedupScore(groups[key]))groups[key]=r}var out=[];for(var k in groups)out.push(groups[k]);return out}
function dedupCombos(results){var groups={};for(var i=0;i<results.length;i++){var r=results[i],parts=r.label.split(' + '),k1=parts[0].replace(/ ≥\d+$/,''),k2=parts[1]?parts[1].replace(/ ≥\d+$/,''):'',pair=[k1,k2].sort(),key=r.target+'|'+pair[0]+'|'+pair[1];if(!groups[key]||dedupScore(r)>dedupScore(groups[key]))groups[key]=r}var out=[];for(var k in groups)out.push(groups[k]);return out}

async function runScan(){
    if(isRunning)return;var tok=document.getElementById('scanToken').value.trim(),gid=document.getElementById('scanGameId').value.trim();if(!tok||!gid)return;

        var isH=role==='home';

            document.getElementById('scanPTxt').textContent=teamName+' ('+(i+1)+'/'+ids.length+')';
            try{var d=await cachedFetch(ids[i],tok);var go=dF(d,'game')||{},ev=dF(d,'eventsClean');var ciG=go.cornerIntervals||null,p=ev?pE(ev,isH):{corners:[],goals:[]};var ht37=ciG?ciG['37-HT']:null,ft87=ciG?ciG['87-FT']:null;var stats=extractStats(go,isH);if(stats._hasLive)liveCount++;
            // Late corners: contar corners totais entre 70-90+
            var lateCorners=countCornersInRange(ev,70,999);
            // Placar no min 70
            var state70=gSt(p.goals,70,isH);
            stats._state70=state70;
            games.push({id:ids[i],info:gm[ids[i]]||{},game:go,ev:ev,stats:stats,has37:ht37&&ht37.t>0,has87:ft87&&ft87.t>0,ht37_t:ht37?ht37.t:0,ft87_t:ft87?ft87.t:0,state37:gSt(p.goals,36,isH),state87:gSt(p.goals,86,isH),lateCorners:lateCorners,has3c70:lateCorners>=3,state70:state70})}catch(e){log('SCAN ERR '+ids[i]+': '+e.message,'err')}
            if(i<ids.length-1&&!CACHE[ids[i+1]])await dl(apiStats.delay)}
        document.getElementById('scanProg').style.display='none';
        var srcLabel=scanSource==='live'?'SÓ LIVE':'LIVE+1T/2T';
        document.getElementById('scanStatus').innerHTML='<div class="status s-ok">'+games.length+' jogos | '+liveCount+' liveStats | '+srcLabel+'</div>';
        var targets=[];
        if(scanTarget==='37'||scanTarget==='both')targets.push({key:'has37',label:'37-HT'});
        if(scanTarget==='87'||scanTarget==='both')targets.push({key:'has87',label:'87-FT'});
        if(scanTarget==='3c70')targets.push({key:'has3c70',label:'3C 70-FT'});
        var criteria=getScanCriteria(scanTarget,scanSource);
        var rawSingles=[],rawCombos=[];
        for(var t=0;t<targets.length;t++){var tgt=targets[t];for(var c2=0;c2<criteria.length;c2++){var cr=criteria[c2];for(var th=0;th<cr.thresholds.length;th++){var threshold=cr.thresholds[th],base=0,hit=0,sk=[],mG=[];
            for(var g=0;g<games.length;g++){var val=games[g].stats[cr.field];if(val===undefined||val===null)continue;if(val>=threshold){base++;var h2=games[g][tgt.key];sk.push(h2);if(h2)hit++;mG.push({id:games[g].id,info:games[g].info,hit:h2,val:val,lc:games[g].lateCorners})}}
            if(base>=scanBase){var pct=Math.round(hit/base*100);if(pct>=scanMin)rawSingles.push({type:'single',target:tgt.label,label:cr.label+' ≥'+threshold,pct:pct,hit:hit,base:base,streak:sk,games:mG,live:cr.live})}}}}
        for(var t=0;t<targets.length;t++){var tgt=targets[t];for(var a=0;a<criteria.length;a++){for(var ath=0;ath<criteria[a].thresholds.length;ath++){for(var b=a+1;b<criteria.length;b++){
            if(criteria[a].group===criteria[b].group)continue;
            for(var bth=0;bth<criteria[b].thresholds.length;bth++){var base=0,hit=0,sk=[],mG=[];
            for(var g=0;g<games.length;g++){var vA=games[g].stats[criteria[a].field],vB=games[g].stats[criteria[b].field];if(vA===undefined||vA===null||vB===undefined||vB===null)continue;if(vA>=criteria[a].thresholds[ath]&&vB>=criteria[b].thresholds[bth]){base++;var h2=games[g][tgt.key];sk.push(h2);if(h2)hit++;mG.push({id:games[g].id,info:games[g].info,hit:h2,lc:games[g].lateCorners})}}
            if(base>=scanBase){var pct=Math.round(hit/base*100);var comboLive=criteria[a].live&&criteria[b].live;
            if(pct>=scanMin)rawCombos.push({type:'combo',target:tgt.label,label:criteria[a].label+' ≥'+criteria[a].thresholds[ath]+' + '+criteria[b].label+' ≥'+criteria[b].thresholds[bth],pct:pct,hit:hit,base:base,streak:sk,games:mG,live:comboLive})}}}}}}
        var totalBefore=rawSingles.length+rawCombos.length;
        var singles=dedupSingles(rawSingles);

        var totalAfter=singles.length+combos.length;
        singles.sort(function(a,b){return b.pct-a.pct||b.base-a.base});
        combos.sort(function(a,b){return b.pct-a.pct||b.base-a.base});
        renderScan(teamName,games,singles,combos,targets,liveCount,totalBefore,totalAfter);
    }catch(e){document.getElementById('scanStatus').innerHTML='<div class="status s-err">ERRO: '+e.message+'</div>'}

function buildMomentum(games,isHome){var n=games.length,rec=Math.min(5,n);if(n<5)return null;var rG=games.slice(0,rec);var metrics=[];RACES.forEach(function(r){var rW=0,aW=0,tgt2=isHome?'ours':'theirs';for(var i=0;i<rec;i++)if(rG[i].races[r].winner===tgt2)rW++;for(var i=0;i<n;i++)if(games[i].races[r].winner===tgt2)aW++;metrics.push({label:isHome?'R'+r+' ganhou':'R'+r+' sofreu',recent:Math.round(rW/rec*100),general:Math.round(aW/n*100),diff:Math.round(rW/rec*100)-Math.round(aW/n*100)})});var rC=0,aC=0,f=isHome?'ourCorners':'theirCorners';for(var i=0;i<rec;i++)rC+=rG[i][f];for(var i=0;i<n;i++)aC+=games[i][f];metrics.push({label:isHome?'C. fez':'C. cedeu',recent:(rC/rec).toFixed(1),general:(aC/n).toFixed(1),diff:((rC/rec)-(aC/n)).toFixed(1),isAvg:true});var r37=0,a37=0;for(var i=0;i<rec;i++)if(rG[i].has37)r37++;for(var i=0;i<n;i++)if(games[i].has37)a37++;metrics.push({label:'37-HT',recent:Math.round(r37/rec*100),general:Math.round(a37/n*100),diff:Math.round(r37/rec*100)-Math.round(a37/n*100)});var r87=0,a87=0;for(var i=0;i<rec;i++)if(rG[i].has87)r87++;for(var i=0;i<n;i++)if(games[i].has87)a87++;metrics.push({label:'87-FT',recent:Math.round(r87/rec*100),general:Math.round(a87/n*100),diff:Math.round(r87/rec*100)-Math.round(a87/n*100)});var up=0,dn=0;for(var i=0;i<metrics.length;i++){var d2=parseFloat(metrics[i].diff);if(d2>=15)up++;else if(d2<=-15)dn++}return{metrics:metrics,overall:up>dn?'up':dn>up?'down':'stable',recCount:rec,totalCount:n}}
function renderMomentum(name,mom,col){if(!mom)return'<div class="none-msg">Poucos jogos</div>';var h='<div class="mom-card '+mom.overall+'"><div class="mom-hdr"><div class="mom-name" style="color:'+col+'">'+name+'</div><div class="mom-badge '+mom.overall+'">'+(mom.overall==='up'?'SUBINDO':mom.overall==='down'?'CAINDO':'ESTAVEL')+'</div></div><div class="mom-sub">ULT.'+mom.recCount+' vs GERAL ('+mom.totalCount+')</div><div class="mom-grid">';for(var i=0;i<mom.metrics.length;i++){var m=mom.metrics[i],d2=parseFloat(m.diff),dCl=d2>=15?'pos':d2<=-15?'neg':'neu';h+='<div class="mom-item"><div class="mi-label">'+m.label+'</div>';h+=m.isAvg?'<div class="mi-recent" style="color:var(--accent)">'+m.recent+'</div><div class="mi-general">Geral: '+m.general+'</div>':'<div class="mi-recent '+cLvl(m.recent)+'">'+m.recent+'%</div><div class="mi-general">Geral: '+m.general+'%</div>';h+='<div class="mi-diff '+dCl+'">'+(d2>0?'+':'')+m.diff+(m.isAvg?'c':'%')+'</div></div>'}h+='</div></div>';return h}
function aggRC(gms,rN,isH,fW){var cx=[],fs=[];for(var i=0;i<gms.length;i++){var rc=gms[i].races[rN];if(!rc||rc.winner==='none'){fs.push('skip');continue}var won=rc.winner==='ours';if(fW!==undefined&&won!==fW){fs.push(false);continue}fs.push(true);cx.push({won:won,placar:gSt(gms[i].goals,rc.min-1,isH),info:gms[i].info})}if(!cx.length)return null;var n=cx.length,pW=0,pD=0,pL=0;for(var i=0;i<n;i++){cx[i].placar==='winning'?pW++:cx[i].placar==='drawing'?pD++:pL++}return{total:n,winPct:Math.round(pW/n*100),drawPct:Math.round(pD/n*100),losePct:Math.round(pL/n*100),win:pW,draw:pD,lose:pL,games:cx,streak:fs}}
function buildIVCtx(games,ivKey,stKey){var hKey=ivKey==='has37'?'ht37_h':'ft87_h',aKey=ivKey==='has37'?'ht37_a':'ft87_a',tKey=ivKey==='has37'?'ht37_t':'ft87_t';var all={base:games.length,hit:0,totalC:0,streak:[]};var ctx={winning:{base:0,hit:0,totalC:0,streak:[]},drawing:{base:0,hit:0,totalC:0,streak:[]},losing:{base:0,hit:0,totalC:0,streak:[]}};var favor={o05:0,o15:0},contra={o05:0,o15:0};for(var i=0;i<games.length;i++){var g=games[i],st=g[stKey],hc=g[hKey],ac=g[aKey];ctx[st].base++;var dH=!!g[ivKey];ctx[st].streak.push(dH);all.streak.push(dH);if(dH){all.hit++;all.totalC+=g[tKey];ctx[st].hit++;ctx[st].totalC+=g[tKey]}if(hc>=1)favor.o05++;if(hc>=2)favor.o15++;if(ac>=1)contra.o05++;if(ac>=2)contra.o15++}all.pct=all.base?Math.round(all.hit/all.base*100):0;all.avg=all.hit?(all.totalC/all.hit).toFixed(2):'0';var n=games.length;favor.p05=n?Math.round(favor.o05/n*100):0;favor.p15=n?Math.round(favor.o15/n*100):0;contra.p05=n?Math.round(contra.o05/n*100):0;contra.p15=n?Math.round(contra.o15/n*100):0;for(var s2 in ctx){var cc=ctx[s2];cc.pct=cc.base?Math.round(cc.hit/cc.base*100):0;cc.avg=cc.hit?(cc.totalC/cc.hit).toFixed(2):'0'}return{all:all,ctx:ctx,favor:favor,contra:contra}}
function buildOverStats(games,field){var n=games.length,stats={};for(var l=0;l<OL.length;l++){var line=OL[l],th=Math.ceil(line),hit=0,sk=[];for(var i=0;i<n;i++){var hh=games[i][field]>=th;sk.push(hh);if(hh)hit++}stats[line]={hit:hit,pct:n?Math.round(hit/n*100):0,streak:sk}}var sum=0;for(var i=0;i<n;i++)sum+=games[i][field];stats.avg=n?(sum/n).toFixed(1):'0';stats.total=n;return stats}
function bHP(gm){var n=gm.length;if(!n)return{};var tC=0,oC=0,rS={},rSk={},oV=[],fV=[],cV2=[];for(var r=0;r<RACES.length;r++){rS[RACES[r]]={won:0,lost:0,none:0};rSk[RACES[r]]=[]}for(var i=0;i<n;i++){tC+=gm[i].totalCorners;oC+=gm[i].ourCorners;oV.push(gm[i].ourCorners);fV.push(gm[i].theirCorners);cV2.push(gm[i].totalCorners);for(var r=0;r<RACES.length;r++){var t=RACES[r],w=gm[i].races[t].winner;w==='ours'?rS[t].won++:w==='theirs'?rS[t].lost++:rS[t].none++;rSk[t].push(w==='ours')}}for(var r=0;r<RACES.length;r++){var t=RACES[r];rS[t].wonPct=Math.round(rS[t].won/n*100);rS[t].lostPct=Math.round(rS[t].lost/n*100);rS[t].nonePct=Math.round(rS[t].none/n*100);rS[t].streak=rSk[t]}return{avgC:(tC/n).toFixed(1),avgO:(oC/n).toFixed(1),avgT:((tC-oC)/n).toFixed(1),races:rS,total:n,cvT:calcCV(cV2),cvF:calcCV(oV),cvC:calcCV(fV)}}
function bAl(hn,an,hp,ag,n){var al=[];for(var r=0;r<RACES.length;r++){var t=RACES[r],hW=hp.races[t].wonPct,aL=0;for(var i=0;i<n;i++)if(ag[i].races[t].winner==='theirs')aL++;var aLP=Math.round(aL/n*100);if(hW>=50&&aLP>=50)al.push({type:'dn',title:'RACE '+t+': '+an+' EM PERIGO',detail:hn+': <b>'+hW+'%</b>'+HT(hp.races[t].won,hp.total)+' | '+an+': <b>'+aLP+'%</b>'+HT(aL,n)});else if(hW>=40||aLP>=40)al.push({type:'wn',title:'Race '+t,detail:hn+': '+hW+'% | '+an+': '+aLP+'%'})}return al}
function buildCV2(hG,aG,hp,aAC){var tol=1.5,hA=parseFloat(hp.avgO),aA=parseFloat(aAC);function fm(g,avg){var m=[];for(var i=0;i<g.length;i++)if(g[i].theirCorners>=avg-tol&&g[i].theirCorners<=avg+tol+1)m.push(g[i]);if(m.length<3){m=[];for(var i=0;i<g.length;i++)if(g[i].theirCorners>=avg-3)m.push(g[i])}return m}var s1m=fm(aG,hA),s2m=fm(hG,aA);function calcDir(m,wk,isH2){var n=m.length;if(!n)return null;var res={total:n,races:{},overs:{}};for(var r=0;r<RACES.length;r++){var t=RACES[r],hit=0;for(var i=0;i<n;i++)if(m[i].races[t].winner===wk)hit++;res.races[t]={hit:hit,pct:Math.round(hit/n*100)}}for(var l=0;l<OL.length;l++){var line=OL[l],th=Math.ceil(line),hit=0;for(var i=0;i<n;i++)if((isH2?m[i].ourCorners:m[i].theirCorners)>=th)hit++;res.overs[line]={hit:hit,pct:Math.round(hit/n*100)}}return res}var d1=calcDir(s1m,'theirs',false),d2=calcDir(s2m,'ours',true);var conv=[];if(d1&&d2){for(var r=0;r<RACES.length;r++){var t=RACES[r],p1=d1.races[t].pct,p2=d2.races[t].pct;if(p1>=50&&p2>=50)conv.push({label:'Race '+t,p1:p1,p2:p2,avg:Math.round((p1+p2)/2),strength:p1>=70&&p2>=70?'strong':p1>=60&&p2>=60?'moderate':'weak'})}for(var l=0;l<OL.length;l++){var line=OL[l],p1=d1.overs[line].pct,p2=d2.overs[line].pct;if(p1>=50&&p2>=50)conv.push({label:'Over '+line,p1:p1,p2:p2,avg:Math.round((p1+p2)/2),strength:p1>=70&&p2>=70?'strong':p1>=60&&p2>=60?'moderate':'weak'})}}return{dir1:d1,dir2:d2,convergence:conv}}
function buildConds(games,isH){var conds=[],wK=isH?'ours':'theirs';RACES.forEach(function(r){['drawing','losing','winning'].forEach(function(st){var stL={drawing:'EMP',losing:'PER',winning:'VEN'}[st];conds.push({id:'r'+r+'_'+st,label:'Race '+r+' '+stL,test:function(g){var rc=g.races[r];if(rc.winner==='none')return null;if(gSt(g.goals,rc.min-1,isH)!==st)return null;return rc.winner===wK}})})});[{iv:'has37',st:'state37',label:'37-HT'},{iv:'has87',st:'state87',label:'87-FT'}].forEach(function(cfg){['drawing','losing','winning'].forEach(function(st){var stL={drawing:'EMP',losing:'PER',winning:'VEN'}[st];conds.push({id:cfg.label+'_'+st,label:cfg.label+' '+stL,test:function(g){if(g[cfg.st]!==st)return null;return g[cfg.iv]}})})});OL.forEach(function(line){var th=Math.ceil(line),f=isH?'ourCorners':'theirCorners';conds.push({id:'o'+line,label:'Over '+line,test:function(g){return g[f]>=th}})});return conds}

x(hG,'has87','state87');var a37c=buildIVCtx(aG,'has37','state37'),a87c=buildIVCtx(aG,'has87','state87');var hOv=buildOverStats(hG,'ourCorners'),aOv=buildOverStats(aG,'theirCorners');var hMom=buildMomentum(hG,true),aMom=buildMomentum(aG,false);var aAC=awayP.avgT;var cv2=buildCV2(hG,aG,hp,aAC);var al=bAl(hn,an,hp,aG,aG.length);AD={hn:hn,an:an,game:gm2,hG:hG,aG:aG,hp:hp,awayP:awayP,aRc:aRc,hRC:hRC,aRC:aRC,h37c:h37c,h87c:h87c,a37c:a37c,a87c:a87c,hOv:hOv,aOv:aOv,hMom:hMom,aMom:aMom,cv2:cv2,al:al,aAC:aAC};renderCtx()}catch(e){document.getElementById('ctxStatus').innerHTML='<div class="status s-err">ERRO: '+e.message+'</div>'}isRunning=false;document.getElementById('btnCtx').disabled=false;document.getElementById('btnCtx').textContent='ANALISAR'}
function renderCtx(){var d=AD,el=document.getElementById('ctxRes');el.style.display='block';var h='',hn2=d.hG.length,an2=d.aG.length;h+='<div class="match-hdr"><div class="meta">'+(d.game.leagueName||'')+' | '+(d.game.date||'')+'</div><div class="teams">'+d.hn+'<span class="vs">vs</span>'+d.an+'</div><div class="meta">CASA: '+hn2+' | FORA: '+an2+'</div></div>';h+='<h2>PERFIL</h2><div class="grid2">'+mkProf(d.hn,'home','CASA','var(--blue)',d.hp.avgC,d.hp.avgO,d.hp.avgT,d.hp.total,d.hp.races,d.hp.cvT,d.hp.cvF,d.hp.cvC,'Favor','Contra')+mkProf(d.an,'away','FORA','var(--red)',d.awayP.avgC,d.awayP.avgO,d.awayP.avgT,an2,d.aRc,d.awayP.cvT,d.awayP.cvF,d.awayP.cvC,'Feitos','Cedidos')+'</div>';h+='<h2>MOMENTUM</h2><div class="grid2">'+renderMomentum(d.hn,d.hMom,'var(--blue)')+renderMomentum(d.an,d.aMom,'var(--red)')+'</div>';if(d.al.length){h+='<h2>ALERTAS</h2>';for(var i=0;i<d.al.length;i++){var a=d.al[i];h+='<div class="alert al-'+a.type+'"><div class="al-t">'+a.title+'</div><div class="al-d">'+a.detail+'</div></div>'}}h+='<h2>OVER FAVOR CASA</h2>'+mkOverCard(d.hn,d.hOv,'var(--blue)');h+='<h2>OVER CEDIDOS FORA</h2>'+mkOverCard(d.an,d.aOv,'var(--red)');if(d.cv2)h+='<h2>CV²</h2>'+renderCV2(d);h+='<h2>CONTEXTO RACE</h2>';for(var r=0;r<RACES.length;r++){var t=RACES[r];if(d.hRC[t].won)h+=mkRCBlock(d.hn+' GANHOU Race '+t,d.hRC[t].won,hn2,false);if(d.aRC[t].lost)h+=mkRCBlock(d.an+' PERDEU Race '+t,d.aRC[t].lost,an2,true)}h+='<h2>37-HT</h2><div class="grid2">'+mkIVCtx(d.hn,d.h37c,'home')+mkIVCtx(d.an,d.a37c,'away')+'</div>';h+='<h2>87-FT</h2><div class="grid2">'+mkIVCtx(d.hn,d.h87c,'home')+mkIVCtx(d.an,d.a87c,'away')+'</div>';el.innerHTML=h}
function mkProf(nm,tp,label,col,aC,aO,aT,n,rc,cvT,cvF,cvC,lO,lT){var h='<div class="prof '+tp+'"><div class="prof-hdr"><div class="prof-name" style="color:'+col+'">'+nm+'</div><div class="prof-tag" style="background:'+col+';color:var(--bg)">'+label+'</div></div><div class="stat-grid"><div class="stat-box"><div class="v" style="color:var(--orange)">'+aC+'</div><div class="l">Total</div>'+cvHTML(cvT)+'</div><div class="stat-box"><div class="v" style="color:var(--blue)">'+aO+'</div><div class="l">'+lO+'</div>'+cvHTML(cvF)+'</div><div class="stat-box"><div class="v" style="color:var(--red)">'+aT+'</div><div class="l">'+lT+'</div>'+cvHTML(cvC)+'</div><div class="stat-box"><div class="v" style="color:var(--green)">'+n+'</div><div class="l">Jogos</div></div></div><table class="tbl"><tr><th>Race</th><th>Ganhou</th><th>Perdeu</th><th>—</th></tr>';for(var r=0;r<RACES.length;r++){var t=RACES[r],rs=rc[t];h+='<tr><td style="font-weight:700;color:var(--accent)">'+t+'</td><td class="'+cLvl(rs.wonPct)+'" style="font-weight:700">'+rs.wonPct+'%'+HT(rs.won,n)+' '+confHTML(rs.wonPct,n,rs.streak)+'</td><td style="color:var(--red)">'+rs.lostPct+'%'+HT(rs.lost,n)+'</td><td style="color:var(--dim)">'+rs.nonePct+'%</td></tr>'}h+='</table>';for(var r=0;r<RACES.length;r++){var t=RACES[r];if(rc[t].streak)h+='<details><summary style="color:var(--dim);cursor:pointer;font-size:10px">Race '+t+' seq</summary>'+dotsHTML(rc[t].streak)+'</details>'}h+='</div>';return h}
function mkOverCard(title,stats,col){var h='<div class="card" style="border-left:3px solid '+col+'"><div style="font-size:12px;font-weight:700;margin-bottom:8px">'+title+' — Média: <span style="color:var(--accent)">'+stats.avg+'</span></div><div class="over-grid">';for(var l=0;l<OL.length;l++){var line=OL[l],s2=stats[line];h+='<div class="over-c '+(s2.pct>=70?'hot':'')+'"><div class="over-ln">O'+line+'</div><div class="over-p '+cLvl(s2.pct)+'">'+s2.pct+'%</div><div style="font-size:10px;color:var(--dim)">'+HT(s2.hit,stats.total)+'</div>'+barFill(s2.pct)+confHTML(s2.pct,stats.total,s2.streak)+'</div>'}h+='</div>';for(var l=0;l<OL.length;l++){var line=OL[l],s2=stats[line];h+='<details><summary style="color:var(--dim);cursor:pointer;font-size:10px">O'+line+' seq</summary>'+dotsHTML(s2.streak)+'</details>'}h+='</div>';return h}
function renderCV2(d){var cv=d.cv2;if(!cv||!cv.dir1||!cv.dir2)return'<div class="none-msg">Dados insuficientes</div>';var h='<div class="cv2-card"><div class="cv2-title">CV²</div><div class="cv2-directions"><div class="cv2-dir d1"><div class="cv2-dir-title">S1: '+d.an+' vs mandantes ~'+d.hp.avgO+'c</div><div style="text-align:center;margin:4px 0"><span style="font-size:18px;font-weight:800;color:var(--accent)">'+cv.dir1.total+'</span> <span style="font-size:10px;color:var(--dim)">jogos</span></div><div class="cv2-dir-items">';for(var r=0;r<RACES.length;r++){var t=RACES[r],rc=cv.dir1.races[t];h+='<div class="cv2-dir-row"><span class="dr-label">Race '+t+'</span><span class="dr-val '+cLvl(rc.pct)+'">'+rc.pct+'%'+HT(rc.hit,cv.dir1.total)+'</span></div>'}for(var l=0;l<OL.length;l++){var line=OL[l],ov=cv.dir1.overs[line];h+='<div class="cv2-dir-row"><span class="dr-label">Over '+line+'</span><span class="dr-val '+cLvl(ov.pct)+'">'+ov.pct+'%'+HT(ov.hit,cv.dir1.total)+'</span></div>'}h+='</div></div><div class="cv2-dir d2"><div class="cv2-dir-title">S2: '+d.hn+' vs visitantes ~'+d.aAC+'c</div><div style="text-align:center;margin:4px 0"><span style="font-size:18px;font-weight:800;color:var(--accent)">'+cv.dir2.total+'</span> <span style="font-size:10px;color:var(--dim)">jogos</span></div><div class="cv2-dir-items">';for(var r=0;r<RACES.length;r++){var t=RACES[r],rc=cv.dir2.races[t];h+='<div class="cv2-dir-row"><span class="dr-label">Race '+t+'</span><span class="dr-val '+cLvl(rc.pct)+'">'+rc.pct+'%'+HT(rc.hit,cv.dir2.total)+'</span></div>'}for(var l=0;l<OL.length;l++){var line=OL[l],ov=cv.dir2.overs[line];h+='<div class="cv2-dir-row"><span class="dr-label">Over '+line+'</span><span class="dr-val '+cLvl(ov.pct)+'">'+ov.pct+'%'+HT(ov.hit,cv.dir2.total)+'</span></div>'}h+='</div></div></div>';if(cv.convergence.length){h+='<div class="cv2-convergence"><div class="cv2-conv-title">CONVERGÊNCIA</div><div class="cv2-conv-grid">';for(var i=0;i<cv.convergence.length;i++){var cc=cv.convergence[i];h+='<div class="cv2-conv-item '+cc.strength+'"><div class="ci-label">'+cc.label+'</div><div class="ci-score" style="color:'+cBg(cc.avg)+'">'+cc.avg+'%</div><div class="ci-detail">S1:'+cc.p1+'% S2:'+cc.p2+'%</div><div class="ci-tag '+cc.strength+'">'+(cc.strength==='strong'?'FORTE':cc.strength==='moderate'?'MODERADA':'FRACA')+'</div></div>'}h+='</div></div>'}else h+='<div style="text-align:center;color:var(--dim);font-size:11px;padding:10px;border:1px dashed var(--border);border-radius:6px;margin-top:8px">Sem convergência</div>';h+='</div>';return h}
function mkRCBlock(title,data,total,isLost){var h='<div class="rc-card'+(isLost?' lost':'')+'"><div class="rc-title" style="color:'+(isLost?'var(--red)':'var(--blue)')+'">'+title+' '+HT(data.total,total)+' '+confHTML(Math.round(data.total/total*100),total,null)+'</div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="tag tag-w">VEN:'+data.winPct+'%'+HT(data.win,data.total)+'</span><span class="tag tag-d">EMP:'+data.drawPct+'%'+HT(data.draw,data.total)+'</span><span class="tag tag-l">PER:'+data.losePct+'%'+HT(data.lose,data.total)+'</span></div><details><summary style="color:var(--dim);cursor:pointer;font-size:10px">Sequência</summary>'+dotsHTML(data.streak)+'</details><details><summary style="color:var(--dim);cursor:pointer;font-size:10px">Jogos ('+data.total+')</summary>';for(var i=0;i<data.games.length;i++){var g=data.games[i];var tcl={winning:'tag-w',drawing:'tag-d',losing:'tag-l'}[g.placar];h+='<div class="gr"><span class="gi">'+(i+1)+'</span><span class="gn">'+(g.info.homeName||'')+' vs '+(g.info.awayName||'')+'</span><span class="gs '+scCl(g.info.score)+'">'+(g.info.score||'?')+'</span><span class="tag '+tcl+'">'+g.placar+'</span></div>'}h+='</details></div>';return h}
function mkIVCtx(lbl,data,side){var a=data.all,c=data.ctx,cl2=side==='home'?'home':'away',bc=side==='home'?'var(--blue)':'var(--red)';var h='<div class="iv-card '+cl2+'"><div class="iv-hdr"><div class="iv-name" style="color:'+bc+'">'+lbl+'</div><div class="iv-general"><span class="ig-pct '+cLvl(a.pct)+'">'+a.pct+'%</span>'+HT(a.hit,a.base)+'</div></div><div class="iv-line-section"><div class="iv-line-title">FAVOR</div><div class="iv-lines"><div class="iv-line"><span class="il-label">O 0.5</span><span class="il-val '+cLvl(data.favor.p05)+'">'+data.favor.p05+'%</span></div><div class="iv-line"><span class="il-label">O 1.5</span><span class="il-val '+cLvl(data.favor.p15)+'">'+data.favor.p15+'%</span></div></div></div><div class="iv-line-section"><div class="iv-line-title">CONTRA</div><div class="iv-lines"><div class="iv-line"><span class="il-label">O 0.5</span><span class="il-val '+cLvl(data.contra.p05)+'">'+data.contra.p05+'%</span></div><div class="iv-line"><span class="il-label">O 1.5</span><span class="il-val '+cLvl(data.contra.p15)+'">'+data.contra.p15+'%</span></div></div></div><details><summary style="color:var(--dim);cursor:pointer;font-size:10px">Seq geral</summary>'+dotsHTML(a.streak)+'</details>';var ctxI=[{key:'drawing',label:'EMP',col:'var(--orange)'},{key:'losing',label:'PER',col:'var(--red)'},{key:'winning',label:'VEN',col:'var(--green)'}];var hasAny=false;var cards='<div class="iv-ctx">';for(var i=0;i<ctxI.length;i++){var ci=ctxI[i],cc=c[ci.key];if(cc.base>=2&&cc.pct>0){hasAny=true;var isHigh=cc.pct>=70;cards+='<div class="iv-ctx-card '+(isHigh?'highlight':'')+'" style="'+(isHigh?'border-color:'+ci.col:'')+'"><div class="ctx-label">'+ci.label+'</div><div class="ctx-pct" style="color:'+ci.col+'">'+cc.pct+'%</div><div class="ctx-base">'+HT(cc.hit,cc.base)+'</div>';if(cc.hit>0)cards+='<div class="ctx-avg">'+cc.avg+'c</div>';cards+='<div style="margin-top:3px">'+confHTML(cc.pct,cc.base,cc.streak)+'</div><details><summary style="color:var(--dim);cursor:pointer;font-size:9px">Seq</summary>'+dotsHTML(cc.streak)+'</details></div>'}}cards+='</div>';if(hasAny)h+=cards;else h+='<div class="iv-empty">Sem dados relevantes</div>';h+='</div>';return h}
function clearCtx(){document.getElementById('ctxRes').style.display='none';document.getElementById('ctxRes').innerHTML='';document.getElementById('ctxProg').style.display='none';document.getElementById('ctxStatus').innerHTML='';AD=null}
