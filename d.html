<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Lógica Backtest</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; margin: 0; padding: 10px; }
        h3 { color: #fff; margin-top: 0; }
        button { background: #ff9800; color: #000; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 5px; margin-bottom: 10px; cursor: pointer; width: 100%; }
        .btn-copy { background: #00bcd4; margin-top: 10px; }
        #console { background: #000; padding: 10px; border: 1px solid #333; height: 65vh; overflow-y: auto; font-size: 12px; white-space: pre-wrap; word-wrap: break-word; line-height: 1.4; }
        .log-time { color: #888; }
        .log-err { color: #f55; }
        .log-warn { color: #fd0; }
        .log-green { color: #00e676; font-weight: bold; }
    </style>
</head>
<body>

    <h3>🧠 Debug da Lógica de Escanteios</h3>
    <button onclick="runDebug()">1. Testar Lógica de Tempos (35-45 / 80-90)</button>
    <div id="console">Aguardando início...<br>Ele vai achar 5 jogos que tiveram escanteios nos acréscimos para testarmos.<br><br></div>
    <button class="btn-copy" onclick="copiarLog()">2. Copiar Log para Enviar</button>

    <script>
        var API = 'https://m.robobet.app/api/events';
        var INPLAY = 'https://m.robobet.app/api/inplay';
        var PX = 'https://api.allorigins.win/raw?url=';

        function log(msg, type) {
            var c = document.getElementById('console');
            var d = new Date();
            var t = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
            var colorClass = '';
            if(type === 'error') colorClass = 'log-err';
            else if(type === 'warn') colorClass = 'log-warn';
            else if(type === 'green') colorClass = 'log-green';
            
            c.innerHTML += '<span class="log-time">[' + t + ']</span> <span class="' + colorClass + '">' + msg + '</span><br>';
            c.scrollTop = c.scrollHeight;
        }

        function copiarLog() {
            var texto = document.getElementById('console').innerText;
            navigator.clipboard.writeText(texto).then(function() {
                alert('Log copiado com sucesso! Cole no chat para eu analisar.');
            });
        }

        function getToday() {
            var n = new Date();
            if (n.getHours() < 6) n.setDate(n.getDate() - 1);
            return n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0') + '-' + String(n.getDate()).padStart(2, '0');
        }

        async function af(u) {
            try {
                var r = await fetch(u);
                if (!r.ok) return null;
                return await r.json();
            } catch (e) {
                try {
                    var r2 = await fetch(PX + encodeURIComponent(u));
                    if (!r2.ok) return null;
                    return await r2.json();
                } catch (e2) {
                    return null;
                }
            }
        }

        async function runDebug() {
            document.getElementById('console').innerHTML = '';
            log('🚀 INICIANDO TESTE DO ALGORITMO DO BACKTEST...');

            var tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/Fortaleza';
            var today = getToday();
            log('📅 Data: ' + today);
            
            var data = await af(API + '/today?sport_id=1&date=' + today + '&timezone=' + encodeURIComponent(tz));
            if (!data || !data.success) { log('❌ Falha na API', 'error'); return; }

            var ftMatches = [];
            for (var i = 0; i < (data.leagues||[]).length; i++) {
                var lg = data.leagues[i];
                for (var j = 0; j < (lg.matches || []).length; j++) {
                    var m = lg.matches[j];
                    if (m.status === 'finished' && m.fi_id) ftMatches.push(m);
                }
            }

            // CORREÇÃO: Limpando jogos duplicados para evitar o Erro 404 (pega sempre o fi_id maior, que é o real)
            var seen = new Map();
            for(var i=0; i<ftMatches.length; i++) {
                var key = ftMatches[i].home + '_' + ftMatches[i].away;
                if(!seen.has(key)) {
                    seen.set(key, ftMatches[i]);
                } else {
                    if(String(ftMatches[i].fi_id).length > String(seen.get(key).fi_id).length) {
                        seen.set(key, ftMatches[i]);
                    }
                }
            }
            ftMatches = Array.from(seen.values());

            log('⚽ ' + ftMatches.length + ' jogos únicos FT.');

            var count = 0;
            // Varrendo os jogos
            for (var i = 0; i < ftMatches.length; i++) {
                var m = ftMatches[i];
                var det = await af(INPLAY + '/' + m.fi_id + '/details.json');
                if(!det || !det.success || !det.timeline) continue;
                
                var tl = det.timeline;
                var cornersLog = [];
                var hasLateCorner = false; // Queremos jogos que tenham escanteio após os 35 ou 80 min para testar

                for (var t = 0; t < tl.length; t++) {
                    if (tl[t].is_corner === true) {
                        var cEvent = tl[t];
                        var minStr = String(cEvent.minute || cEvent.minute_numeric || '0');
                        var minNum = parseInt(minStr) || 0;
                        
                        var is1H = false, is2H = false;
                        var p = String(cEvent.period || '').toUpperCase();

                        // --- LÓGICA DE TEMPO EXATA USADA NO SEU SISTEMA ---
                        if(p === '1H' || p === '1' || p === '1T' || p === 'FIRST_HALF') is1H = true;
                        else if(p === '2H' || p === '2' || p === '2T' || p === 'SECOND_HALF') is2H = true;
                        else {
                            // Heurística de acréscimos e tempos
                            if(minStr.includes('45+')) is1H = true;
                            else if(minStr.includes('90+')) is2H = true;
                            else if(minNum <= 45) is1H = true;
                            else is2H = true;
                        }

                        var hit35 = (is1H && minNum >= 35);
                        var hit80 = (is2H && minNum >= 80);

                        if(hit35 || hit80) hasLateCorner = true;

                        var decisionStr = is1H ? '1º Tempo' : is2H ? '2º Tempo' : 'Desconhecido';
                        
                        if(hit35) {
                            cornersLog.push('   ✅ GREEN 35-45 | Minuto: ' + minStr + "' | Entendido como: " + decisionStr);
                        } else if(hit80) {
                            cornersLog.push('   ✅ GREEN 80-90 | Minuto: ' + minStr + "' | Entendido como: " + decisionStr);
                        } else {
                            cornersLog.push('   ⚪ IGNORADO     | Minuto: ' + minStr + "' | Entendido como: " + decisionStr);
                        }
                    }
                }

                // Se o jogo teve escanteio válido pro robô testar, mostramos na tela
                if(hasLateCorner && count < 6) {
                    log('\n▶️ JOGO: ' + m.home + ' vs ' + m.away + ' (ID: '+m.fi_id+')');
                    for(var c of cornersLog) {
                        if(c.includes('GREEN')) log(c, 'green');
                        else log(c);
                    }
                    count++;
                }

                if(count >= 6) break; // Testa 6 jogos com greens para você visualizar
            }
            log('\n✅ TESTE DE LÓGICA FINALIZADO. Clique em Copiar Log.');
        }
    </script>
</body>
</html>
