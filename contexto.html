<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Contexto - Top 5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body {font-family:'Inter',sans-serif; background:#121214; color:#fff; padding:20px; margin:0;}
.container {max-width:900px; margin:0 auto;}
.card {background:#202024; padding:20px; border-radius:12px; border:1px solid #323238; margin-bottom:20px;}
h1 {font-size:1.4rem; color:#00875f; margin-top:0; display:flex; align-items:center; gap:10px;}
h2 {font-size:1.1rem; margin:15px 0 10px;}

.row-flex {display:flex; gap:10px; flex-wrap:wrap;}
.input-small {flex:1; min-width:120px; background:#121214; color:#fff; border:1px solid #323238; padding:10px 12px; border-radius:8px; font-size:14px; outline:none;}
.input-small:focus {border-color:#00875f;}

select {background:#1c1c1f; color:#fff; border:1px solid #323238; padding:10px 12px; border-radius:8px; font-size:13px; outline:none; font-family:'Inter',sans-serif; min-width:200px;}
select:focus {border-color:#00875f;}

button {background:#00875f; color:#fff; border:none; padding:12px 22px; border-radius:8px; cursor:pointer; font-weight:600; font-size:14px; transition:background 0.2s;}
button:hover {background:#015f43;}
button:disabled {background:#323238; color:#7c7c8a; cursor:not-allowed;}

.btn-telegram {background:#0088cc; color:#fff; border:none; padding:12px 22px; border-radius:8px; cursor:pointer; font-weight:600; font-size:14px; transition:background 0.2s; display:none; margin-top:10px;}
.btn-telegram:hover {background:#006699;}
.btn-telegram:disabled {background:#323238; color:#7c7c8a; cursor:not-allowed;}
.telegram-status {font-size:13px; color:#a8a8b3; margin-top:6px; display:none;}

.progress-bar-container {width:100%; height:8px; background:#323238; border-radius:4px; margin-top:15px; overflow:hidden; display:none;}
.progress-bar {height:100%; background:#38bdf8; width:0%; transition:width 0.3s;}
.status-text {font-size:13px; color:#a8a8b3; margin-top:8px; text-align:center; font-weight:500;}

.res-container {display:none;}
.summary-box {background:#1c1c1f; border:1px solid #00875f; padding:16px; border-radius:10px; text-align:center; margin-bottom:20px;}
.summary-title {font-size:1rem; font-weight:600; color:#fff; margin-bottom:6px;}
.big-number {font-size:2rem; font-weight:700; color:#00875f;}
.small-desc {font-size:13px; color:#a8a8b3; margin-top:4px;}

.match-list {display:flex; flex-direction:column; gap:10px;}
.match-item {background:#1c1c1f; border:1px solid #323238; padding:15px; border-radius:8px; display:flex; flex-direction:column; gap:6px;}
.match-header {display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;}
.match-title {font-weight:600; font-size:14px;}
.tag-badge {background:#00875f22; color:#00B37E; border:1px solid #00875f55; padding:3px 8px; border-radius:999px; font-size:11px; font-weight:600;}
.result-line {font-size:13px; color:#e1e1e6;}
.btn-link {background:transparent; border:1px solid #38bdf8; color:#38bdf8; padding:4px 10px; font-size:11px; border-radius:6px; cursor:pointer;}
.label-inline {font-size:12px; color:#a8a8b3; display:flex; align-items:center; gap:6px;}
.input-limiar {width:70px; text-align:center;}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>🎯 Buscador de Contexto - Top 5 IDs</h1>
    <p style="color:#a8a8b3; font-size:13px; line-height:1.5;">
      Cole até <b>5 IDs de partidas</b>, escolha o cenário e o lado (Casa/Fora).  
      O sistema analisa o histórico de cada jogo e só mostra os que atingirem o limiar mínimo de acerto.
    </p>

    <h2>IDs das Partidas</h2>
    <div class="row-flex">
      <input id="id1" class="input-small" placeholder="ID 1 (ex: rnf6g)">
      <input id="id2" class="input-small" placeholder="ID 2">
      <input id="id3" class="input-small" placeholder="ID 3">
      <input id="id4" class="input-small" placeholder="ID 4">
      <input id="id5" class="input-small" placeholder="ID 5">
    </div>

    <h2>Configurações</h2>
    <div class="row-flex">
      <select id="mandoSelect">
        <option value="home">Analisar Time da CASA</option>
        <option value="away">Analisar Time de FORA</option>
      </select>

      <select id="cenarioSelect">
        <option value="derrota_ht">Pressão 1ºT: Perdendo 0-35' -> Canto Total (37-HT)</option>
        <option value="empate_ht">Pressão 1ºT: Empate aos 36' -> Canto Total (37-HT)</option>
        <option value="derrota_2t">Pressão 2ºT: Perdendo no HT -> 5+ Cantos Totais 2ºT</option>
        <option value="pressao_70">Pressão Final 70+: Perdendo/Empatado aos 69' -> 3+ Cantos Totais</option>
        <option value="pressao_80">Pressão Final 80+: Perdendo/Empatado aos 79' -> 2+ Cantos Totais</option>
        <option value="retranca">Jogo Aberto 2ºT: Ganhando no HT -> 5+ Cantos Totais 2ºT</option>
        <option value="reacao_imediata">Reação Imediata: 1º Gol -> 2+ Cantos Totais nos 10'</option>
        <option value="cartao_vermelho">Cartão Vermelho: Expulsão -> 3+ Cantos Totais após</option>
      </select>

      <div class="label-inline">
        Limiar:
        <input id="limiarInput" class="input-small input-limiar" type="number" min="0" max="100" value="60">%
      </div>

      <button id="btnBuscar" onclick="analisarTop5()">🚀 Analisar 5 Jogos</button>
    </div>

    <div class="progress-bar-container" id="progContainer">
      <div class="progress-bar" id="progBar"></div>
    </div>
    <div class="status-text" id="statusText"></div>
  </div>

  <div id="resultadoContainer" class="res-container">
    <div class="summary-box">
      <div class="summary-title">Resumo dos Melhores Jogos</div>
      <div class="big-number" id="resPct">0%</div>
      <div class="small-desc" id="resFractions">0 jogos acima do limiar</div>
    </div>

    <div class="match-list" id="matchList"></div>

    <button class="btn-telegram" id="btnTelegram" onclick="enviarTelegram()">📲 Enviar para Telegram</button>
    <div class="telegram-status" id="telegramStatus"></div>
  </div>
</div>

<script>
const MYTOKEN = '45003_ec8357116e';
const TG_BOT_TOKEN = '8645338323:AAG5jlzVICHNz-tYHBQtfZZ-8_gr_V_FOiw';
const TG_CHAT_ID = '294730685';

// Guarda os dados do último relatório para envio ao Telegram
let ultimoRelatorio = null;

function formatMinute(t) {
    if (!t) return -1;
    let s = String(t).trim();
    if (s.indexOf('45+') === 0) return 45;
    if (s.indexOf('90+') === 0) return 90;
    return parseInt(s) || -1;
}
function isFirstHalfEvent(t) {
    if (!t) return false;
    let s = String(t).trim();
    if (s.indexOf('45+') === 0) return true;
    let m = parseInt(s) || 0;
    return m <= 45;
}

async function analisarJogo(gameId, mando, cenario) {
    try {
        let resBase = await fetch(`https://cornerprobet.com/api/v3/getAnalysis.php?gameId=${gameId}&token=${MYTOKEN}&games=20`);
        let dataBase = await resBase.json();

        let historicoTime = mando === 'home' ? dataBase.lastGames.home.asHome : dataBase.lastGames.away.asAway;
        let mainTeamName = mando === 'home' ? dataBase.game.homeName : dataBase.game.awayName;

        if(!historicoTime || historicoTime.length === 0) {
            throw new Error("Sem histórico para este time.");
        }

        let idsParaAnalisar = historicoTime.map(g => g.id).filter(id => id);
        let aptos = 0;
        let greens = 0;

        for(let histId of idsParaAnalisar) {
            try {
                let resHist = await fetch(`https://cornerprobet.com/api/v3/getAnalysis.php?gameId=${histId}&token=${MYTOKEN}`);
                let dataHist = await resHist.json();
                let game = dataHist.game;
                if(!game || !game.eventsClean) continue;

                let isMeuTimeHome = (game.homeName === mainTeamName); 
                
                let meuPlacar = 0, advPlacar = 0;
                let meuPlacarHT = 0, advPlacarHT = 0;
                let meuPlacarM36 = 0, advPlacarM36 = 0;
                let meuPlacarM69 = 0, advPlacarM69 = 0;
                let meuPlacarM79 = 0, advPlacarM79 = 0;

                let sofreuGolCedo = false; 
                let minGolCedo = -1;

                let cantosTotais37 = [];
                let cantosTotais2T = 0;
                let cantosTotais70 = [];
                let cantosTotais80 = [];

                let minPrimeiroGol = -1;
                let cantosPosGol = [];
                let minCartaoVermelho = -1;
                let cantosPosVermelho = 0;

                let events = game.eventsClean.sort((a,b) => formatMinute(a.t) - formatMinute(b.t));

                for(let e of events) {
                    let min = formatMinute(e.t);
                    if(min === -1) continue;
                    let is1T = isFirstHalfEvent(e.t);

                    if(e.tp === 'g' || e.tp === 'p' || e.tp === 'og') {
                        if(e.h === 'h') isMeuTimeHome ? meuPlacar++ : advPlacar++;
                        if(e.h === 'a') isMeuTimeHome ? advPlacar++ : meuPlacar++;
                        
                        if(is1T) {
                            meuPlacarHT = meuPlacar; advPlacarHT = advPlacar;
                            if(advPlacar > meuPlacar && min <= 35 && !sofreuGolCedo) {
                                sofreuGolCedo = true; minGolCedo = min;
                            }
                        }
                        if(minPrimeiroGol === -1) minPrimeiroGol = min;
                    }

                    if(e.tp === 'rc' || e.tp === 'yr') {
                        if(minCartaoVermelho === -1) minCartaoVermelho = min;
                    }

                    if(min <= 36 && is1T) { meuPlacarM36 = meuPlacar; advPlacarM36 = advPlacar; }
                    if(min <= 69 && !is1T) { meuPlacarM69 = meuPlacar; advPlacarM69 = advPlacar; }
                    if(min <= 79 && !is1T) { meuPlacarM79 = meuPlacar; advPlacarM79 = advPlacar; }

                    if(e.tp === 'c') {
                        if(is1T) {
                            if(min >= 37) cantosTotais37.push(e.t);
                        } else {
                            cantosTotais2T++;
                            if(min >= 70) cantosTotais70.push(e.t);
                            if(min >= 80) cantosTotais80.push(e.t);
                        }

                        if(minPrimeiroGol !== -1 && min >= minPrimeiroGol && min <= (minPrimeiroGol + 10)) {
                            cantosPosGol.push(e.t);
                        }
                        if(minCartaoVermelho !== -1 && min >= minCartaoVermelho) {
                            cantosPosVermelho++;
                        }
                    }
                }

                let entrou = false;
                let green = false;

                if(cenario === 'derrota_ht' && sofreuGolCedo) {
                    entrou = true; green = cantosTotais37.length > 0;
                } else if(cenario === 'empate_ht' && (meuPlacarM36 === advPlacarM36)) {
                    entrou = true; green = cantosTotais37.length > 0;
                } else if(cenario === 'derrota_2t' && (advPlacarHT > meuPlacarHT)) {
                    entrou = true; green = cantosTotais2T >= 5;
                } else if(cenario === 'pressao_70' && (advPlacarM69 >= meuPlacarM69)) {
                    entrou = true; green = cantosTotais70.length >= 3;
                } else if(cenario === 'pressao_80' && (advPlacarM79 >= meuPlacarM79)) {
                    entrou = true; green = cantosTotais80.length >= 2;
                } else if(cenario === 'retranca' && (meuPlacarHT > advPlacarHT)) {
                    entrou = true; green = cantosTotais2T >= 5;
                } else if(cenario === 'reacao_imediata' && minPrimeiroGol !== -1) {
                    entrou = true; green = cantosPosGol.length >= 2;
                } else if(cenario === 'cartao_vermelho' && minCartaoVermelho !== -1) {
                    entrou = true; green = cantosPosVermelho >= 3;
                }

                if(entrou) {
                    aptos++;
                    if(green) greens++;
                }

            } catch(errInGame) {
                // ignora jogos quebrados
            }
        }

        let pct = aptos > 0 ? Math.round((greens / aptos) * 100) : 0;

        return {
            ok: true,
            gameId,
            mainTeamName,
            mando,
            cenario,
            greens,
            aptos,
            pct,
            baseTitle: `${dataBase.game.homeName} ${dataBase.game.score} ${dataBase.game.awayName}`,
            baseDate: dataBase.game.date || dataBase.game.gamedate || ""
        };

    } catch (e) {
        return { ok:false, gameId, error: e.message };
    }
}

function montarMensagemTelegram(bons, totalAnalisados, limiar, cenarioTexto) {
    let mediaPct = Math.round(bons.reduce((sum, r) => sum + r.pct, 0) / bons.length);

    let msg = '';
    msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
    msg += '🎯 <b>Resumo dos Melhores Jogos</b>\n';
    msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
    msg += `📊 <b>Média: ${mediaPct}%</b>\n`;
    msg += `✅ ${bons.length} jogos com ≥ ${limiar}% (entre ${totalAnalisados} analisados)\n`;
    msg += `📋 Cenário: <i>${cenarioTexto}</i>\n\n`;

    bons.forEach((r, idx) => {
        let mandoLabel = r.mando === 'home' ? '🏠 Casa' : '✈️ Fora';
        let emoji = r.pct >= 80 ? '🟢' : r.pct >= 60 ? '🟡' : '🔴';
        let link = `https://cornerprobet.com/pt/analysis/game/${r.gameId}`;

        msg += `┌─────────────────────────\n`;
        msg += `│ ${emoji} <b>${r.baseTitle}</b>\n`;
        msg += `│ 📅 ${r.baseDate}\n`;
        msg += `│ 📈 <b>${r.pct}%</b> — ${r.greens}/${r.aptos} Greens\n`;
        msg += `│ ⚽ Time: <b>${r.mainTeamName}</b> (${mandoLabel})\n`;
        msg += `│ 🔗 <a href="${link}">Abrir Jogo Base</a>\n`;
        msg += `└─────────────────────────\n`;
        if (idx < bons.length - 1) msg += '\n';
    });

    msg += '\n⏰ ' + new Date().toLocaleString('pt-BR');

    return msg;
}

async function enviarTelegram() {
    if (!ultimoRelatorio) {
        alert('Nenhum relatório para enviar.');
        return;
    }

    let btn = document.getElementById('btnTelegram');
    let status = document.getElementById('telegramStatus');
    btn.disabled = true;
    btn.innerText = '⏳ Enviando...';
    status.style.display = 'block';
    status.innerText = 'Enviando relatório para o Telegram...';
    status.style.color = '#a8a8b3';

    try {
        let url = `https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`;
        let res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TG_CHAT_ID,
                text: ultimoRelatorio,
                parse_mode: 'HTML',
                disable_web_page_preview: true
            })
        });

        let data = await res.json();

        if (data.ok) {
            status.innerText = '✅ Relatório enviado com sucesso para o Telegram!';
            status.style.color = '#00B37E';
            btn.innerText = '✅ Enviado!';
        } else {
            throw new Error(data.description || 'Erro desconhecido');
        }

    } catch (e) {
        status.innerText = '❌ Erro ao enviar: ' + e.message;
        status.style.color = '#f75a68';
        btn.innerText = '📲 Tentar Novamente';
        btn.disabled = false;
    }
}

async function analisarTop5() {
    let ids = [
        document.getElementById('id1').value.trim(),
        document.getElementById('id2').value.trim(),
        document.getElementById('id3').value.trim(),
        document.getElementById('id4').value.trim(),
        document.getElementById('id5').value.trim()
    ].filter(x => x !== "");

    if(ids.length === 0) {
        alert("Digite pelo menos 1 ID.");
        return;
    }

    let limiar = parseInt(document.getElementById('limiarInput').value) || 0;
    let mando = document.getElementById('mandoSelect').value;
    let cenario = document.getElementById('cenarioSelect').value;

    document.getElementById('btnBuscar').disabled = true;
    document.getElementById('progContainer').style.display = 'block';
    document.getElementById('statusText').innerText = "Iniciando análises...";
    document.getElementById('progBar').style.width = '0%';
    document.getElementById('resultadoContainer').style.display = 'none';
    document.getElementById('btnTelegram').style.display = 'none';
    document.getElementById('telegramStatus').style.display = 'none';

    // Reset Telegram
    ultimoRelatorio = null;

    let resultados = [];

    for(let i=0; i<ids.length; i++) {
        let id = ids[i];
        document.getElementById('statusText').innerText = `Analisando jogo ${i+1}/${ids.length} (ID: ${id})...`;
        document.getElementById('progBar').style.width = `${Math.round((i/ids.length)*100)}%`;

        let r = await analisarJogo(id, mando, cenario);
        resultados.push(r);
    }

    let bons = resultados.filter(r => r.ok && r.aptos > 0 && r.pct >= limiar);
    bons.sort((a,b) => b.pct - a.pct);

    let matchList = document.getElementById('matchList');
    matchList.innerHTML = "";

    let cenarioTexto = document.getElementById('cenarioSelect').options[document.getElementById('cenarioSelect').selectedIndex].text;

    if(bons.length === 0) {
        matchList.innerHTML = `<p style='color:#7c7c8a; font-size:13px;'>Nenhum dos jogos atingiu ${limiar}%+ de acerto nesse cenário.</p>`;
        document.getElementById('resPct').innerText = "0%";
        document.getElementById('resFractions').innerText = `0 jogos com ≥ ${limiar}%`;
    } else {
        let mediaPct = Math.round(bons.reduce((sum, r) => sum + r.pct, 0) / bons.length);
        document.getElementById('resPct').innerText = mediaPct + "%";
        document.getElementById('resFractions').innerText = `${bons.length} jogos com ≥ ${limiar}% (entre ${ids.length} analisados)`;

        bons.forEach(r => {
            let div = document.createElement('div');
            div.className = "match-item";
            div.innerHTML = `
                <div class="match-header">
                    <div class="match-title">${r.baseTitle} <span style="color:#a8a8b3; font-weight:400;">(${r.baseDate})</span></div>
                    <span class="tag-badge">${r.pct}% | ${r.greens}/${r.aptos} Greens</span>
                    <button class="btn-link" onclick="window.open('https://cornerprobet.com/pt/analysis/game/${r.gameId}','_blank')">Abrir Jogo Base</button>
                </div>
                <div class="result-line">
                    Time analisado: <b>${r.mainTeamName}</b> (${r.mando === 'home' ? 'Casa' : 'Visitante'}) – Cenário: <span style="color:#38bdf8;">${cenarioTexto}</span>
                </div>
            `;
            matchList.appendChild(div);
        });

        // Monta e salva o relatório para o Telegram
        ultimoRelatorio = montarMensagemTelegram(bons, ids.length, limiar, cenarioTexto);
        document.getElementById('btnTelegram').style.display = 'inline-block';
        document.getElementById('btnTelegram').innerText = '📲 Enviar para Telegram';
        document.getElementById('btnTelegram').disabled = false;
    }

    document.getElementById('statusText').innerText = "✅ Análises concluídas!";
    document.getElementById('progBar').style.width = '100%';
    document.getElementById('resultadoContainer').style.display = 'block';
    document.getElementById('btnBuscar').disabled = false;
}
</script>
</body>
</html>
