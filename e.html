<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Brute Force</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; margin: 0; padding: 10px; }
        h3 { color: #fff; margin-top: 0; }
        button { background: #ff5722; color: #fff; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 5px; margin-bottom: 10px; cursor: pointer; width: 100%; }
        .btn-copy { background: #00bcd4; margin-top: 10px; }
        #console { background: #000; padding: 10px; border: 1px solid #333; height: 65vh; overflow-y: auto; font-size: 12px; white-space: pre-wrap; word-wrap: break-word; line-height: 1.4; }
        .log-time { color: #888; }
        .log-err { color: #f55; }
        .log-warn { color: #fd0; }
        .log-cyan { color: #00bcd4; }
        .log-gold { color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

    <h3>🔥 Debug Full Brute Force</h3>
    <button id="btnInit" onclick="runFullDebug()">1. Rodar Brute Force Completo</button>
    <div id="console">Aguardando início...<br>Ele vai baixar todos os escanteios FT e testar as combinações.<br><br></div>
    <button class="btn-copy" onclick="copiarLog()">2. Copiar Log para Enviar</button>

    <script>
        var API = 'https://m.robobet.app/api/events';
        var INPLAY = 'https://m.robobet.app/api/inplay';
        var PX = 'https://api.allorigins.win/raw?url=';

        function log(msg, type) {
            var c = document.getElementById('console');
            var d = new Date();
            var t = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
            var colorClass = '';
            if(type === 'error') colorClass = 'log-err';
            else if(type === 'warn') colorClass = 'log-warn';
            else if(type === 'cyan') colorClass = 'log-cyan';
            else if(type === 'gold') colorClass = 'log-gold';
            
            c.innerHTML += '<span class="log-time">[' + t + ']</span> <span class="' + colorClass + '">' + msg + '</span><br>';
            c.scrollTop = c.scrollHeight;
        }

        function copiarLog() {
            navigator.clipboard.writeText(document.getElementById('console').innerText)
                .then(() => alert('Log copiado com sucesso!'));
        }

        function getToday() {
            var n = new Date();
            if (n.getHours() < 6) n.setDate(n.getDate() - 1);
            return n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0') + '-' + String(n.getDate()).padStart(2, '0');
        }

        async function af(u) {
            try { var r = await fetch(u); if (!r.ok) return null; return await r.json(); } 
            catch (e) { try { var r2 = await fetch(PX + encodeURIComponent(u)); if (!r2.ok) return null; return await r2.json(); } catch (e2) { return null; } }
        }

        async function runFullDebug() {
            document.getElementById('btnInit').disabled = true;
            document.getElementById('console').innerHTML = '';
            log('🚀 INICIANDO DOWNLOAD DE TODOS OS DADOS FT...');

            var today = getToday();
            log('📅 Data: ' + today);
            
            var data = await af(API + '/today?sport_id=1&date=' + today);
            if (!data || !data.success) { log('❌ Falha na API principal', 'error'); return; }

            var rawMatches = [];
            for (var i = 0; i < (data.leagues||[]).length; i++) {
                var lg = data.leagues[i];
                for (var j = 0; j < (lg.matches || []).length; j++) {
                    var m = lg.matches[j];
                    if (m.status === 'finished' && m.fi_id) {
                        var c = (m.forecast_data && m.forecast_data.markets && m.forecast_data.markets.corners) || {};
                        rawMatches.push({
                            fi: String(m.fi_id), h: m.home, a: m.away, lg: lg.name,
                            tot: (c.match_total && c.match_total.value) || 0,
                            o8: (c.over_8_prob && c.over_8_prob.probability) || 0,
                            i35: (c.c_match_35_45_prob && c.c_match_35_45_prob.probability) || 0,
                            i80: (c.c_match_80_90_prob && c.c_match_80_90_prob.probability) || 0,
                            c35: [], c80: [], tR: 0
                        });
                    }
                }
            }

            // Removendo duplicadas
            var seen = new Map();
            for(var i=0; i<rawMatches.length; i++) {
                var key = rawMatches[i].h + '_' + rawMatches[i].a;
                if(!seen.has(key)) seen.set(key, rawMatches[i]);
                else if(rawMatches[i].fi.length > seen.get(key).fi.length) seen.set(key, rawMatches[i]);
            }
            var ftMatches = Array.from(seen.values());

            log('⚽ ' + ftMatches.length + ' jogos únicos FT encontrados. Baixando cantos...');

            // Download dos cantos (com a lógica correta)
            var tot = ftMatches.length, done = 0;
            for(var i=0; i < tot; i += 10) {
                var batch = ftMatches.slice(i, i+10);
                await Promise.all(batch.map(async function(m) {
                    try {
                        var det = await af(INPLAY + '/' + m.fi + '/details.json');
                        if(det && det.success !== false) {
                            var tl = det.timeline || [];
                            for(var t=0; t<tl.length; t++) {
                                if(tl[t].is_corner === true) {
                                    var minStr = String(tl[t].minute || tl[t].minute_numeric || '0');
                                    var minNum = parseInt(minStr) || 0;
                                    var is1H = false, is2H = false;
                                    var p = String(tl[t].period || '').toUpperCase();

                                    if(p === '1H' || p === '1' || p === '1T' || p === 'FIRST_HALF') is1H = true;
                                    else if(p === '2H' || p === '2' || p === '2T' || p === 'SECOND_HALF') is2H = true;
                                    else {
                                        if(minStr.includes('45+')) is1H = true;
                                        else if(minStr.includes('90+')) is2H = true;
                                        else if(minNum <= 45) is1H = true;
                                        else is2H = true;
                                    }
                                    if(is1H && minNum >= 35) m.c35.push(minStr);
                                    if(is2H && minNum >= 80) m.c80.push(minStr);
                                }
                            }
                        }
                    } catch(e) {}
                    done++;
                }));
                log('📥 Progresso cantos: ' + done + '/' + tot + '...', 'cyan');
            }

            log('\n🔥 INICIANDO MOTOR BRUTE FORCE 🔥', 'gold');
            log('Parâmetros: Intervalo=Ambos | HR>70% | Amostra>5 | MinCantos=1');
            
            var fcR = [50, 55, 60, 65, 70, 75, 80, 85, 90];
            var totR = [0, 7.5, 8.5, 9.5, 10.5];
            var o8R = [0, 40, 50, 60, 70];
            var combos = [];
            
            for(var a=0; a<fcR.length; a++) 
                for(var b=0; b<totR.length; b++) 
                    for(var c=0; c<o8R.length; c++) 
                        combos.push({fc:fcR[a], tot:totR[b], o8:o8R[c]});

            log('⚙️ ' + combos.length + ' combinações geradas para testar.');

            var results = [];
            for(var i=0; i<combos.length; i++) {
                var co = combos[i];
                var fl = ftMatches;
                if(co.tot > 0) fl = fl.filter(m => m.tot >= co.tot);
                if(co.o8 > 0) fl = fl.filter(m => m.o8 >= co.o8);
                fl = fl.filter(m => m.i35 >= co.fc || m.i80 >= co.fc); // Ambas

                if(fl.length < 5) continue; // Amostra Mínima

                var hits = 0;
                for(var k=0; k<fl.length; k++) {
                    var fm = fl[k];
                    var isHit = false;
                    if(fm.i35 >= co.fc && fm.c35.length >= 1) isHit = true;
                    if(fm.i80 >= co.fc && fm.c80.length >= 1) isHit = true;
                    if(isHit) hits++;
                }

                var hr = (hits / fl.length) * 100;
                if(hr >= 70) {
                    results.push({ fc: co.fc, tot: co.tot, o8: co.o8, hr: hr.toFixed(1), hits: hits, sample: fl.length });
                }
            }

            results.sort((a,b) => b.hr - a.hr || b.sample - a.sample);

            // Dedup pra visualização limpa
            var unique=[], seenK=new Set();
            for(var i=0; i<results.length; i++){
                var uk = results[i].hr + '_' + results[i].hits + '_' + results[i].sample;
                if(!seenK.has(uk)){ seenK.add(uk); unique.push(results[i]); }
            }

            log('\n🏆 TOP 5 COMBINAÇÕES ENCONTRADAS:', 'gold');
            if(unique.length === 0) {
                log('Nenhuma combinação bateu os 70% com 5 jogos hoje.', 'warn');
            } else {
                for(var i=0; i<Math.min(unique.length, 5); i++) {
                    var r = unique[i];
                    log((i+1) + 'º Lugar: HR ' + r.hr + '% (' + r.hits + '/' + r.sample + ') | FC>=' + r.fc + '% | TOT>=' + r.tot + ' | O8>=' + r.o8 + '%', 'cyan');
                }
            }

            log('\n✅ TESTE FINALIZADO! Pode copiar o Log.');
            document.getElementById('btnInit').disabled = false;
        }
    </script>
</body>
</html>
