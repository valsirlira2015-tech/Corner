<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Backtest API</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; margin: 0; padding: 10px; }
        h3 { color: #fff; margin-top: 0; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 5px; margin-bottom: 10px; cursor: pointer; width: 100%; }
        .btn-copy { background: #00bcd4; margin-top: 10px; }
        #console { background: #000; padding: 10px; border: 1px solid #333; height: 65vh; overflow-y: auto; font-size: 12px; white-space: pre-wrap; word-wrap: break-word; }
        .log-time { color: #888; }
        .log-err { color: #f55; }
        .log-warn { color: #fd0; }
    </style>
</head>
<body>

    <h3>🔧 Debug do Backtest</h3>
    <button onclick="runDebug()">1. Iniciar Teste da API</button>
    <div id="console">Aguardando início...<br><br></div>
    <button class="btn-copy" onclick="copiarLog()">2. Copiar Log para Enviar</button>

    <script>
        var API = 'https://m.robobet.app/api/events';
        var INPLAY = 'https://m.robobet.app/api/inplay';
        var PX = 'https://api.allorigins.win/raw?url=';

        function log(msg, type) {
            var c = document.getElementById('console');
            var d = new Date();
            var t = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
            var colorClass = '';
            if(type === 'error') colorClass = 'log-err';
            if(type === 'warn') colorClass = 'log-warn';
            
            c.innerHTML += '<span class="log-time">[' + t + ']</span> <span class="' + colorClass + '">' + msg + '</span><br>';
            c.scrollTop = c.scrollHeight;
        }

        function copiarLog() {
            var texto = document.getElementById('console').innerText;
            navigator.clipboard.writeText(texto).then(function() {
                alert('Log copiado com sucesso! Cole no chat para eu analisar.');
            }).catch(function(err) {
                alert('Erro ao copiar: ' + err);
            });
        }

        function getToday() {
            var n = new Date();
            log('Hora do sistema: ' + n.getHours() + ':' + n.getMinutes());
            if (n.getHours() < 6) {
                log('🕒 Menos de 6h da manhã. Voltando 1 dia para pegar os jogos de ontem.', 'warn');
                n.setDate(n.getDate() - 1);
            }
            var dateStr = n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0') + '-' + String(n.getDate()).padStart(2, '0');
            log('📅 Data calculada para a busca: ' + dateStr);
            return dateStr;
        }

        async function af(u) {
            log('🌐 GET: ' + u.split('?')[0] + '...');
            try {
                var r = await fetch(u);
                if (!r.ok) { log('❌ Erro HTTP: ' + r.status, 'error'); return null; }
                var j = await r.json();
                log('✅ Resposta recebida. Success: ' + j.success);
                return j;
            } catch (e) {
                log('⚠️ Falha no Fetch direto. Tentando Proxy...', 'warn');
                try {
                    var r2 = await fetch(PX + encodeURIComponent(u));
                    if (!r2.ok) { log('❌ Erro Proxy HTTP: ' + r2.status, 'error'); return null; }
                    var j2 = await r2.json();
                    log('✅ Resposta do Proxy recebida.');
                    return j2;
                } catch (e2) {
                    log('❌ Falha total de conexão: ' + e2.message, 'error');
                    return null;
                }
            }
        }

        async function runDebug() {
            document.getElementById('console').innerHTML = '';
            log('🚀 INICIANDO TESTE DE DEBUG...');

            try {
                var tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/Fortaleza';
                var today = getToday();
                var url = API + '/today?sport_id=1&date=' + today + '&timezone=' + encodeURIComponent(tz);
                
                var data = await af(url);
                
                if (!data || !data.success) {
                    log('❌ Falha: A API não retornou dados válidos.', 'error');
                    return;
                }

                var ligas = data.leagues || [];
                log('📊 ' + ligas.length + ' ligas encontradas no dia.');

                var ftMatches = [];
                for (var i = 0; i < ligas.length; i++) {
                    var lg = ligas[i];
                    for (var j = 0; j < (lg.matches || []).length; j++) {
                        var m = lg.matches[j];
                        if (m.status === 'finished' && m.fi_id) {
                            ftMatches.push(m);
                        }
                    }
                }

                log('⚽ Jogos finalizados (FT) encontrados: ' + ftMatches.length);

                if (ftMatches.length === 0) {
                    log('⚠️ Nenhum jogo finalizado encontrado para a data ' + today + '. Este é o motivo do Backtest ficar vazio!', 'warn');
                    return;
                }

                log('🔬 Pegando os primeiros 2 jogos para testar a busca de cantos...');
                var amostra = ftMatches.slice(0, 2);

                for (var i = 0; i < amostra.length; i++) {
                    var m = amostra[i];
                    log('--- Testando jogo: ' + m.home + ' vs ' + m.away + ' (ID: ' + m.fi_id + ') ---');
                    var detUrl = INPLAY + '/' + m.fi_id + '/details.json';
                    var det = await af(detUrl);

                    if (det && det.timeline) {
                        var tl = det.timeline;
                        var cantos = 0;
                        for (var t = 0; t < tl.length; t++) {
                            if (tl[t].is_corner) cantos++;
                        }
                        log('✔️ Timeline lida. Cantos encontrados: ' + cantos);
                    } else {
                        log('❌ Falha ao ler timeline do jogo.', 'error');
                    }
                }

                log('✅ TESTE FINALIZADO. Por favor, clique em Copiar Log.');

            } catch (err) {
                log('❌ ERRO FATAL: ' + err.message, 'error');
            }
        }
    </script>
</body>
</html>
